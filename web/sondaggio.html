<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Anagrafica - Cashly</title>
<style>
  :root {
    --ink: #181b22;
    --panel: #232834;
    --card2: #2b313f;
    --blue: #5aa9f0;
    --blue-dim: rgba(90, 169, 240, 0.16);
    --amber: #e8b34c;
    --amber-dim: rgba(232, 179, 76, 0.15);
    --text: #f5f6f9;
    --text-dim: #98a0b2;
    --border: #30374a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-variant-numeric: tabular-nums; }
  body {
    min-height: 100vh;
    background: var(--ink);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", ui-sans-serif, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 22px 18px 40px; }

  .top { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .top-ico {
    width: 40px; height: 40px; border-radius: 4px;
    background: var(--blue);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .top h1 { font-size: 20px; font-weight: 700; }
  .top p { font-size: 13px; color: var(--text-dim); margin-top: 1px; }

  .progress { display: flex; gap: 5px; margin-bottom: 24px; }
  .progress span { flex: 1; height: 5px; border-radius: 3px; background: var(--panel); }
  .progress span.on { background: var(--blue); }

  .q label { display: block; font-size: 19px; font-weight: 700; margin-bottom: 18px; letter-spacing: -0.01em; }
  .opt {
    display: block; width: 100%; text-align: left;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 15px 16px; border-radius: 4px;
    font-size: 15px; font-weight: 600; margin-bottom: 10px; cursor: pointer;
    font-family: inherit;
  }
  .opt:active, .opt.selected { border-color: var(--blue); background: var(--blue-dim); color: var(--blue); }
  input[type=text], input[type=email] {
    width: 100%; background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 15px 16px; border-radius: 4px; font-size: 15px;
    margin-bottom: 14px; font-family: inherit;
  }
  input:focus { outline: none; border-color: var(--blue); }
  .field-error { color: #e2574a; font-size: 12.5px; margin-top: -8px; margin-bottom: 12px; display: none; }
  .btn {
    width: 100%; padding: 15px; border: none; border-radius: 4px;
    font-weight: 700; font-size: 15px; cursor: pointer;
    background: var(--blue); color: #fff;
  }
  .btn-skip { background: transparent; color: var(--text-dim); border: 1px solid var(--border); margin-top: 8px; }

  /* Disclaimer */
  .disclaimer-box {
    background: var(--amber-dim); border: 1px solid rgba(232,179,76,0.35);
    border-radius: 4px; padding: 16px; margin-bottom: 16px;
  }
  .disclaimer-box .warn-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; color: var(--amber); font-weight: 800; font-size: 14px; }
  .disclaimer-box p { font-size: 13px; color: var(--text); line-height: 1.55; margin-bottom: 10px; }
  .disclaimer-box p:last-child { margin-bottom: 0; }
  .check-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 18px; cursor: pointer; }
  .check-row input { width: 20px; height: 20px; margin-top: 1px; accent-color: var(--blue); flex-shrink: 0; }
  .check-row span { font-size: 13.5px; line-height: 1.4; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .ik-arch { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .ik-arch-lbl { font-size: 12px; color: var(--text-dim); }
  .ik-arch-name { font-size: 19px; font-weight: 800; margin: 3px 0 5px; }
  .ik-arch-desc { font-size: 13px; color: var(--text-dim); line-height: 1.45; }
  .ik-sec { font-size: 12px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin: 6px 0 14px; }
  .ik-row { margin-bottom: 14px; }
  .ik-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .ik-name { font-size: 14px; font-weight: 600; }
  .ik-val { font-size: 15px; font-weight: 800; }
  .ik-track { height: 9px; background: var(--ink); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .ik-fill { height: 100%; border-radius: 6px; transition: width .9s cubic-bezier(.2,.8,.2,1); }
  .ik-two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 18px 0 8px; }
  .ik-mini { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 13px; }
  .ik-mini-h { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .ik-mini-h.ok { color: #2ecc71; }
  .ik-mini-h.warn { color: var(--amber); }
  .ik-mini div:not(.ik-mini-h) { font-size: 13px; margin-bottom: 3px; }
</style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="top-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><path d="M9 11h6M9 15h4"/></svg></div>
      <div>
        <h1>La tua anagrafica</h1>
        <p id="progText">Domanda 1 di 12</p>
      </div>
    </div>
    <div class="progress" id="bar"></div>
    <form id="form"></form>
  </div>

  <script>
    window.addEventListener("pageshow", (e) => { if (e.persisted) window.location.reload(); });
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="identikit.js?v=1"></script>
  <script>
    const API_URL = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const initData = tg?.initData || "";

    const PERSONALI = [
      { key: "nome", type: "text", q: "Come ti chiami?" },
      { key: "cognome", type: "text", q: "Il tuo cognome?" },
      { key: "email", type: "email", q: "La tua email?" },
      { key: "citta", type: "text", q: "In che città vivi?" },
    ];
    const SURVEY = [...PERSONALI, ...CONS_Q, { key: "disclaimer_accettato", type: "disclaimer", q: "Prima di continuare" }];

    let step = 0;
    const data = {};
    const form = document.getElementById("form");

    function renderBar() {
      const bar = document.getElementById("bar");
      bar.innerHTML = "";
      SURVEY.forEach((_, i) => {
        const s = document.createElement("span");
        if (i < step) s.className = "on";
        bar.appendChild(s);
      });
    }

    function isValidEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    function render() {
      const q = SURVEY[step];
      renderBar();
      document.getElementById("progText").textContent = `Domanda ${step + 1} di ${SURVEY.length}`;

      form.innerHTML = "";
      const wrap = document.createElement("div");
      wrap.className = "q";

      if (q.type === "disclaimer") {
        wrap.innerHTML = `
          <label>${q.q}</label>
          <div class="disclaimer-box">
            <div class="warn-head">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
              Avviso importante
            </div>
            <p>Cashly non offre consulenza finanziaria e non promette guadagni. I metodi trattati comportano rischio reale di perdita del capitale.</p>
            <p>Le informazioni condivise sono a scopo educativo. Prima di attivare un servizio, valuta con la tua testa se è adatto alla tua situazione economica.</p>
          </div>
          <label class="check-row">
            <input type="checkbox" id="discCheck" />
            <span>Ho letto, ho capito il rischio e voglio continuare.</span>
          </label>
          <button type="button" class="btn" id="discBtn" disabled>Vedi il tuo identikit</button>
        `;
        form.appendChild(wrap);
        const check = document.getElementById("discCheck");
        const btn = document.getElementById("discBtn");
        check.onchange = () => { btn.disabled = !check.checked; };
        btn.onclick = () => { data.disclaimer_accettato = true; next(); };
        return;
      }

      const label = document.createElement("label");
      label.textContent = q.q;
      wrap.appendChild(label);

      if (q.type === "number") {
        const inRow = document.createElement("div");
        inRow.style.cssText = "display:flex;align-items:center;gap:10px;margin-bottom:14px";
        const input = document.createElement("input");
        input.type = "number"; input.inputMode = "numeric"; input.min = "0";
        input.placeholder = q.placeholder || "0";
        input.style.marginBottom = "0";
        inRow.appendChild(input);
        if (q.suffix) { const suf = document.createElement("span"); suf.textContent = q.suffix; suf.style.cssText = "font-size:18px;font-weight:700;color:var(--text-dim)"; inRow.appendChild(suf); }
        wrap.appendChild(inRow);
        const btn = document.createElement("button");
        btn.type = "button"; btn.className = "btn"; btn.textContent = "Continua";
        btn.onclick = () => { data[q.key] = input.value.trim() === "" ? 0 : Math.max(0, Number(input.value) || 0); next(); };
        wrap.appendChild(btn);
      } else if (q.opts) {
        q.opts.forEach((opt, i) => {
          const btn = document.createElement("button");
          btn.type = "button"; btn.className = "opt";
          btn.textContent = typeof opt === "string" ? opt : opt.t;
          btn.onclick = () => { data[q.key] = i; next(); };
          wrap.appendChild(btn);
        });
      } else {
        const input = document.createElement("input");
        input.type = q.type === "email" ? "email" : "text";
        input.placeholder = q.type === "email" ? "nome@esempio.com" : "Scrivi qui...";
        wrap.appendChild(input);
        const err = document.createElement("div");
        err.className = "field-error"; err.textContent = "Inserisci un'email valida.";
        wrap.appendChild(err);
        const btn = document.createElement("button");
        btn.type = "button"; btn.className = "btn"; btn.textContent = "Continua";
        btn.onclick = () => {
          const val = input.value.trim();
          if (q.type === "email" && !isValidEmail(val)) { err.style.display = "block"; return; }
          data[q.key] = val;
          next();
        };
        wrap.appendChild(btn);
      }
      form.appendChild(wrap);
    }

    async function next() {
      step++;
      if (step >= SURVEY.length) { await submit(); return; }
      render();
    }

    async function submit() {
      document.getElementById("progText").textContent = "Calcolo il tuo identikit...";
      const cons = {};
      for (const q of CONS_Q) cons[q.key] = data[q.key];
      const identikit = computeIdentikit(cons);
      try {
        await fetch(`${API_URL}/sondaggio`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-telegram-init-data": initData },
          body: JSON.stringify({
            nome: data.nome, cognome: data.cognome, email: data.email, citta: data.citta,
            disclaimer_accettato: true, consapevolezza: cons, identikit,
          }),
        });
        renderResult(identikit);
      } catch (e) {
        document.getElementById("progText").textContent = "Errore, riprova.";
      }
    }

    function renderResult(idk) {
      document.querySelector(".top h1").textContent = "Il tuo identikit";
      document.getElementById("progText").textContent = "Assessment completato";
      document.getElementById("bar").style.display = "none";
      const bars = Object.keys(CONS_DIM).map((d) => {
        const c = CONS_DIM[d], val = idk.scores[d];
        return `<div class="ik-row"><div class="ik-top"><span class="ik-name">${c.label}</span><span class="ik-val" style="color:${c.color}">${val}</span></div>
          <div class="ik-track"><div class="ik-fill" style="width:0;background:${c.color}" data-w="${val}"></div></div></div>`;
      }).join("");
      form.innerHTML = `
        <div class="ik-arch">
          <div class="ik-arch-lbl">Il tuo archetipo</div>
          <div class="ik-arch-name">${idk.archetipo}</div>
          <div class="ik-arch-desc">${idk.descrizione}</div>
        </div>
        <div class="ik-sec">Il tuo identikit in numeri</div>
        ${bars}
        <div class="ik-two">
          <div class="ik-mini"><div class="ik-mini-h ok">Punti di forza</div>${idk.forze.map((f) => `<div>${f}</div>`).join("")}</div>
          <div class="ik-mini"><div class="ik-mini-h warn">Da rafforzare</div>${idk.lacune.map((f) => `<div>${f}</div>`).join("")}</div>
        </div>
        <button type="button" class="btn" style="margin-top:8px" onclick="window.location.replace('dashboard.html?_=' + Date.now())">Vai alla Business List</button>
      `;
      setTimeout(() => document.querySelectorAll(".ik-fill").forEach((el) => { el.style.width = el.getAttribute("data-w") + "%"; }), 120);
    }

    render();
  </script>
</body>
</html>
