<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Servizio - Business UP</title>
<style>
  :root {
    --ink: #0d0e15;
    --panel: #171a28;
    --blue: #4a90e2;
    --blue-dim: rgba(74, 144, 226, 0.16);
    --lime: #2ecc71;
    --lime-dim: rgba(46, 204, 113, 0.16);
    --amber: #e8b34c;
    --coral: #e2574a;
    --text: #f2f3f7;
    --text-dim: #8b90a0;
    --border: #1e2130;
    --node-locked: #1c1f2b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-variant-numeric: tabular-nums; }
  body {
    min-height: 100vh; background: var(--ink); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", ui-sans-serif, sans-serif;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 18px 16px 40px; }

  .top { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .back { width: 36px; height: 36px; border-radius: 4px; background: var(--panel); display: flex; align-items: center; justify-content: center; color: var(--text); flex-shrink: 0; cursor: pointer; border: none; }

  .hero { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 20px; margin-bottom: 14px; }
  .hero-top { display: flex; align-items: center; gap: 14px; }
  .hero-ico { width: 52px; height: 52px; border-radius: 4px; background: var(--blue); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .hero-title { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }
  .stato-badge { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 4px 10px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.03em; margin-top: 5px; }
  .stato-badge.attivo { background: var(--lime-dim); color: var(--lime); }
  .stato-badge.pausa { background: rgba(232,179,76,0.14); color: var(--amber); }
  .stato-badge.fermo { background: rgba(226,87,74,0.12); color: var(--coral); }
  .hero-desc { font-size: 13.5px; color: var(--text-dim); line-height: 1.55; margin-top: 14px; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-box { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 13px; text-align: center; }
  .stat-box .label { font-size: 10.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-box .value { font-size: 17px; font-weight: 700; }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 18px; margin-bottom: 14px; }
  .card h2 { font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-weight: 700; margin-bottom: 14px; }

  .steps { position: relative; }
  .steps-line { position: absolute; left: 14px; top: 10px; bottom: 10px; width: 2px; background: var(--border); }
  .step { position: relative; padding-left: 42px; margin-bottom: 18px; }
  .step:last-child { margin-bottom: 0; }
  .step-num { position: absolute; left: 0; top: 0; width: 30px; height: 30px; border-radius: 4px; background: var(--node-locked); color: var(--text-dim); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; z-index: 1; }
  .step.done .step-num { background: var(--lime); color: #06110b; }
  .step.current .step-num { background: var(--blue); color: #fff; }
  .step-text { font-size: 13px; line-height: 1.45; color: var(--text-dim); }
  .step-text b { display: block; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .step.locked .step-text b { color: var(--text-dim); }
  .step-done-btn { margin-top: 10px; padding: 9px 14px; border: none; border-radius: 4px; background: var(--blue); color: #fff; font-size: 12.5px; font-weight: 700; cursor: pointer; font-family: inherit; }

  .req-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .req-row:last-child { border-bottom: none; padding-bottom: 0; }
  .req-row .k { color: var(--text-dim); }
  .req-row .v { font-weight: 700; text-align: right; max-width: 60%; }

  .btn { width: 100%; padding: 16px; border: none; border-radius: 4px; font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit; }
  .btn-primary { background: var(--lime); color: #06110b; }
  .btn-done { background: var(--lime-dim); color: var(--lime); }
  .link-box { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 4px; padding: 12px; margin-top: 12px; font-family: monospace; font-size: 11.5px; word-break: break-all; }

  .aff-input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 4px; font-size: 13.5px; margin-bottom: 10px; font-family: inherit; }
  .aff-status { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 10px 12px; border-radius: 4px; }
  .aff-status.pending { background: rgba(232,179,76,0.14); color: var(--amber); }
  .aff-status.approved { background: var(--lime-dim); color: var(--lime); }
</style>
</head>
<body>
  <div class="container">
    <div class="top">
      <button class="back" onclick="history.back()"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
      <div style="flex:1"></div>
      <button class="back" onclick="shareServizio()" aria-label="Condividi questo business"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><path d="m8.1 10.6 7.8-4.3M8.1 13.4l7.8 4.3"/></svg></button>
    </div>

    <div class="hero">
      <div class="hero-top">
        <div class="hero-ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v9H4v-9M2 7h20v5H2zM12 22V7M12 7C10 4 6 3 5 5s1 2 3 2h4ZM12 7c2-3 6-4 7-2s-1 2-3 2h-4Z"/></svg></div>
        <div>
          <div class="hero-title" id="titolo">Caricamento...</div>
          <div class="stato-badge" id="statoBadge"></div>
        </div>
      </div>
      <p class="hero-desc" id="descrizione"></p>
    </div>

    <div class="card">
      <h2>Panoramica</h2>
      <div id="reqRows"></div>
    </div>

    <div class="card">
      <h2 id="stepsTitle">Come funziona</h2>
      <div class="steps"><div class="steps-line"></div><div id="stepsList"></div></div>
    </div>

    <button class="btn btn-primary" id="attivaBtn">Attiva questo servizio</button>
    <div class="link-box" id="linkBox" style="display:none"></div>

    <div class="card" id="affCard" style="display:none">
      <h2>Diventa affiliato di questo servizio</h2>
      <div id="affForm">
        <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px;line-height:1.5">Inserisci il tuo link personale per questo servizio. Chi inviti tramite la tua rete vedrà questo link invece di quello principale, una volta approvato.</p>
        <input type="text" class="aff-input" id="affLinkInput" placeholder="https://..." />
        <button class="btn btn-primary" id="affSubmitBtn">Invia per approvazione</button>
      </div>
      <div id="affStatus" style="display:none"></div>
    </div>
  </div>

  <script>
    window.addEventListener("pageshow", (e) => { if (e.persisted) window.location.reload(); });
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const API_URL = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const initData = tg?.initData || "";
    const servizioId = new URLSearchParams(window.location.search).get("id");

    const FALLBACK_STEPS = [
      { titolo: "Guarda il tutorial completo", testo: "Trovi la spiegazione passo-passo di questo metodo (in arrivo qui)." },
      { titolo: "Verifica i requisiti", testo: "Controlla capitale e strumenti richiesti nella panoramica." },
      { titolo: "Attiva il servizio", testo: "Premi il bottone qui sotto per segnalare il tuo interesse." },
      { titolo: "Ricevi il tuo link", testo: "Il link giusto per iniziare, personale o dell'affiliato che ti ha invitato." },
    ];
    let stepsData = [];
    let stepProgress = { ultimo_step: 0, completato: false };

    function renderSteps() {
      const stepsList = document.getElementById("stepsList");
      stepsList.innerHTML = stepsData.map((st, i) => {
        const state = i < stepProgress.ultimo_step ? "done" : i === stepProgress.ultimo_step ? "current" : "locked";
        const icon = state === "done"
          ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>'
          : state === "locked"
          ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
          : (i + 1);
        const btnHtml = state === "current"
          ? `<button class="step-done-btn" onclick="markStepDone(${i})">Segna come fatto</button>`
          : "";
        return `<div class="step ${state}"><div class="step-num">${icon}</div><div class="step-text"><b>${st.titolo}</b>${st.testo}${btnHtml}</div></div>`;
      }).join("");
    }

    async function markStepDone(i) {
      const isLast = i === stepsData.length - 1;
      const res = await fetch(`${API_URL}/step-progress`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-telegram-init-data": initData },
        body: JSON.stringify({ servizio_id: parseInt(servizioId), step_index: i, is_last: isLast }),
      });
      if (!res.ok) return;
      const result = await res.json();
      stepProgress = { ultimo_step: result.ultimo_step, completato: result.completato };
      renderSteps();
    }
    window.markStepDone = markStepDone;

    async function load() {
      const res = await fetch(`${API_URL}/servizio?id=${servizioId}`, { headers: { "x-telegram-init-data": initData }, cache: "no-store" });
      const data = await res.json();
      const s = data.servizio;
      if (!s) { document.getElementById("titolo").textContent = "Servizio non trovato"; return; }

      document.getElementById("titolo").textContent = s.nome;
      document.getElementById("descrizione").textContent = s.descrizione || "";

      const badge = document.getElementById("statoBadge");
      badge.className = `stato-badge ${s.stato}`;
      badge.textContent = s.stato;

      const rows = document.getElementById("reqRows");
      let html = "";
      if (s.prezzo) html += `<div class="req-row"><span class="k">Prezzo</span><span class="v">${s.prezzo}</span></div>`;
      if (s.split_percent) html += `<div class="req-row"><span class="k">Split</span><span class="v">${s.split_percent}%</span></div>`;
      if (s.requisiti) html += `<div class="req-row"><span class="k">Requisiti</span><span class="v">${s.requisiti}</span></div>`;
      if (s.costi) html += `<div class="req-row"><span class="k">Costi</span><span class="v">${s.costi}</span></div>`;
      rows.innerHTML = html || '<p style="color:var(--text-dim);font-size:13px">Nessun dettaglio inserito.</p>';

      stepsData = Array.isArray(s.tutorial_steps) && s.tutorial_steps.length ? s.tutorial_steps : FALLBACK_STEPS;
      stepProgress = data.step_progress || { ultimo_step: 0, completato: false };
      renderSteps();

      const btn = document.getElementById("attivaBtn");
      if (data.gia_interessato) {
        btn.className = "btn btn-done";
        btn.textContent = "✓ Interesse già registrato";
        btn.disabled = true;
        if (data.ref_link) {
          document.getElementById("linkBox").style.display = "block";
          document.getElementById("linkBox").textContent = data.ref_link;
        }
      } else if (!data.sondaggio_completato) {
        btn.textContent = "Completa l'anagrafica per attivare";
        btn.onclick = () => window.location.href = `sondaggio.html?_=${Date.now()}`;
      } else {
        btn.onclick = async () => {
          btn.textContent = "...";
          btn.disabled = true;
          const r = await fetch(`${API_URL}/attiva`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-telegram-init-data": initData },
            body: JSON.stringify({ servizio_id: parseInt(servizioId) }),
          });
          const result = await r.json();
          if (result.error === "anagrafica_richiesta") {
            btn.textContent = "Completa l'anagrafica per attivare";
            btn.disabled = false;
            btn.onclick = () => window.location.href = `sondaggio.html?_=${Date.now()}`;
            return;
          }
          btn.className = "btn btn-done";
          btn.textContent = "✓ Interesse registrato";
          if (result.ref_link) {
            document.getElementById("linkBox").style.display = "block";
            document.getElementById("linkBox").textContent = result.ref_link;
          }
        };
      }

      renderAffiliateCard(data);
    }

    function renderAffiliateCard(data) {
      if (!data.sondaggio_completato) return;
      const card = document.getElementById("affCard");
      card.style.display = "block";

      if (data.mio_link) {
        document.getElementById("affForm").style.display = "none";
        const status = document.getElementById("affStatus");
        status.style.display = "flex";
        if (data.mio_link.approvato) {
          status.className = "aff-status approved";
          status.textContent = "✓ Link approvato — attivo per la tua rete";
        } else {
          status.className = "aff-status pending";
          status.textContent = "In attesa di approvazione";
        }
      } else {
        document.getElementById("affSubmitBtn").onclick = async () => {
          const link = document.getElementById("affLinkInput").value.trim();
          if (!link) return;
          const submitBtn = document.getElementById("affSubmitBtn");
          submitBtn.textContent = "Invio...";
          submitBtn.disabled = true;
          await fetch(`${API_URL}/affiliate-link`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-telegram-init-data": initData },
            body: JSON.stringify({ servizio_id: parseInt(servizioId), ref_link: link }),
          });
          document.getElementById("affForm").style.display = "none";
          const status = document.getElementById("affStatus");
          status.style.display = "flex";
          status.className = "aff-status pending";
          status.textContent = "In attesa di approvazione";
        };
      }
    }

    let cachedRefLink = "";
    async function shareServizio() {
      try { tg?.HapticFeedback?.impactOccurred("light"); } catch (e) {}
      if (!cachedRefLink) {
        const r = await fetch(`${API_URL}/affiliazione`, { headers: { "x-telegram-init-data": initData }, cache: "no-store" });
        const d = await r.json();
        cachedRefLink = d.ref_link || "";
      }
      if (!cachedRefLink) return;
      const nome = document.getElementById("titolo").textContent;
      const text = `Guarda "${nome}" su Business UP:`;
      const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(cachedRefLink)}&text=${encodeURIComponent(text)}`;
      if (tg?.openTelegramLink) tg.openTelegramLink(shareUrl);
      else window.open(shareUrl, "_blank");
    }
    window.shareServizio = shareServizio;

    load();
  </script>
</body>
</html>
