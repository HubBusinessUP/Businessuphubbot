<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Servizio - Business UP</title>
<style>
  :root {
    --ink: #0b0d13;
    --panel: #171b26;
    --blue: #4c6ef5;
    --blue-dim: rgba(76, 110, 245, 0.16);
    --flame: #ff5c48;
    --lime: #34d399;
    --lime-dim: rgba(52, 211, 153, 0.16);
    --amber: #fbbf24;
    --coral: #f2554d;
    --text: #f4f6fb;
    --text-dim: #8890a6;
    --border: rgba(244, 246, 251, 0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-variant-numeric: tabular-nums; }
  body {
    min-height: 100vh; background: var(--ink); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", ui-sans-serif, sans-serif;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 18px 16px 40px; }

  .top { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .back { width: 36px; height: 36px; border-radius: 9px; background: var(--panel); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text); flex-shrink: 0; cursor: pointer; }

  .hero { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
  .hero-top { display: flex; align-items: center; gap: 14px; }
  .hero-ico { width: 52px; height: 52px; border-radius: 12px; background: var(--flame); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .hero-title { font-size: 19px; font-weight: 800; letter-spacing: -0.01em; }
  .stato-badge { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.03em; margin-top: 5px; }
  .stato-badge.attivo { background: var(--lime-dim); color: var(--lime); }
  .stato-badge.pausa { background: rgba(251,191,36,0.14); color: var(--amber); }
  .stato-badge.fermo { background: rgba(242,85,77,0.12); color: var(--coral); }
  .hero-desc { font-size: 13.5px; color: var(--text-dim); line-height: 1.55; margin-top: 14px; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-box { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 13px; text-align: center; }
  .stat-box .label { font-size: 10.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-box .value { font-size: 17px; font-weight: 800; }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
  .card h2 { font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-weight: 700; margin-bottom: 14px; }

  .steps { display: flex; flex-direction: column; gap: 12px; }
  .step { display: flex; gap: 12px; align-items: flex-start; }
  .step-num { width: 26px; height: 26px; border-radius: 7px; background: var(--blue-dim); color: var(--blue); font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .step-text { font-size: 13.5px; line-height: 1.4; padding-top: 3px; }
  .step-text b { display: block; font-size: 14px; margin-bottom: 2px; }

  .req-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .req-row:last-child { border-bottom: none; padding-bottom: 0; }
  .req-row .k { color: var(--text-dim); }
  .req-row .v { font-weight: 700; text-align: right; max-width: 60%; }

  .btn { width: 100%; padding: 16px; border: none; border-radius: 9px; font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit; }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-done { background: var(--lime-dim); color: var(--lime); }
  .link-box { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 9px; padding: 12px; margin-top: 12px; font-family: monospace; font-size: 11.5px; word-break: break-all; }

  .aff-input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 9px; font-size: 13.5px; margin-bottom: 10px; font-family: inherit; }
  .aff-status { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 10px 12px; border-radius: 9px; }
  .aff-status.pending { background: rgba(251,191,36,0.14); color: var(--amber); }
  .aff-status.approved { background: var(--lime-dim); color: var(--lime); }
</style>
</head>
<body>
  <div class="container">
    <div class="top">
      <button class="back" onclick="history.back()"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
    </div>

    <div class="hero">
      <div class="hero-top">
        <div class="hero-ico"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v9H4v-9M2 7h20v5H2zM12 22V7M12 7C10 4 6 3 5 5s1 2 3 2h4ZM12 7c2-3 6-4 7-2s-1 2-3 2h-4Z"/></svg></div>
        <div>
          <div class="hero-title" id="titolo">Caricamento...</div>
          <div class="stato-badge" id="statoBadge"></div>
        </div>
      </div>
      <p class="hero-desc" id="descrizione"></p>
    </div>

    <div class="stat-grid">
      <div class="stat-box"><div class="label">Split</div><div class="value" id="split">-</div></div>
      <div class="stat-box"><div class="label">Prezzo</div><div class="value" id="prezzo">-</div></div>
    </div>

    <div class="card" id="reqCard" style="display:none">
      <h2>Dettagli</h2>
      <div id="reqRows"></div>
    </div>

    <div class="card">
      <h2 id="stepsTitle">Come funziona</h2>
      <div class="steps" id="stepsList"></div>
    </div>

    <button class="btn btn-primary" id="attivaBtn">Attiva questo servizio</button>
    <div class="link-box" id="linkBox" style="display:none"></div>

    <div class="card" id="affCard" style="display:none">
      <h2>Diventa affiliato di questo servizio</h2>
      <div id="affForm">
        <p style="font-size:13px;color:var(--text-dim);margin-bottom:12px;line-height:1.5">Inserisci il tuo link personale per questo servizio. Chi inviti tramite la tua rete vedrà questo link invece di quello principale, una volta approvato.</p>
        <input type="text" class="aff-input" id="affLinkInput" placeholder="https://..." />
        <button class="btn btn-primary" id="affSubmitBtn">Invia per approvazione</button>
      </div>
      <div id="affStatus" style="display:none"></div>
    </div>
  </div>

  <script>
    window.addEventListener("pageshow", (e) => { if (e.persisted) window.location.reload(); });
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const API_URL = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const initData = tg?.initData || "";
    const servizioId = new URLSearchParams(window.location.search).get("id");

    async function load() {
      const res = await fetch(`${API_URL}/servizio?id=${servizioId}`, { headers: { "x-telegram-init-data": initData }, cache: "no-store" });
      const data = await res.json();
      const s = data.servizio;
      if (!s) { document.getElementById("titolo").textContent = "Servizio non trovato"; return; }

      document.getElementById("titolo").textContent = s.nome;
      document.getElementById("descrizione").textContent = s.descrizione || "";
      document.getElementById("split").textContent = s.split_percent ? `${s.split_percent}%` : "-";
      document.getElementById("prezzo").textContent = s.prezzo || "-";

      const badge = document.getElementById("statoBadge");
      badge.className = `stato-badge ${s.stato}`;
      badge.textContent = s.stato;

      const stepsList = document.getElementById("stepsList");
      const customSteps = Array.isArray(s.tutorial_steps) ? s.tutorial_steps : [];
      if (customSteps.length) {
        document.getElementById("stepsTitle").textContent = "Come funziona";
        stepsList.innerHTML = customSteps.map((st, i) => `
          <div class="step"><div class="step-num">${i + 1}</div><div class="step-text"><b>${st.titolo}</b>${st.testo}</div></div>
        `).join("");
      } else {
        stepsList.innerHTML = `
          <div class="step"><div class="step-num">1</div><div class="step-text"><b>Guarda il tutorial completo</b>Trovi la spiegazione passo-passo di questo metodo (in arrivo qui).</div></div>
          <div class="step"><div class="step-num">2</div><div class="step-text"><b>Verifica i requisiti</b>Controlla capitale e strumenti richiesti qui sopra.</div></div>
          <div class="step"><div class="step-num">3</div><div class="step-text"><b>Attiva il servizio</b>Premi il bottone qui sotto per segnalare il tuo interesse.</div></div>
          <div class="step"><div class="step-num">4</div><div class="step-text"><b>Ricevi il tuo link</b>Ti diamo il link giusto per iniziare, personale o dell'affiliato che ti ha invitato.</div></div>
        `;
      }

      if (s.requisiti || s.costi) {
        document.getElementById("reqCard").style.display = "block";
        const rows = document.getElementById("reqRows");
        let html = "";
        if (s.requisiti) html += `<div class="req-row"><span class="k">Requisiti</span><span class="v">${s.requisiti}</span></div>`;
        if (s.costi) html += `<div class="req-row"><span class="k">Costi</span><span class="v">${s.costi}</span></div>`;
        rows.innerHTML = html;
      }

      const btn = document.getElementById("attivaBtn");
      if (data.gia_interessato) {
        btn.className = "btn btn-done";
        btn.textContent = "✓ Interesse già registrato";
        btn.disabled = true;
        if (data.ref_link) {
          document.getElementById("linkBox").style.display = "block";
          document.getElementById("linkBox").textContent = data.ref_link;
        }
      } else if (!data.sondaggio_completato) {
        btn.textContent = "Completa l'anagrafica per attivare";
        btn.onclick = () => window.location.href = `sondaggio.html?_=${Date.now()}`;
      } else {
        btn.onclick = async () => {
          btn.textContent = "...";
          btn.disabled = true;
          const r = await fetch(`${API_URL}/attiva`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-telegram-init-data": initData },
            body: JSON.stringify({ servizio_id: parseInt(servizioId) }),
          });
          const result = await r.json();
          if (result.error === "anagrafica_richiesta") {
            btn.textContent = "Completa l'anagrafica per attivare";
            btn.disabled = false;
            btn.onclick = () => window.location.href = `sondaggio.html?_=${Date.now()}`;
            return;
          }
          btn.className = "btn btn-done";
          btn.textContent = "✓ Interesse registrato";
          if (result.ref_link) {
            document.getElementById("linkBox").style.display = "block";
            document.getElementById("linkBox").textContent = result.ref_link;
          }
          renderAffiliateCard({ ...data, is_cliente: true });
        };
      }

      renderAffiliateCard(data);
    }

    function renderAffiliateCard(data) {
      if (!data.is_cliente) return;
      const card = document.getElementById("affCard");
      card.style.display = "block";

      if (data.mio_link) {
        document.getElementById("affForm").style.display = "none";
        const status = document.getElementById("affStatus");
        status.style.display = "flex";
        if (data.mio_link.approvato) {
          status.className = "aff-status approved";
          status.textContent = "✓ Link approvato — attivo per la tua rete";
        } else {
          status.className = "aff-status pending";
          status.textContent = "In attesa di approvazione";
        }
      } else {
        document.getElementById("affSubmitBtn").onclick = async () => {
          const link = document.getElementById("affLinkInput").value.trim();
          if (!link) return;
          const submitBtn = document.getElementById("affSubmitBtn");
          submitBtn.textContent = "Invio...";
          submitBtn.disabled = true;
          await fetch(`${API_URL}/affiliate-link`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-telegram-init-data": initData },
            body: JSON.stringify({ servizio_id: parseInt(servizioId), ref_link: link }),
          });
          document.getElementById("affForm").style.display = "none";
          const status = document.getElementById("affStatus");
          status.style.display = "flex";
          status.className = "aff-status pending";
          status.textContent = "In attesa di approvazione";
        };
      }
    }

    load();
  </script>
</body>
</html>
