<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>3 direzioni di design</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",ui-sans-serif,sans-serif; -webkit-font-smoothing:antialiased; }
  body{ background:#05060a; color:#fff; padding:18px 12px 60px; }
  .wrap{ max-width:400px; margin:0 auto; }
  .intro{ font-size:13px; color:#8b90a0; text-align:center; margin-bottom:18px; line-height:1.5; }
  .tlabel{ font-size:12px; font-weight:800; color:#8b90a0; text-transform:uppercase; letter-spacing:.08em; margin:30px 0 3px; }
  .tname{ font-size:16px; font-weight:800; margin-bottom:13px; color:#fff; }

  .frame{ background:var(--bg); border-radius:20px; padding:16px; color:var(--tx); box-shadow:0 10px 40px rgba(0,0,0,.5); }
  .A{ --bg:#181b22; --card:#232834; --card2:#2b313f; --bd:#30374a; --tx:#f5f6f9; --dim:#98a0b2; --ac:#2ecc71; --acbg:rgba(46,204,113,.15); --acty:#06110b; --sh:0 4px 14px rgba(0,0,0,.35); }
  .B{ --bg:#1a1713; --card:#26221a; --card2:#302a1f; --bd:#3b3527; --tx:#f8f4ec; --dim:#b3aa96; --ac:#e0a63c; --acbg:rgba(224,166,60,.15); --acty:#1a1408; --sh:0 4px 14px rgba(0,0,0,.4); }
  .C{ --bg:#eef2f8; --card:#ffffff; --card2:#f4f7fc; --bd:#e4e9f2; --tx:#141922; --dim:#6b7280; --ac:#1f9d63; --acbg:rgba(31,157,99,.10); --acty:#ffffff; --sh:0 3px 12px rgba(20,30,60,.09); }

  .hdr{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:18px; }
  .hid{ display:flex; align-items:center; gap:12px; }
  .av{ width:44px; height:44px; border-radius:50%; background:linear-gradient(135deg,#3a4358,#525d78); }
  .hs{ font-size:11.5px; color:var(--dim); font-weight:600; }
  .hi{ font-size:17px; font-weight:800; color:var(--tx); letter-spacing:-.01em; }
  .acts{ display:flex; gap:8px; }
  .ib{ width:36px; height:36px; border-radius:10px; background:var(--card2); border:1px solid var(--bd); display:flex; align-items:center; justify-content:center; color:var(--dim); }
  .ib.plus{ background:var(--ac); color:var(--acty); border:none; }

  .lbl{ font-size:11.5px; font-weight:800; color:var(--dim); text-transform:uppercase; letter-spacing:.07em; margin:0 2px 10px; }
  .biz{ background:var(--card); border:1px solid var(--bd); border-radius:14px; padding:0 15px; margin-bottom:12px; box-shadow:var(--sh); }
  .row{ display:flex; align-items:center; gap:13px; padding:15px 0; }
  .ti{ width:42px; height:42px; border-radius:11px; background:var(--acbg); color:var(--ac); display:flex; align-items:center; justify-content:center; }
  .nm{ flex:1; font-size:15.5px; font-weight:700; color:var(--tx); letter-spacing:-.01em; }
  .dot{ width:9px; height:9px; border-radius:50%; background:var(--ac); display:inline-block; margin-right:8px; vertical-align:1px; }
  .vt{ display:flex; flex-direction:column; align-items:center; gap:1px; color:var(--dim); font-size:13px; font-weight:800; }

  .open{ padding-bottom:15px; }
  .sec{ font-size:12px; font-weight:800; color:var(--tx); text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid var(--bd); padding-bottom:12px; margin:6px 0 13px; }
  .desc{ font-size:14px; color:var(--dim); line-height:1.6; margin-bottom:13px; }
  .tempo{ font-size:12.5px; color:var(--dim); margin-bottom:11px; display:flex; align-items:center; gap:6px; }
  .stp{ display:flex; gap:12px; background:var(--card2); border:1px solid var(--bd); border-radius:10px; padding:13px; margin-bottom:9px; align-items:center; }
  .sn{ width:27px; height:27px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; background:var(--card); border:1px solid var(--bd); color:var(--dim); }
  .stp.cur{ border-color:var(--ac); } .stp.cur .sn{ border-color:var(--ac); color:var(--ac); }
  .stp.dn .sn{ background:var(--ac); border-color:var(--ac); color:var(--acty); }
  .sb{ font-size:14.5px; font-weight:700; color:var(--tx); }
  .cta{ display:block; text-align:center; width:100%; padding:15px; border-radius:11px; background:var(--ac); color:var(--acty); font-size:15px; font-weight:800; margin-top:8px; letter-spacing:-.01em; }
  .ico{ width:16px; height:16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="intro">3 direzioni con carattere diverso (non solo chiaro/scuro).<br/>Dimmi la lettera (A, B o C).</div>
  <div id="host"></div>
</div>
<script>
  var CLOCK='<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 2"/></svg>';
  var GRID='<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><rect x="3" y="3" width="7" height="7" rx="1.6"/><rect x="14" y="3" width="7" height="7" rx="1.6"/><rect x="3" y="14" width="7" height="7" rx="1.6"/><rect x="14" y="14" width="7" height="7" rx="1.6"/></svg>';
  function screen(){
    return '<div class="hdr"><div class="hid"><div class="av"></div><div><div class="hs">Bentornato</div><div class="hi">Antony</div></div></div>'
      +'<div class="acts"><div class="ib plus">+</div><div class="ib">↗</div><div class="ib">↻</div></div></div>'
      +'<div class="lbl">Business list</div>'
      +'<div class="biz"><div class="row"><div class="ti">'+GRID+'</div><div class="nm"><span class="dot"></span>Broker VS Broker Swap</div><div class="vt">▲<span>24</span></div></div></div>'
      +'<div class="biz"><div class="row"><div class="ti">'+GRID+'</div><div class="nm">Prop VS Broker</div><div class="vt">▲<span>18</span></div></div>'
      +'<div class="open"><div class="sec">Come funziona</div><div class="desc">Apri posizioni opposte su due broker per incassare la differenza di swap, coperto dal rischio di prezzo.</div>'
      +'<div class="tempo">'+CLOCK+'Tempo per attivarlo: circa 15 min</div>'
      +'<div class="stp dn"><div class="sn">✓</div><div class="sb">Registra il primo broker</div></div>'
      +'<div class="stp cur"><div class="sn">2</div><div class="sb">Registra il secondo broker</div></div>'
      +'<a class="cta">Iscriviti con il link</a></div></div>'
      +'<div class="biz"><div class="row"><div class="ti">'+GRID+'</div><div class="nm">Bonus ADM</div><div class="vt">▲<span>11</span></div></div></div>';
  }
  var T=[['A','Growth — scuro elegante, accento verde'],['B','Gold — caldo premium, accento oro'],['C','Clean — chiaro professionale']];
  document.getElementById('host').innerHTML = T.map(function(t){
    return '<div class="tlabel">Direzione '+t[0]+'</div><div class="tname">'+t[1]+'</div><div class="frame '+t[0]+'">'+screen()+'</div>';
  }).join('');
</script>
</body>
</html>
