<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<title>Admin - Business UP</title>
<style>
  :root {
    --ink: #0d0e15;
    --panel: #171a28;
    --panel-2: #1c1f2b;
    --blue: #4a90e2;
    --blue-dim: rgba(74, 144, 226, 0.16);
    --lime: #2ecc71;
    --lime-dim: rgba(46, 204, 113, 0.16);
    --amber: #e8b34c;
    --coral: #e2574a;
    --text: #f2f3f7;
    --text-dim: #8b90a0;
    --border: #1e2130;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-variant-numeric: tabular-nums; }
  body { min-height: 100vh; background: var(--ink); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", ui-sans-serif, sans-serif; }
  .page { max-width: 760px; margin: 0 auto; padding: 24px 20px 60px; }

  /* Gate */
  #gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .gate-box { width: 100%; max-width: 320px; text-align: center; }
  .gate-box h1 { font-size: 18px; margin-bottom: 16px; }
  .gate-box input { width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 4px; font-size: 14px; margin-bottom: 10px; }
  .gate-box button { width: 100%; padding: 12px; border: none; border-radius: 4px; background: var(--lime); color: #06110b; font-weight: 700; font-size: 14px; cursor: pointer; }
  .gate-error { color: var(--coral); font-size: 12.5px; margin-top: 8px; display: none; }

  h1.title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-box { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 14px; text-align: center; }
  .stat-box .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-box .value { font-size: 22px; font-weight: 700; }

  .section { margin-bottom: 28px; }
  .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .section-head h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-dim); font-weight: 700; }
  .btn-add { background: var(--blue-dim); color: var(--blue); border: none; padding: 7px 12px; border-radius: 4px; font-size: 12.5px; font-weight: 700; cursor: pointer; }

  .item { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 14px; margin-bottom: 8px; }
  .item-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .item-title { font-size: 14.5px; font-weight: 700; }
  .item-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .item-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn { width: 30px; height: 30px; border-radius: 4px; background: var(--panel-2); border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .icon-btn:hover { color: var(--text); }
  .icon-btn.danger:hover { color: var(--coral); }

  .badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
  .badge.attivo { background: var(--lime-dim); color: var(--lime); }
  .badge.pausa { background: rgba(232,179,76,0.14); color: var(--amber); }
  .badge.fermo { background: rgba(226,87,74,0.12); color: var(--coral); }
  .badge.pending { background: rgba(232,179,76,0.14); color: var(--amber); }
  .badge.approved { background: var(--lime-dim); color: var(--lime); }
  .link-preview { font-size: 11.5px; color: var(--text-dim); font-family: monospace; word-break: break-all; margin-top: 6px; }

  /* Form modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: flex-end; justify-content: center; z-index: 100; }
  .overlay.open { display: flex; }
  .modal { background: var(--ink); border: 1px solid var(--border); border-radius: 4px 4px 0 0; width: 100%; max-width: 760px; max-height: 88vh; overflow-y: auto; padding: 20px; }
  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; font-weight: 600; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text);
    padding: 10px 12px; border-radius: 4px; font-size: 13.5px; font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 60px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .step-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
  .step-row .step-fields { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .step-row input, .step-row textarea { font-size: 13px; }

  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .btn { flex: 1; padding: 13px; border: none; border-radius: 4px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit; }
  .btn-primary { background: var(--lime); color: #06110b; }
  .btn-secondary { background: var(--panel); border: 1px solid var(--border); color: var(--text); }
  .btn-small { padding: 8px 10px; font-size: 12.5px; flex: none; }

  .empty { text-align: center; color: var(--text-dim); font-size: 13px; padding: 20px 0; }
</style>
</head>
<body>

  <div id="gate">
    <div class="gate-box">
      <h1>Business UP — Admin</h1>
      <input type="password" id="keyInput" placeholder="Admin key" />
      <button onclick="tryLogin()">Entra</button>
      <div class="gate-error" id="gateError">Chiave errata.</div>
    </div>
  </div>

  <div class="page" id="app" style="display:none">
    <h1 class="title">Business List — Admin</h1>
    <p class="subtitle">Gestisci categorie e servizi visibili nella Mini App</p>

    <div class="stat-grid">
      <div class="stat-box"><div class="label">Leads totali</div><div class="value" id="statLeads">-</div></div>
      <div class="stat-box"><div class="label">Clienti</div><div class="value" id="statQualificati">-</div></div>
    </div>

    <div class="section">
      <div class="section-head">
        <h2>Macro categorie</h2>
        <button class="btn-add" onclick="openMacroForm()">+ Nuova macro categoria</button>
      </div>
      <div id="macroList"></div>
    </div>

    <div class="section">
      <div class="section-head">
        <h2>Categorie</h2>
        <button class="btn-add" onclick="openCategoriaForm()">+ Nuova categoria</button>
      </div>
      <div id="categorieList"></div>
    </div>

    <div class="section">
      <div class="section-head">
        <h2>Servizi</h2>
        <button class="btn-add" onclick="openServizioForm()">+ Nuovo servizio</button>
      </div>
      <div id="serviziList"></div>
    </div>

    <div class="section">
      <div class="section-head">
        <h2>Link affiliato da approvare</h2>
      </div>
      <div id="affLinksList"></div>
    </div>

    <div class="section">
      <div class="section-head">
        <h2>Suggerimenti dagli utenti</h2>
      </div>
      <div id="suggerimentiList"></div>
    </div>
  </div>

  <!-- Modal Macro Categoria -->
  <div class="overlay" id="macroOverlay">
    <div class="modal">
      <h3 id="macroModalTitle">Nuova macro categoria</h3>
      <input type="hidden" id="macroId" />
      <div class="field"><label>Nome</label><input id="macroNome" /></div>
      <div class="field"><label>Ordine</label><input id="macroOrdine" type="number" value="0" /></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('macroOverlay')">Annulla</button>
        <button class="btn btn-primary" onclick="saveMacro()">Salva</button>
      </div>
    </div>
  </div>

  <!-- Modal Categoria -->
  <div class="overlay" id="catOverlay">
    <div class="modal">
      <h3 id="catModalTitle">Nuova categoria</h3>
      <input type="hidden" id="catId" />
      <div class="field"><label>Nome</label><input id="catNome" /></div>
      <div class="field"><label>Macro categoria</label><select id="catMacro"></select></div>
      <div class="field"><label>Descrizione</label><textarea id="catDescrizione"></textarea></div>
      <div class="field"><label>Ordine</label><input id="catOrdine" type="number" value="0" /></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('catOverlay')">Annulla</button>
        <button class="btn btn-primary" onclick="saveCategoria()">Salva</button>
      </div>
    </div>
  </div>

  <!-- Modal Servizio -->
  <div class="overlay" id="svcOverlay">
    <div class="modal">
      <h3 id="svcModalTitle">Nuovo servizio</h3>
      <input type="hidden" id="svcId" />
      <div class="field"><label>Nome</label><input id="svcNome" /></div>
      <div class="field"><label>Categoria</label><select id="svcCategoria"></select></div>
      <div class="row2">
        <div class="field"><label>Tipo</label><input id="svcTipo" placeholder="es: swap, bonus, prop" /></div>
        <div class="field"><label>Stato</label>
          <select id="svcStato">
            <option value="attivo">Attivo</option>
            <option value="pausa">Pausa</option>
            <option value="fermo">Fermo</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Descrizione</label><textarea id="svcDescrizione"></textarea></div>
      <div class="row2">
        <div class="field"><label>Split %</label><input id="svcSplit" type="number" /></div>
        <div class="field"><label>Prezzo</label><input id="svcPrezzo" placeholder="es: Abbonamento mensile" /></div>
      </div>
      <div class="row2">
        <div class="field"><label>Requisiti</label><input id="svcRequisiti" /></div>
        <div class="field"><label>Costi</label><input id="svcCosti" /></div>
      </div>
      <div class="row2">
        <div class="field"><label>Link principale</label><input id="svcLink" /></div>
        <div class="field"><label>Ordine</label><input id="svcOrdine" type="number" value="0" /></div>
      </div>
      <div class="row2">
        <div class="field"><label>Tempo stimato (es. 5 min)</label><input id="svcTempo" /></div>
        <div class="field"><label>Difficoltà</label>
          <select id="svcDifficolta">
            <option value="">—</option>
            <option value="Facile">Facile</option>
            <option value="Medio">Medio</option>
            <option value="Avanzato">Avanzato</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Tutorial — step "Come funziona"</label>
        <div id="stepsEditor"></div>
        <button class="btn btn-secondary btn-small" onclick="addStepRow()">+ Aggiungi step</button>
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('svcOverlay')">Annulla</button>
        <button class="btn btn-primary" onclick="saveServizio()">Salva</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    let ADMIN_KEY = localStorage.getItem("bu_admin_key") || "";
    let macroCategorie = [];
    let categorie = [];
    let servizi = [];

    function api(path, opts = {}) {
      return fetch(`${API_URL}/${path}`, {
        ...opts,
        headers: { "Content-Type": "application/json", "x-admin-key": ADMIN_KEY, ...(opts.headers || {}) },
      });
    }

    async function tryLogin() {
      ADMIN_KEY = document.getElementById("keyInput").value.trim();
      const res = await api("admin/stats");
      if (!res.ok) {
        document.getElementById("gateError").style.display = "block";
        return;
      }
      localStorage.setItem("bu_admin_key", ADMIN_KEY);
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display = "block";
      loadAll();
    }

    async function loadAll() {
      const stats = await (await api("admin/stats")).json();
      document.getElementById("statLeads").textContent = stats.leads ?? 0;
      document.getElementById("statQualificati").textContent = stats.clienti ?? 0;

      const macroRes = await (await api("admin/macro-categorie")).json();
      macroCategorie = macroRes.macro_categorie || [];
      renderMacro();

      const catRes = await (await api("admin/categorie")).json();
      categorie = catRes.categorie || [];
      renderCategorie();

      const svcRes = await (await api("admin/servizi")).json();
      servizi = svcRes.servizi || [];
      renderServizi();

      const linksRes = await (await api("admin/affiliate-links")).json();
      renderAffLinks(linksRes.links || []);

      const sugRes = await (await api("admin/suggerimenti")).json();
      renderSuggerimenti(sugRes.suggerimenti || []);
    }

    function renderSuggerimenti(suggerimenti) {
      const el = document.getElementById("suggerimentiList");
      if (!suggerimenti.length) { el.innerHTML = '<p class="empty">Nessuna candidatura dagli utenti.</p>'; return; }
      const STATO_BADGE = { in_revisione: "pending", approvato: "approved", rifiutato: "fermo" };
      const STATO_LABEL = { in_revisione: "In attesa", approvato: "Approvato", rifiutato: "Rifiutato" };
      el.innerHTML = suggerimenti.map((s) => `
        <div class="item">
          <div class="item-head">
            <div style="min-width:0">
              <div class="item-title">${s.nome} <span class="badge ${STATO_BADGE[s.stato] || "pending"}">${STATO_LABEL[s.stato] || s.stato}</span></div>
              <div class="item-meta">da ${s.utente_nome} (ID ${s.telegram_id}) · ${s.categoria_nome} · ${new Date(s.created_at).toLocaleDateString("it-IT")}</div>
              ${s.motivazione ? `<div class="item-meta">Perché: ${s.motivazione}</div>` : ""}
              ${s.link ? `<div class="link-preview">${s.link}</div>` : ""}
              ${s.ref_link_utente ? `<div class="link-preview">Ref utente: ${s.ref_link_utente}</div>` : ""}
              ${s.causale_rifiuto ? `<div class="item-meta" style="color:var(--coral)">Rifiutato: ${s.causale_rifiuto}</div>` : ""}
            </div>
            <div class="item-actions">
              <button class="icon-btn danger" onclick="deleteSuggerimento(${s.id})" title="Elimina">✕</button>
            </div>
          </div>
          ${s.stato === "in_revisione" ? `
          <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center">
            ${s.ref_link_utente ? `<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim)"><input type="checkbox" id="reward-${s.id}" checked /> Inserisci il link dell'utente come reward</label>` : ""}
            <button class="btn btn-primary btn-small" onclick="approvaSuggerimento(${s.id})">✓ APPROVA</button>
            <select id="causale-${s.id}" style="background:var(--panel);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:4px;font-size:12px;font-family:inherit">
              <option value="non_conforme">Non conforme</option>
              <option value="dati_mancanti">Dati mancanti</option>
              <option value="sospetto_scam">Sospetto scam</option>
            </select>
            <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--coral)"><input type="checkbox" id="blocca-${s.id}" /> Blocca utente</label>
            <button class="btn btn-secondary btn-small" style="color:var(--coral)" onclick="rifiutaSuggerimento(${s.id})">✕ RIFIUTA</button>
          </div>` : ""}
        </div>
      `).join("");
    }

    async function approvaSuggerimento(id) {
      if (!confirm("Approvare? Il business apparirà subito nella lista pubblica.")) return;
      const reward = document.getElementById(`reward-${id}`)?.checked || false;
      const res = await api("admin/suggerimenti/approva", { method: "POST", body: JSON.stringify({ id, inserisci_link_utente: reward }) });
      if (!res.ok) { const e = await res.json().catch(() => ({})); alert("Errore: " + (e.error || res.status)); return; }
      loadAll();
    }

    async function rifiutaSuggerimento(id) {
      const causale = document.getElementById(`causale-${id}`).value;
      const blocca = document.getElementById(`blocca-${id}`).checked;
      if (!confirm(`Rifiutare con causale "${causale}"${blocca ? " e BLOCCARE l'utente" : ""}? L'utente riceverà il motivo su Telegram.`)) return;
      const res = await api("admin/suggerimenti/rifiuta", { method: "POST", body: JSON.stringify({ id, causale, blocca }) });
      if (!res.ok) { const e = await res.json().catch(() => ({})); alert("Errore: " + (e.error || res.status)); return; }
      loadAll();
    }

    async function deleteSuggerimento(id) {
      if (!confirm("Eliminare questa candidatura?")) return;
      await api("admin/suggerimenti/delete", { method: "POST", body: JSON.stringify({ id }) });
      loadAll();
    }

    function renderAffLinks(links) {
      const el = document.getElementById("affLinksList");
      if (!links.length) { el.innerHTML = '<p class="empty">Nessun link inviato dagli affiliati.</p>'; return; }
      el.innerHTML = links.map((l) => `
        <div class="item">
          <div class="item-head">
            <div>
              <div class="item-title">${l.utente_nome} <span class="badge ${l.approvato ? "approved" : "pending"}">${l.approvato ? "approvato" : "in attesa"}</span></div>
              <div class="item-meta">${l.servizio_nome}</div>
              <div class="link-preview">${l.ref_link}</div>
            </div>
            <div class="item-actions">
              ${l.approvato ? "" : `<button class="icon-btn" onclick="approveAffLink(${l.id})" title="Approva">✓</button>`}
              <button class="icon-btn danger" onclick="deleteAffLink(${l.id})" title="Rifiuta/Elimina">✕</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    async function approveAffLink(id) {
      await api("admin/affiliate-links/approve", { method: "POST", body: JSON.stringify({ id }) });
      loadAll();
    }

    async function deleteAffLink(id) {
      if (!confirm("Rimuovere questo link?")) return;
      await api("admin/affiliate-links/delete", { method: "POST", body: JSON.stringify({ id }) });
      loadAll();
    }

    function renderMacro() {
      const el = document.getElementById("macroList");
      if (!macroCategorie.length) { el.innerHTML = '<p class="empty">Nessuna macro categoria.</p>'; return; }
      el.innerHTML = macroCategorie.map((m) => `
        <div class="item">
          <div class="item-head">
            <div class="item-title">${m.nome}</div>
            <div class="item-actions">
              <button class="icon-btn" onclick='openMacroForm(${JSON.stringify(m)})'>✎</button>
              <button class="icon-btn danger" onclick="deleteMacro(${m.id})">✕</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    function openMacroForm(m) {
      document.getElementById("macroModalTitle").textContent = m ? "Modifica macro categoria" : "Nuova macro categoria";
      document.getElementById("macroId").value = m?.id || "";
      document.getElementById("macroNome").value = m?.nome || "";
      document.getElementById("macroOrdine").value = m?.ordine ?? 0;
      openModal("macroOverlay");
    }

    async function saveMacro() {
      const body = {
        id: document.getElementById("macroId").value || undefined,
        nome: document.getElementById("macroNome").value.trim(),
        ordine: parseInt(document.getElementById("macroOrdine").value) || 0,
      };
      await api("admin/macro-categorie/save", { method: "POST", body: JSON.stringify(body) });
      closeModal("macroOverlay");
      loadAll();
    }

    async function deleteMacro(id) {
      if (!confirm("Eliminare questa macro categoria? Le categorie collegate resteranno senza macro.")) return;
      await api("admin/macro-categorie/delete", { method: "POST", body: JSON.stringify({ id }) });
      loadAll();
    }

    function renderCategorie() {
      const el = document.getElementById("categorieList");
      if (!categorie.length) { el.innerHTML = '<p class="empty">Nessuna categoria.</p>'; return; }
      el.innerHTML = categorie.map((c) => {
        const macro = macroCategorie.find((m) => m.id === c.macro_categoria_id);
        return `
        <div class="item">
          <div class="item-head">
            <div>
              <div class="item-title">${c.nome}</div>
              <div class="item-meta">${macro ? macro.nome : "Nessuna macro"} ${c.descrizione ? "· " + c.descrizione : ""}</div>
            </div>
            <div class="item-actions">
              <button class="icon-btn" onclick='openCategoriaForm(${JSON.stringify(c)})'>✎</button>
              <button class="icon-btn danger" onclick="deleteCategoria(${c.id})">✕</button>
            </div>
          </div>
        </div>
      `;
      }).join("");
    }

    function renderServizi() {
      const el = document.getElementById("serviziList");
      if (!servizi.length) { el.innerHTML = '<p class="empty">Nessun servizio.</p>'; return; }
      el.innerHTML = servizi.map((s) => {
        const cat = categorie.find((c) => c.id === s.categoria_id);
        return `
        <div class="item">
          <div class="item-head">
            <div>
              <div class="item-title">${s.nome} <span class="badge ${s.stato}">${s.stato}</span></div>
              <div class="item-meta">${cat ? cat.nome : "—"} ${s.split_percent ? `· Split ${s.split_percent}%` : ""}</div>
            </div>
            <div class="item-actions">
              <button class="icon-btn" onclick='openServizioForm(${JSON.stringify(s).replace(/'/g, "&apos;")})'>✎</button>
              <button class="icon-btn danger" onclick="deleteServizio(${s.id})">✕</button>
            </div>
          </div>
        </div>
      `;
      }).join("");
    }

    function openModal(id) { document.getElementById(id).classList.add("open"); }
    function closeModal(id) { document.getElementById(id).classList.remove("open"); }

    function openCategoriaForm(c) {
      document.getElementById("catModalTitle").textContent = c ? "Modifica categoria" : "Nuova categoria";
      document.getElementById("catId").value = c?.id || "";
      document.getElementById("catNome").value = c?.nome || "";
      const macroSel = document.getElementById("catMacro");
      macroSel.innerHTML = '<option value="">— Nessuna —</option>' + macroCategorie.map((m) => `<option value="${m.id}">${m.nome}</option>`).join("");
      macroSel.value = c?.macro_categoria_id || "";
      document.getElementById("catDescrizione").value = c?.descrizione || "";
      document.getElementById("catOrdine").value = c?.ordine ?? 0;
      openModal("catOverlay");
    }

    async function saveCategoria() {
      const body = {
        id: document.getElementById("catId").value || undefined,
        nome: document.getElementById("catNome").value.trim(),
        macro_categoria_id: document.getElementById("catMacro").value || null,
        descrizione: document.getElementById("catDescrizione").value.trim(),
        ordine: parseInt(document.getElementById("catOrdine").value) || 0,
      };
      await api("admin/categorie/save", { method: "POST", body: JSON.stringify(body) });
      closeModal("catOverlay");
      loadAll();
    }

    async function deleteCategoria(id) {
      if (!confirm("Eliminare questa categoria? I servizi collegati resteranno orfani.")) return;
      await api("admin/categorie/delete", { method: "POST", body: JSON.stringify({ id }) });
      loadAll();
    }

    function addStepRow(step) {
      const wrap = document.createElement("div");
      wrap.className = "step-row";
      wrap.innerHTML = `
        <div class="step-fields">
          <input class="step-titolo" placeholder="Titolo step" value="${step?.titolo ? step.titolo.replace(/"/g, "&quot;") : ""}" />
          <textarea class="step-testo" placeholder="Testo">${step?.testo || ""}</textarea>
        </div>
        <button class="icon-btn danger" onclick="this.parentElement.remove()">✕</button>
      `;
      document.getElementById("stepsEditor").appendChild(wrap);
    }

    function openServizioForm(s) {
      document.getElementById("svcModalTitle").textContent = s ? "Modifica servizio" : "Nuovo servizio";
      document.getElementById("svcId").value = s?.id || "";
      document.getElementById("svcNome").value = s?.nome || "";
      document.getElementById("svcTipo").value = s?.tipo || "";
      document.getElementById("svcStato").value = s?.stato || "pausa";
      document.getElementById("svcDescrizione").value = s?.descrizione || "";
      document.getElementById("svcSplit").value = s?.split_percent ?? "";
      document.getElementById("svcPrezzo").value = s?.prezzo || "";
      document.getElementById("svcRequisiti").value = s?.requisiti || "";
      document.getElementById("svcCosti").value = s?.costi || "";
      document.getElementById("svcLink").value = s?.link_principale || "";
      document.getElementById("svcOrdine").value = s?.ordine ?? 0;
      document.getElementById("svcTempo").value = s?.tempo_stimato || "";
      document.getElementById("svcDifficolta").value = s?.difficolta || "";

      const catSelect = document.getElementById("svcCategoria");
      catSelect.innerHTML = categorie.map((c) => `<option value="${c.id}">${c.nome}</option>`).join("");
      if (s?.categoria_id) catSelect.value = s.categoria_id;

      document.getElementById("stepsEditor").innerHTML = "";
      const steps = Array.isArray(s?.tutorial_steps) ? s.tutorial_steps : [];
      steps.forEach((st) => addStepRow(st));

      openModal("svcOverlay");
    }

    async function saveServizio() {
      const steps = [...document.querySelectorAll("#stepsEditor .step-row")].map((row) => ({
        titolo: row.querySelector(".step-titolo").value.trim(),
        testo: row.querySelector(".step-testo").value.trim(),
      })).filter((s) => s.titolo || s.testo);

      const body = {
        id: document.getElementById("svcId").value || undefined,
        nome: document.getElementById("svcNome").value.trim(),
        categoria_id: parseInt(document.getElementById("svcCategoria").value),
        tipo: document.getElementById("svcTipo").value.trim(),
        stato: document.getElementById("svcStato").value,
        descrizione: document.getElementById("svcDescrizione").value.trim(),
        split_percent: document.getElementById("svcSplit").value ? parseInt(document.getElementById("svcSplit").value) : null,
        prezzo: document.getElementById("svcPrezzo").value.trim(),
        requisiti: document.getElementById("svcRequisiti").value.trim(),
        costi: document.getElementById("svcCosti").value.trim(),
        link_principale: document.getElementById("svcLink").value.trim(),
        ordine: parseInt(document.getElementById("svcOrdine").value) || 0,
        tempo_stimato: document.getElementById("svcTempo").value.trim(),
        difficolta: document.getElementById("svcDifficolta").value,
        tutorial_steps: steps,
      };
      await api("admin/servizi/save", { method: "POST", body: JSON.stringify(body) });
      closeModal("svcOverlay");
      loadAll();
    }

    async function deleteServizio(id) {
      if (!confirm("Eliminare questo servizio?")) return;
      await api("admin/servizi/delete", { method: "POST", body: JSON.stringify({ id }) });
      loadAll();
    }

    if (ADMIN_KEY) {
      document.getElementById("gate").style.display = "none";
      document.getElementById("app").style.display = "block";
      loadAll();
    }
  </script>
</body>
</html>
