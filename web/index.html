<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Business UP</title>
<style>
  :root { --ink: #0b0d13; --blue: #4c6ef5; --text-dim: #8890a6; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; background: var(--ink); color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", ui-sans-serif, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .mark {
    width: 52px; height: 52px; border-radius: 10px;
    background: var(--blue);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px; animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  .loader { text-align: center; }
  p { color: var(--text-dim); font-size: 14px; font-weight: 600; }
</style>
</head>
<body>
  <div class="loader">
    <div class="mark"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/></svg></div>
    <p>Caricamento...</p>
  </div>
  <script>
    window.location.replace(`dashboard.html?_=${Date.now()}`);
  </script>
</body>
</html>
