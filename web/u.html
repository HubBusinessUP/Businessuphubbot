<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Business UP</title>
<style>
  :root {
    --ink: #0d0e15;
    --panel: #171a28;
    --text: #f2f3f7;
    --text-dim: #8b90a0;
    --text-mute: #565c70;
    --green: #2ecc71;
    --border: #1e2130;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; background: var(--ink); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", ui-sans-serif, sans-serif;
    display: flex; justify-content: center;
  }
  .container { max-width: 420px; width: 100%; padding: 40px 20px 40px; }

  .hero { text-align: center; margin-bottom: 26px; }
  .avatar { width: 84px; height: 84px; border-radius: 50%; margin: 0 auto 14px; overflow: hidden; background: #3a4358; display: flex; align-items: center; justify-content: center; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar span { font-size: 26px; font-weight: 800; color: #fff; }

  .name { font-size: 17px; font-weight: 700; }
  .titolo { font-size: 12.5px; color: var(--text-dim); font-weight: 600; margin-top: 3px; }
  .bio { font-size: 12.5px; color: var(--text-dim); line-height: 1.55; margin-top: 10px; max-width: 320px; margin-left: auto; margin-right: auto; }

  .social-row { display: flex; justify-content: center; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .social-btn { width: 38px; height: 38px; border-radius: 4px; display: flex; align-items: center; justify-content: center; text-decoration: none; }

  .section-title { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }

  .item { background: var(--panel); border-radius: 4px; margin-bottom: 9px; overflow: hidden; }
  .item-head { display: flex; align-items: center; gap: 12px; padding: 14px; cursor: pointer; background: none; border: none; width: 100%; text-align: left; color: inherit; font: inherit; }
  .item-name { flex: 1; font-size: 13.5px; font-weight: 700; }
  .item-chevron { color: var(--text-mute); transition: transform 0.15s ease; flex-shrink: 0; }
  .item.open .item-chevron { transform: rotate(90deg); }
  .item-detail { display: none; padding: 0 14px 16px; }
  .item.open .item-detail { display: block; }
  .item-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; margin-bottom: 12px; }
  .cta { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 11px; border-radius: 4px; background: var(--green); color: #06110b; font-size: 12.5px; font-weight: 700; text-decoration: none; border: none; }

  .telegram-row { display: flex; align-items: center; gap: 12px; background: var(--panel); border-radius: 4px; padding: 14px; margin: 18px 0 0; text-decoration: none; color: inherit; }
  .telegram-ico { width: 38px; height: 38px; border-radius: 4px; background: #29a9eb; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .telegram-body { flex: 1; min-width: 0; }
  .telegram-name { font-size: 13.5px; font-weight: 700; }
  .telegram-sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

  .empty, .notfound { color: var(--text-dim); font-size: 13.5px; text-align: center; margin-top: 40px; }
  .footer { margin-top: 20px; text-align: center; }
  .footer a { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-mute); text-decoration: none; }
</style>
</head>
<body>
  <div class="container" id="root">
    <p class="empty">Caricamento...</p>
  </div>

  <script>
    const API_URL = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    const BOT_USERNAME = "hubbusinessup_bot";
    const code = new URLSearchParams(window.location.search).get("c") || "";

    function initials(name) {
      if (!name) return "??";
      return name.trim().slice(0, 2).toUpperCase();
    }

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function safeUrl(u) {
      try {
        const parsed = new URL(u, window.location.href);
        return parsed.protocol === "http:" || parsed.protocol === "https:" ? parsed.href : "";
      } catch {
        return "";
      }
    }

    const SOCIAL_ICONS = {
      instagram: { bg: "#E1306C", svg: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>' },
      telegram: { bg: "#29a9eb", svg: '<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="m22 2-7 20-4-9-9-4Z"/></svg>' },
      whatsapp: { bg: "#25D366", svg: '<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.6 1.4 5.1L2 22l5.1-1.3C8.5 21.5 10.2 22 12 22c5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18.1c-1.6 0-3.1-.4-4.5-1.2l-.3-.2-3.3.9.9-3.2-.2-.3C3.7 14 3.3 12.5 3.3 12c0-4.8 3.9-8.7 8.7-8.7s8.7 3.9 8.7 8.7-3.9 8.7-8.7 8.7z"/></svg>' },
      tiktok: { bg: "#1f2433", svg: '<svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M16.5 2h-3v13.5a3 3 0 1 1-2.2-2.9V9.4A6.5 6.5 0 1 0 16.5 15.8V8.9a7 7 0 0 0 4 1.3V6.9a4 4 0 0 1-4-4Z"/></svg>' },
      youtube: { bg: "#FF0000", svg: '<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M23 12s0-3.6-.5-5.3c-.3-1-1-1.7-2-2C18.9 4.2 12 4.2 12 4.2s-6.9 0-8.5.5c-1 .3-1.7 1-2 2C1 8.4 1 12 1 12s0 3.6.5 5.3c.3 1 1 1.7 2 2 1.6.5 8.5.5 8.5.5s6.9 0 8.5-.5c1-.3 1.7-1 2-2 .5-1.7.5-5.3.5-5.3ZM9.8 15.5v-7l6 3.5Z"/></svg>' },
      facebook: { bg: "#1877F2", svg: '<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M13.5 21v-8h2.7l.4-3.1h-3.1V8c0-.9.2-1.5 1.6-1.5h1.6V3.7C16.4 3.6 15.4 3.5 14.2 3.5c-2.6 0-4.4 1.6-4.4 4.5v2h-3v3.1h2.9v8Z"/></svg>' },
    };

    function socialRowHtml(socialLinks) {
      const items = (socialLinks || [])
        .map((s) => ({ ...s, safeHref: safeUrl(s.url) }))
        .filter((s) => s.safeHref && SOCIAL_ICONS[s.tipo]);
      if (!items.length) return "";
      return `<div class="social-row">${items.map((s) => `
        <a class="social-btn" style="background:${SOCIAL_ICONS[s.tipo].bg}" href="${escapeHtml(s.safeHref)}" target="_blank" rel="noopener nofollow">${SOCIAL_ICONS[s.tipo].svg}</a>
      `).join("")}</div>`;
    }

    function toggle(id) {
      document.getElementById(id).classList.toggle("open");
    }
    window.toggle = toggle;

    async function load() {
      const root = document.getElementById("root");
      if (!code) { root.innerHTML = '<p class="notfound">Pagina non trovata.</p>'; return; }

      const res = await fetch(`${API_URL}/pagina-pubblica?c=${encodeURIComponent(code)}`, { cache: "no-store" });
      if (!res.ok) { root.innerHTML = '<p class="notfound">Questa pagina non è disponibile.</p>'; return; }
      const data = await res.json();

      const botLink = `https://t.me/${BOT_USERNAME}?start=ref_${encodeURIComponent(code)}`;

      const linksHtml = (data.link || []).length
        ? data.link.map((l, i) => {
            const id = `it-${i}`;
            return `
            <div class="item${i === 0 ? " open" : ""}" id="${id}">
              <button class="item-head" onclick="toggle('${id}')">
                <div class="item-name">${escapeHtml(l.nome)}</div>
                <svg class="item-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m9 6 6 6-6 6"/></svg>
              </button>
              <div class="item-detail">
                ${l.descrizione ? `<div class="item-desc">${escapeHtml(l.descrizione)}</div>` : ""}
                <a class="cta" href="${escapeHtml(botLink)}" target="_blank" rel="noopener">Vai al tutorial <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#06110b" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></a>
              </div>
            </div>
          `;
          }).join("")
        : '<p class="empty">Nessun servizio disponibile al momento.</p>';

      const telegramHtml = data.username
        ? `
          <a class="telegram-row" href="${escapeHtml(`https://t.me/${data.username}`)}" target="_blank" rel="noopener nofollow">
            <div class="telegram-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="m22 2-7 20-4-9-9-4Z"/></svg></div>
            <div class="telegram-body">
              <div class="telegram-name">Scrivimi su Telegram</div>
              <div class="telegram-sub">@${escapeHtml(data.username)}</div>
            </div>
          </a>
        `
        : "";

      const safeFoto = safeUrl(data.bio_foto_url);
      root.innerHTML = `
        <div class="hero">
          <div class="avatar">
            ${safeFoto ? `<img src="${escapeHtml(safeFoto)}" alt="" onerror="this.remove()" />` : `<span>${escapeHtml(initials(data.nome))}</span>`}
          </div>
          <div class="name">${escapeHtml(data.nome)}</div>
          ${data.bio_titolo ? `<div class="titolo">${escapeHtml(data.bio_titolo)}</div>` : ""}
          ${data.bio_testo ? `<p class="bio">${escapeHtml(data.bio_testo)}</p>` : ""}
          ${socialRowHtml(data.social_links)}
        </div>

        <div class="section-title">Esplora Business List</div>
        ${linksHtml}
        ${telegramHtml}

        <div class="footer">
          <a href="${escapeHtml(`https://t.me/${BOT_USERNAME}`)}" target="_blank" rel="noopener">Apri Business UP <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></a>
        </div>
      `;
    }

    load();
  </script>
</body>
</html>
