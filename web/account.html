<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Il mio account - Business UP</title>
<style>
  :root {
    --ink: #0d0e15;
    --panel: #171a28;
    --blue: #4a90e2;
    --blue-dim: rgba(74, 144, 226, 0.16);
    --lime: #2ecc71;
    --lime-dim: rgba(46, 204, 113, 0.16);
    --text: #f2f3f7;
    --text-dim: #8b90a0;
    --border: #1e2130;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-variant-numeric: tabular-nums; }
  body {
    min-height: 100vh; background: var(--ink); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", ui-sans-serif, sans-serif;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 18px 16px 40px; }

  .top { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .back { width: 36px; height: 36px; border-radius: 4px; background: var(--panel); display: flex; align-items: center; justify-content: center; color: var(--text); flex-shrink: 0; cursor: pointer; border: none; }
  .top h1 { font-size: 19px; font-weight: 700; }
  .top p { font-size: 12.5px; color: var(--text-dim); margin-top: 1px; }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 18px; margin-bottom: 14px; }
  .card h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-dim); font-weight: 700; margin-bottom: 14px; }

  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 12.5px; font-weight: 700; margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text);
    padding: 12px; border-radius: 4px; font-size: 14px; font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 60px; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--blue); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn { width: 100%; padding: 15px; border: none; border-radius: 4px; font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit; }
  .btn-primary { background: var(--lime); color: #06110b; }
  .btn-done { background: var(--lime-dim); color: var(--lime); }
  .save-note { text-align: center; font-size: 12px; color: var(--text-dim); margin-top: 10px; }

  .profile-head { display: flex; align-items: center; gap: 14px; }
  .ph-avatar { width: 58px; height: 58px; border-radius: 50%; overflow: hidden; background: #3a4358; color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 17px; font-weight: 800; }
  .ph-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .ph-name { font-size: 17px; font-weight: 700; }
  .ph-user { font-size: 12.5px; color: var(--text-dim); margin-top: 1px; }
  .ph-badge { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 4px; margin-top: 7px; background: rgba(232,179,76,0.14); color: #e8b34c; }
  .ph-badge.ok { background: var(--lime-dim); color: var(--lime); }

  .perf-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .perf-box { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 12px 8px; text-align: center; }
  .perf-box .n { font-size: 20px; font-weight: 700; }
  .perf-box .n.lime { color: var(--lime); }
  .perf-box .l { font-size: 10px; color: var(--text-dim); margin-top: 3px; line-height: 1.3; }

  .invite-row { display: flex; align-items: center; gap: 8px; }
  .invite-link { flex: 1; min-width: 0; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 4px; padding: 11px 12px; font-size: 11.5px; color: var(--blue); word-break: break-all; }
  .invite-copy { width: 40px; height: 40px; border-radius: 4px; background: var(--blue); color: #fff; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

  .sugg-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .sugg-row:last-child { border-bottom: none; }
  .sugg-name { flex: 1; min-width: 0; font-size: 13px; font-weight: 600; }
  .sugg-stato { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; flex-shrink: 0; }
  .sugg-stato.in_revisione { background: rgba(232,179,76,0.14); color: #e8b34c; }
  .sugg-stato.approvato { background: var(--lime-dim); color: var(--lime); }
  .sugg-stato.rifiutato { background: rgba(226,87,74,0.12); color: #e2574a; }
  .sugg-why { background: none; border: none; color: #e2574a; cursor: pointer; font-size: 14px; flex-shrink: 0; padding: 2px; }

  .rete-search {
    width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 12px; border-radius: 4px; font-size: 13px; font-family: inherit; margin-bottom: 10px;
  }
  .rete-search:focus { outline: none; border-color: var(--blue); }

  .aff-row { display: flex; align-items: center; gap: 11px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .aff-row:last-child { border-bottom: none; }
  .aff-foto { width: 36px; height: 36px; border-radius: 50%; overflow: hidden; background: #3a4358; color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; font-weight: 700; }
  .aff-foto img { width: 100%; height: 100%; object-fit: cover; }
  .aff-body { flex: 1; min-width: 0; }
  .aff-name { font-size: 13px; font-weight: 700; }
  .aff-sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
  .aff-count { font-size: 11px; font-weight: 700; color: var(--lime); flex-shrink: 0; text-align: right; }
  .aff-count.zero { color: var(--text-dim); font-weight: 500; }
  .aff-chat { width: 32px; height: 32px; border-radius: 4px; background: var(--blue); color: #fff; display: flex; align-items: center; justify-content: center; flex-shrink: 0; text-decoration: none; }
</style>
</head>
<body>
  <div class="container">
    <div class="top">
      <button class="back" onclick="window.location.href='dashboard.html?_=' + Date.now()"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
      <div>
        <h1>Il mio account</h1>
        <p>Profilo, performance e rete</p>
      </div>
    </div>

    <div class="card profile-head">
      <div class="ph-avatar" id="phAvatar"><span id="phInitials">--</span></div>
      <div class="ph-body">
        <div class="ph-name" id="phName">Utente</div>
        <div class="ph-user" id="phUser"></div>
        <div class="ph-badge" id="phBadge">In attesa di verifica</div>
      </div>
    </div>

    <div class="perf-row">
      <div class="perf-box"><div class="n" id="perfSuggeriti">0</div><div class="l">Business suggeriti</div></div>
      <div class="perf-box"><div class="n lime" id="perfApprovati">0</div><div class="l">Business approvati</div></div>
      <div class="perf-box"><div class="n lime" id="perfRete">0</div><div class="l">Utenti in rete</div></div>
    </div>

    <div class="card">
      <h2>Il tuo link invito</h2>
      <div class="invite-row">
        <div class="invite-link" id="inviteLink">-</div>
        <button class="invite-copy" onclick="copiaInvito()" aria-label="Copia link">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </div>

    <div class="card" id="suggStatiCard" style="display:none">
      <h2>Le tue candidature</h2>
      <div id="suggStatiRows"></div>
    </div>

    <div class="card">
      <h2>Dati anagrafici</h2>
      <div class="field"><label>Nome</label><input id="fNome" /></div>
      <div class="field"><label>Cognome</label><input id="fCognome" /></div>
      <div class="field"><label>Email</label><input id="fEmail" type="email" /></div>
      <div class="field">
        <label>Telefono</label>
        <div style="display:flex;gap:8px">
          <input id="fTelefono" type="tel" placeholder="+39..." style="flex:1" />
          <button type="button" class="btn" style="width:auto;padding:0 14px;background:var(--panel);border:1px solid var(--border);color:var(--text)" id="btnContatto">Da Telegram</button>
        </div>
      </div>
      <div class="field"><label>Città</label><input id="fCitta" /></div>
    </div>

    <div class="card">
      <h2>Il tuo profilo</h2>
      <div class="field">
        <label>Livello di trading</label>
        <select id="fLivello">
          <option>Principiante</option>
          <option>Intermedio</option>
          <option>Avanzato</option>
        </select>
      </div>
      <div class="field">
        <label>Esperienza con broker reali</label>
        <select id="fEsperienza">
          <option>No mai</option>
          <option>Sì da meno di 6 mesi</option>
          <option>Sì da più di 6 mesi</option>
        </select>
      </div>
      <div class="row2">
        <div class="field">
          <label>Capitale</label>
          <select id="fCapitale">
            <option>Meno di 500 euro</option>
            <option>500-2.000 euro</option>
            <option>2.000-10.000 euro</option>
            <option>10.000+ euro</option>
          </select>
        </div>
        <div class="field">
          <label>Interesse</label>
          <select id="fProdotto">
            <option>Broker vs Broker</option>
            <option>Prop vs Broker</option>
            <option>Bonus ADM</option>
            <option>Voglio capire prima</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Disposto a pagare</label>
        <select id="fPay">
          <option>Solo se gratis</option>
          <option>Una tantum 50-200</option>
          <option>Una tantum 200-500</option>
          <option>Abbonamento</option>
          <option>Profit share</option>
        </select>
      </div>
      <div class="field"><label>Note libere</label><textarea id="fNote"></textarea></div>
    </div>

    <button class="btn btn-primary" id="saveBtn">Salva modifiche</button>
    <p class="save-note" id="saveNote"></p>

    <div class="card" style="margin-top:14px">
      <h2>La mia rete</h2>
      <input class="rete-search" id="reteSearch" placeholder="Cerca nella tua rete..." maxlength="60" />
      <div id="affRows"><p style="text-align:center;color:var(--text-dim);font-size:13px;padding:8px 0">Nessun iscritto ancora.</p></div>
    </div>
  </div>

  <script>
    window.addEventListener("pageshow", (e) => { if (e.persisted) window.location.reload(); });
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const API_URL = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const initData = tg?.initData || "";

    async function load() {
      const res = await fetch(`${API_URL}/me`, { headers: { "x-telegram-init-data": initData }, cache: "no-store" });
      const data = await res.json();
      const sond = data.sondaggio || {};
      const lead = data.lead || {};

      document.getElementById("fNome").value = sond.nome || lead.nome || "";
      document.getElementById("fCognome").value = sond.cognome || lead.cognome || "";
      document.getElementById("fEmail").value = sond.email || "";
      document.getElementById("fTelefono").value = sond.telefono || "";
      document.getElementById("fCitta").value = sond.citta || "";
      if (sond.livello_trading) document.getElementById("fLivello").value = sond.livello_trading;
      if (sond.esperienza_broker) document.getElementById("fEsperienza").value = sond.esperienza_broker;
      if (sond.capitale) document.getElementById("fCapitale").value = sond.capitale;
      if (sond.prodotto_preferito) document.getElementById("fProdotto").value = sond.prodotto_preferito;
      if (sond.willingness_to_pay) document.getElementById("fPay").value = sond.willingness_to_pay;
      document.getElementById("fNote").value = sond.note_libere || "";
    }

    document.getElementById("saveBtn").onclick = async () => {
      const btn = document.getElementById("saveBtn");
      btn.textContent = "Salvataggio...";
      btn.disabled = true;

      const body = {
        nome: document.getElementById("fNome").value.trim(),
        cognome: document.getElementById("fCognome").value.trim(),
        email: document.getElementById("fEmail").value.trim(),
        telefono: document.getElementById("fTelefono").value.trim(),
        citta: document.getElementById("fCitta").value.trim(),
        livello_trading: document.getElementById("fLivello").value,
        esperienza_broker: document.getElementById("fEsperienza").value,
        capitale: document.getElementById("fCapitale").value,
        prodotto_preferito: document.getElementById("fProdotto").value,
        willingness_to_pay: document.getElementById("fPay").value,
        note_libere: document.getElementById("fNote").value.trim(),
        disclaimer_accettato: true,
      };

      const res = await fetch(`${API_URL}/sondaggio`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-telegram-init-data": initData },
        body: JSON.stringify(body),
      });

      if (res.ok) {
        btn.className = "btn btn-done";
        btn.textContent = "✓ Salvato";
        document.getElementById("saveNote").textContent = "Le modifiche sono state salvate.";
        setTimeout(() => { btn.className = "btn btn-primary"; btn.textContent = "Salva modifiche"; btn.disabled = false; }, 2000);
      } else {
        btn.textContent = "Salva modifiche";
        btn.disabled = false;
        document.getElementById("saveNote").textContent = "Errore, riprova.";
      }
    };

    document.getElementById("btnContatto").onclick = () => {
      if (!tg?.requestContact) {
        if (tg?.showAlert) tg.showAlert("Il tuo Telegram non supporta questa funzione, inseriscilo a mano.");
        return;
      }
      tg.requestContact((shared, response) => {
        const phone = response?.responseUnsafe?.contact?.phone_number;
        if (shared && phone) {
          document.getElementById("fTelefono").value = phone.startsWith("+") ? phone : `+${phone}`;
        } else if (tg?.showAlert) {
          tg.showAlert("Nessun numero condiviso, inseriscilo a mano.");
        }
      });
    };

    function escapeHtml(str) {
      return String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function initialsOf(nome) {
      const n = (nome || "").trim();
      return n ? n.slice(0, 2).toUpperCase() : "??";
    }

    // Header identità: dati presi direttamente da Telegram.
    (function renderHeader() {
      const user = tg?.initDataUnsafe?.user;
      const nome = [user?.first_name, user?.last_name].filter(Boolean).join(" ") || "Utente";
      document.getElementById("phName").textContent = nome;
      document.getElementById("phUser").textContent = user?.username ? "@" + user.username : "";
      if (user?.photo_url) {
        document.getElementById("phAvatar").innerHTML = `<img src="${escapeHtml(user.photo_url)}" alt="" onerror="this.remove()" />`;
      } else {
        document.getElementById("phInitials").textContent = initialsOf(nome);
      }
    })();

    async function loadPerformance() {
      const res = await fetch(`${API_URL}/me`, { headers: { "x-telegram-init-data": initData }, cache: "no-store" });
      const data = await res.json();
      document.getElementById("perfSuggeriti").textContent = data.suggeriti_count || 0;
      document.getElementById("perfApprovati").textContent = data.approvati_count || 0;
      document.getElementById("perfRete").textContent = data.rete_count || 0;
      const badge = document.getElementById("phBadge");
      if (data.lead?.sondaggio_completato) {
        badge.textContent = "Stato: Verificato";
        badge.classList.add("ok");
      } else {
        badge.textContent = "Stato: In attesa di verifica";
      }
    }

    let inviteLink = "";
    function copiaInvito() {
      if (!inviteLink) return;
      if (navigator.clipboard) navigator.clipboard.writeText(inviteLink).catch(() => {});
      try { tg?.HapticFeedback?.impactOccurred("light"); } catch (e) {}
      if (tg?.showAlert) tg.showAlert("Link copiato!");
    }
    window.copiaInvito = copiaInvito;

    async function loadSuggerimenti() {
      const res = await fetch(`${API_URL}/miei-suggerimenti`, { headers: { "x-telegram-init-data": initData }, cache: "no-store" });
      const data = await res.json();
      const rows = data.suggerimenti || [];
      if (!rows.length) return;
      const LABEL = { in_revisione: "In revisione", approvato: "Approvato", rifiutato: "Rifiutato" };
      document.getElementById("suggStatiCard").style.display = "block";
      document.getElementById("suggStatiRows").innerHTML = rows.map((s) => `
        <div class="sugg-row">
          <div class="sugg-name">${escapeHtml(s.nome)}</div>
          <span class="sugg-stato ${s.stato}">${LABEL[s.stato] || s.stato}</span>
          ${s.stato === "rifiutato" && s.causale_rifiuto ? `<button class="sugg-why" onclick="mostraCausale('${escapeHtml(s.causale_rifiuto).replace(/'/g, "\\'")}')" aria-label="Motivo del rifiuto">&#9888;</button>` : ""}
        </div>
      `).join("");
    }

    function mostraCausale(testo) {
      if (tg?.showAlert) tg.showAlert("Motivo del rifiuto: " + testo);
      else alert("Motivo del rifiuto: " + testo);
    }
    window.mostraCausale = mostraCausale;

    let membriRete = [];

    function renderRete(filtro) {
      const term = (filtro || "").toLowerCase();
      const visibili = term
        ? membriRete.filter((m) => (m.nome || "").toLowerCase().includes(term) || (m.username || "").toLowerCase().includes(term))
        : membriRete;
      const el = document.getElementById("affRows");
      if (!visibili.length) {
        el.innerHTML = '<p style="text-align:center;color:var(--text-dim);font-size:13px;padding:8px 0">' + (membriRete.length ? "Nessun risultato." : "Nessun iscritto ancora.") + "</p>";
        return;
      }
      el.innerHTML = visibili.map((m) => {
        const foto = m.foto_url
          ? `<img src="${escapeHtml(m.foto_url)}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='inline'" />`
          : "";
        const n = m.business_approvati || 0;
        return `
        <div class="aff-row">
          <div class="aff-foto">${foto}<span style="${foto ? "display:none" : ""}">${escapeHtml(initialsOf(m.nome))}</span></div>
          <div class="aff-body">
            <div class="aff-name">${escapeHtml(m.nome || "Utente")}</div>
            <div class="aff-sub">${m.username ? "@" + escapeHtml(m.username) : escapeHtml(m.stato_label || "Iscritto")}</div>
          </div>
          <div class="aff-count ${n ? "" : "zero"}">Business: ${n}</div>
          ${m.username ? `<a class="aff-chat" href="https://t.me/${escapeHtml(m.username)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" aria-label="Scrivi su Telegram"><svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="m22 2-7 20-4-9-9-4Z"/></svg></a>` : ""}
        </div>
      `;
      }).join("");
    }

    async function loadAffiliazione() {
      const res = await fetch(`${API_URL}/affiliazione`, { headers: { "x-telegram-init-data": initData }, cache: "no-store" });
      const data = await res.json();
      inviteLink = data.ref_link || "";
      document.getElementById("inviteLink").textContent = inviteLink || "-";
      membriRete = data.rete?.membri || [];
      renderRete("");
    }

    document.getElementById("reteSearch").addEventListener("input", (e) => renderRete(e.target.value.trim()));

    load();
    loadPerformance();
    loadSuggerimenti();
    loadAffiliazione();
  </script>
</body>
</html>
