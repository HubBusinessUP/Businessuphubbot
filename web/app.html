<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Cashly</title>
<style>
  :root{
    --bg:#1b1f28;--s0:#222732;--s1:#2a3040;--s2:#333a4b;--s3:#414a5d;
    --line:#3a4251;--line2:#4a5568;
    --tx:#f7f9fc;--dim:#adb4c4;--mut:#818a9c;
    --acc:#25c366;--acc-d:#1ea555;--on:#052210;
    --amber:#e6b24c;--blue:#5aa9f0;--purple:#9b6ef0;--coral:#e2574a;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#12151c;font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .app{max-width:460px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--bg);color:var(--tx);display:flex;flex-direction:column;position:relative}
  .body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:78px}
  svg{display:block}
  .ico{stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}

  .hdr{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:14px 18px;background:var(--bg);border-bottom:1px solid var(--line)}
  .hdr .set{justify-self:start;background:none;border:none;color:var(--dim);cursor:pointer;padding:4px}
  .logo{justify-self:center;font-family:var(--sans);font-size:22px;font-weight:800;letter-spacing:-.02em}
  .logo .ly{color:var(--acc)}
  .av{justify-self:end;width:34px;height:34px;border-radius:50%;background:var(--s2);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;color:var(--acc);font-weight:700;font-size:14px}

  .hook{padding:16px 18px 2px}
  .eyebrow{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mut)}
  .slogan{font-size:18px;font-weight:600;letter-spacing:-.01em;line-height:1.35;margin-top:7px}
  .slogan b{color:var(--acc);font-weight:700}

  .seg{display:flex;gap:8px;padding:16px 18px 2px}
  .seg button{flex:1;height:46px;border-radius:4px;border:1px solid var(--line2);background:var(--s1);color:var(--dim);font-size:14px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}
  .seg button.on{background:rgba(37,195,102,.14);border-color:rgba(37,195,102,.55);color:var(--acc)}

  .search-row{display:flex;gap:10px;margin:14px 18px 0}
  .search{flex:1;display:flex;align-items:center;gap:10px;background:var(--s1);border:1px solid var(--line);border-radius:4px;padding:0 14px;height:44px}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:14px;font-family:inherit}
  .search input::placeholder{color:var(--mut)}
  .star{width:44px;height:44px;flex-shrink:0;background:var(--s1);border:1px solid var(--line2);border-radius:4px;color:var(--amber);display:flex;align-items:center;justify-content:center;cursor:pointer}

  .sechd{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 8px}
  .sectitle{display:flex;align-items:center;gap:9px}
  .sectitle .t{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}
  .live{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9.5px;font-weight:800;letter-spacing:.08em;color:var(--acc);background:rgba(37,195,102,.12);padding:3px 7px;border-radius:4px}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--acc);animation:pls 1.8s infinite}
  @keyframes pls{0%{box-shadow:0 0 0 0 rgba(37,195,102,.5)}70%{box-shadow:0 0 0 6px rgba(37,195,102,0)}100%{box-shadow:0 0 0 0 rgba(37,195,102,0)}}
  .agg{font-family:var(--mono);font-size:10px;color:var(--mut)}

  .fdd{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 18px;background:var(--s1);border:1px solid var(--line);border-radius:4px;padding:0 14px;height:44px;color:var(--dim);font-size:14px;font-weight:600;cursor:pointer}
  .fdd b{color:var(--tx)}

  .list{padding:10px 0 4px}
  .frow{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);cursor:pointer}
  .frow:active{background:var(--s0)}
  .fbody{flex:1;min-width:0}
  .fnm{font-size:15px;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .fds{font-size:13px;color:var(--dim);margin-top:3px;line-height:1.4}
  .pill{font-family:var(--mono);font-size:12.5px;font-weight:800;padding:3px 8px;border-radius:4px;flex-shrink:0}
  .up{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;color:var(--dim)}
  .up .n{font-family:var(--mono);font-size:12px;font-weight:700}
  .badge{font-family:var(--mono);font-size:9px;font-weight:800;letter-spacing:.06em;padding:2px 6px;border-radius:3px;text-transform:uppercase}
  .badge.new{background:rgba(37,195,102,.16);color:var(--acc)}
  .empty{padding:44px 24px;text-align:center;color:var(--mut);font-size:13.5px;line-height:1.6}

  .nav{position:fixed;bottom:0;left:0;right:0;max-width:460px;margin:0 auto;display:flex;background:var(--s0);border-top:1px solid var(--line);padding:8px 4px calc(8px + env(safe-area-inset-bottom))}
  .nav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--mut);text-decoration:none;font-size:10px;font-weight:600}
  .nav a.on{color:var(--acc)}
  .nav a .lb{font-family:var(--mono);letter-spacing:.02em}
</style>
</head>
<body>
<div class="app">
  <div class="body">
    <div class="hdr">
      <button class="set" aria-label="Impostazioni"><svg class="ico" viewBox="0 0 24 24" style="width:23px;height:23px"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8M4.6 9a1.6 1.6 0 0 0-.3-1.8M15 4.6a1.6 1.6 0 0 0-1.8-.3M9 19.4a1.6 1.6 0 0 0 1.8.3M9 4.6a1.6 1.6 0 0 1-1.8.3M15 19.4a1.6 1.6 0 0 1 1.8-.3M4.6 15a1.6 1.6 0 0 1-.3 1.8M19.4 9a1.6 1.6 0 0 1 .3-1.8"/></svg></button>
      <div class="logo">Cash<span class="ly">ly</span></div>
      <div class="av" id="avatar">A</div>
    </div>

    <div class="hook">
      <div class="eyebrow">La directory del business online</div>
      <div class="slogan">Cerca il business che ti far&agrave; <b>cambiare vita</b></div>
    </div>

    <div class="seg">
      <button class="on" data-view="evidenza"><svg class="ico" viewBox="0 0 24 24" style="width:17px;height:17px;stroke-width:2.2"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>In evidenza</button>
      <button data-view="perte"><svg class="ico" viewBox="0 0 24 24" style="width:17px;height:17px;stroke-width:2.2"><path d="M3 12h4l2 6 4-14 2 8h6"/></svg>Per te</button>
    </div>

    <div class="search-row">
      <div class="search"><svg class="ico" viewBox="0 0 24 24" style="width:19px;height:19px;color:var(--mut)"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input id="search" placeholder="Cerca un business"></div>
      <button class="star" aria-label="Salvati"><svg class="ico" viewBox="0 0 24 24" style="width:19px;height:19px"><path d="M12 4l2.3 5 5.7.5-4.3 3.7 1.3 5.5L12 18.8 6.7 21.7 8 16.2 3.7 12.5 9.4 12z"/></svg></button>
    </div>

    <div class="sechd">
      <div class="sectitle"><span class="t">Esplora directory</span><span class="live"><span class="pulse"></span>LIVE</span></div>
      <span class="agg" id="agg"></span>
    </div>

    <div class="fdd" id="catDd"><span>Categoria: <b>Tutte</b></span><svg class="ico" viewBox="0 0 24 24" style="width:16px;height:16px;color:var(--mut)"><path d="m6 9 6 6 6-6"/></svg></div>

    <div class="list" id="list"><div class="empty">Caricamento&hellip;</div></div>
  </div>

  <nav class="nav">
    <a class="on" href="app.html"><svg class="ico" viewBox="0 0 24 24" style="width:22px;height:22px"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg><span class="lb">Home</span></a>
    <a data-acc="#affiliazione"><svg class="ico" viewBox="0 0 24 24" style="width:22px;height:22px"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.3 2.9-5.5 6.5-5.5s6.5 2.2 6.5 5.5"/><circle cx="18" cy="9" r="2.6"/><path d="M17 14.4c2.8.3 4.9 2.3 4.9 5.1"/></svg><span class="lb">Affiliazione</span></a>
    <a data-acc="#profilo"><svg class="ico" viewBox="0 0 24 24" style="width:22px;height:22px"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 3.6-7 8-7s8 3 8 7"/></svg><span class="lb">Profilo</span></a>
    <a href="admin/index.html"><svg class="ico" viewBox="0 0 24 24" style="width:22px;height:22px"><path d="M3 4h18M3 12h18M3 20h18"/></svg><span class="lb">Admin</span></a>
  </nav>
</div>

<script src="identikit.js?v=8"></script>
<script>
  var API_URL = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { try { tg.ready(); tg.expand(); } catch(e){} }
  var initData = (tg && tg.initData) || "";
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

  try { var u = tg && tg.initDataUnsafe && tg.initDataUnsafe.user; if (u && u.first_name) document.getElementById("avatar").textContent = u.first_name.trim().slice(0,1).toUpperCase(); } catch(e){}

  // nav -> pagine reali con cache-bust
  document.querySelectorAll('.nav a[data-acc]').forEach(function(a){ a.href = "account.html?_=" + Date.now() + a.getAttribute("data-acc"); });

  var SERVIZI = [], view = "evidenza", search = "";

  function band(v){
    if(v>=80) return {c:"var(--acc)",bg:"rgba(37,195,102,.14)"};
    if(v>=60) return {c:"#3fd07f",bg:"rgba(37,195,102,.10)"};
    if(v>=40) return {c:"var(--amber)",bg:"rgba(230,178,76,.14)"};
    return {c:"var(--mut)",bg:"rgba(129,138,156,.14)"};
  }
  function isNew(s){ try { return (Date.now() - new Date(s.created_at).getTime()) < 7*24*3600*1000; } catch(e){ return false; } }
  function openBiz(id){ location.href = "lista.html?_=" + Date.now() + "#biz-" + id; }

  function render(){
    var el = document.getElementById("list");
    var arr = SERVIZI.slice();
    if(search){ var q = search.toLowerCase(); arr = arr.filter(function(s){ return (s.nome||"").toLowerCase().indexOf(q)>=0 || (s.descrizione||"").toLowerCase().indexOf(q)>=0; }); }
    var params = window.userParams;
    arr = arr.map(function(s){ return { s:s, pct: (typeof computeCompat==="function") ? computeCompat(params, s) : null }; });
    if(view === "perte"){ arr.sort(function(a,b){ return (b.pct||0)-(a.pct||0); }); }
    else { arr.sort(function(a,b){ return (b.s.voti||0)-(a.s.voti||0) || (String(a.s.created_at) < String(b.s.created_at) ? 1 : -1); }); }
    if(!arr.length){ el.innerHTML = '<div class="empty">' + (SERVIZI.length ? "Nessun business trovato." : "Ancora nessun business in lista.<br>Aggiungilo dall\'Admin.") + '</div>'; return; }
    el.innerHTML = arr.map(function(o){
      var s = o.s, pct = o.pct, b = pct != null ? band(pct) : null;
      var pill = pct != null ? '<span class="pill" style="color:'+b.c+';background:'+b.bg+'">'+pct+'%</span>'
                             : '<div class="up"><svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:var(--mut);fill:none;stroke-width:2;stroke-linejoin:round"><path d="M12 5 3 18h18L12 5Z"/></svg><span class="n">'+(s.voti||0)+'</span></div>';
      var nuovo = isNew(s) ? '<span class="badge new">Nuovo</span>' : "";
      return '<div class="frow" onclick="openBiz('+s.id+')"><div class="fbody"><div class="fnm">'+esc(s.nome)+nuovo+'</div><div class="fds">'+esc(s.descrizione||"")+'</div></div>'+pill+'</div>';
    }).join("");
  }

  document.querySelectorAll(".seg button").forEach(function(b){ b.addEventListener("click", function(){
    document.querySelectorAll(".seg button").forEach(function(x){ x.classList.toggle("on", x===b); });
    view = b.getAttribute("data-view"); render();
  }); });
  document.getElementById("search").addEventListener("input", function(e){ search = e.target.value.trim(); render(); });

  (async function load(){
    try {
      var res = await fetch(API_URL + "/business-list", { headers: initData ? { "x-telegram-init-data": initData } : {}, cache: "no-store" });
      var data = await res.json();
      SERVIZI = [];
      (data.categorie || []).forEach(function(c){ (c.servizi || []).forEach(function(s){ SERVIZI.push(s); }); });
      var d = new Date();
      document.getElementById("agg").textContent = "Agg. " + d.toLocaleDateString("it-IT") + " · " + d.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
      try {
        var meRes = await fetch(API_URL + "/me", { headers: initData ? { "x-telegram-init-data": initData } : {} });
        var me = await meRes.json();
        if (me && me.sondaggio && typeof computeIdentikit === "function") window.userParams = computeIdentikit(me.sondaggio).params;
      } catch(e){}
      render();
    } catch(e){
      document.getElementById("list").innerHTML = '<div class="empty">Errore di caricamento. Riprova.</div>';
    }
  })();
</script>
</body>
</html>
