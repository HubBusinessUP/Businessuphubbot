<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Cashly</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1b1f28;--s0:#222732;--s1:#2a3040;--s2:#333a4b;--s3:#414a5d;
    --line:#3a4251;--line2:#4a5568;
    --tx:#f7f9fc;--dim:#adb4c4;--mut:#818a9c;
    --acc:#25c366;--acc-d:#1ea555;--on:#052210;
    --amber:#e6b24c;--blue:#5aa9f0;--purple:#9b6ef0;--coral:#e2574a;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#12151c;font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .app{max-width:460px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--bg);color:var(--tx);display:flex;flex-direction:column;position:relative}
  .body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .scr{display:none;flex-direction:column}
  .scr.on{display:flex}
  svg{display:block}
  .ico{stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .row{display:flex;align-items:center}

  /* header */
  .hdr{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;
    padding:15px 18px;background:var(--s0);border-bottom:1px solid var(--line)}
  .logo{font-family:var(--mono);font-size:21px;font-weight:700;letter-spacing:-.06em;line-height:1}
  .iconbtn{width:38px;height:38px;border-radius:4px;background:var(--s1);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;color:var(--tx);position:relative;cursor:pointer}
  .dot{position:absolute;top:8px;right:9px;width:7px;height:7px;background:var(--acc);border-radius:50%;box-shadow:0 0 0 2px var(--s1)}

  /* welcome */
  .eyebrow{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mut)}
  .hello{font-size:22px;font-weight:700;letter-spacing:-.025em;line-height:1.1;margin-top:7px}
  .subtle{font-size:13.5px;color:var(--dim);margin-top:5px;line-height:1.4}

  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;margin:16px 18px 0;background:var(--s0);
    border:1px solid var(--line);border-radius:4px;overflow:hidden}
  .stat{padding:13px 8px;text-align:center;border-right:1px solid var(--line)}
  .stat:last-child{border-right:none}
  .stat .n{font-family:var(--mono);font-size:21px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
  .stat .l{font-family:var(--mono);font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-top:6px}

  /* section header */
  .sechd{display:flex;align-items:baseline;justify-content:space-between;padding:26px 18px 12px}
  .sectitle{font-family:var(--mono);font-size:15px;font-weight:700;letter-spacing:-.03em}
  .seccount{font-family:var(--mono);font-size:11px;color:var(--mut);font-variant-numeric:tabular-nums}

  /* search + filters */
  .search{display:flex;align-items:center;gap:10px;margin:0 18px;background:var(--s1);
    border:1px solid var(--line);border-radius:4px;padding:0 14px;height:44px}
  .search span{font-size:14px;color:var(--mut)}
  .filters{display:flex;gap:8px;padding:12px 18px 4px;overflow-x:auto;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .pill{font-size:13px;font-weight:600;padding:8px 15px;border-radius:4px;white-space:nowrap;cursor:pointer;
    background:var(--s1);border:1px solid var(--line);color:var(--dim)}
  .pill.on{background:var(--acc);border-color:var(--acc);color:var(--on);font-weight:700}
  .pill.sugg{background:transparent;border:1px solid var(--acc);color:var(--acc)}

  /* directory rows */
  .list{padding:8px 0 4px}
  .dir{display:flex;align-items:center;gap:14px;padding:13px 18px;cursor:pointer;transition:background .12s}
  .dir+.dir{border-top:1px solid var(--line)}
  .dir:active{background:var(--s0)}
  .dav{width:46px;height:46px;border-radius:4px;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:18px;flex-shrink:0}
  .dnm{font-size:15px;font-weight:700;line-height:1.2;letter-spacing:-.01em}
  .dds{font-size:12.5px;color:var(--dim);line-height:1.45;margin-top:3px;
    overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .tag{font-size:9px;font-weight:700;color:var(--on);background:var(--acc);border-radius:5px;padding:2px 6px;letter-spacing:.02em}
  .vote{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:40px;
    background:var(--s1);border:1px solid var(--line2);border-radius:4px;padding:7px 0;flex-shrink:0}
  .vote .c{font-size:12px;font-weight:700;margin-top:2px;font-variant-numeric:tabular-nums}

  /* segmented toggle (Product Hunt style) */
  .seg{display:flex;gap:8px;padding:20px 16px 2px}
  .seg button{flex:1;height:46px;border-radius:4px;border:1px solid var(--line2);background:var(--s1);color:var(--dim);
    font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;white-space:nowrap}
  .seg button.on{background:rgba(37,195,102,.14);border-color:rgba(37,195,102,.55);color:var(--acc)}

  /* feed card */
  .feed{margin:16px 14px 0;background:var(--s0);border:1px solid var(--line);border-radius:5px;overflow:hidden}
  .feedhd{font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:-.04em;padding:20px 20px 8px}
  @keyframes pls{0%{box-shadow:0 0 0 0 rgba(37,195,102,.5)}70%{box-shadow:0 0 0 6px rgba(37,195,102,0)}100%{box-shadow:0 0 0 0 rgba(37,195,102,0)}}
  .pulse{width:7px;height:7px;border-radius:50%;background:var(--acc);animation:pls 1.7s ease-out infinite;flex-shrink:0}
  @media (prefers-reduced-motion:reduce){.pulse{animation:none}}
  .live{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--acc)}
  .frow{display:flex;gap:13px;padding:13px 18px;cursor:pointer;transition:background .12s;align-items:center}
  .frow+.frow{border-top:1px solid var(--line)}
  .frow:active{background:var(--s1)}
  .flogo{width:40px;height:40px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;letter-spacing:-.03em}
  .fbody{flex:1;min-width:0;padding-top:1px}
  .fnm{font-size:15px;font-weight:700;letter-spacing:-.015em;line-height:1.25;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .fds{font-size:12.5px;color:var(--dim);line-height:1.4;margin-top:3px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .up{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:42px;padding-top:2px}
  .up .n{font-family:var(--mono);font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums}
  .feed.hide{display:none}
  .feedsub{font-size:12.5px;color:var(--dim);padding:0 20px 10px;margin-top:-4px}
  .cbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:rgba(37,195,102,.16);color:var(--acc);letter-spacing:.02em;white-space:nowrap}
  .cbadge.mid{background:rgba(230,178,76,.16);color:var(--amber)}

  /* category chips + existing filters */
  .chips{display:flex;gap:8px;padding:14px 18px 0;overflow-x:auto;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{font-size:13px;font-weight:600;padding:8px 15px;border-radius:4px;white-space:nowrap;cursor:pointer;
    background:var(--s1);border:1px solid var(--line2);color:var(--dim)}
  .chip.on{background:var(--acc);border-color:var(--acc);color:var(--on);font-weight:700}
  .fdd-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 18px 0}
  .fdd{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--s1);
    border:1px solid var(--line2);color:var(--dim);border-radius:4px;padding:11px 14px;font-size:13.5px;font-weight:600;cursor:pointer}
  .fdd.set{color:var(--tx);border-color:var(--s3)}

  /* affiliazione: stato partner + progresso + perk bloccati */
  .badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:7px;letter-spacing:.03em}
  .badge.amber{background:rgba(230,178,76,.16);color:var(--amber)}
  .badge.green{background:var(--acc);color:var(--on)}
  .prog{height:9px;border-radius:6px;background:var(--s2);overflow:hidden;margin:14px 0 0}
  .prog>span{display:block;height:100%;background:var(--acc);border-radius:6px}
  .dots{display:flex;gap:6px;margin-top:12px}
  .dots i{flex:1;height:6px;border-radius:3px;background:var(--s2)}
  .dots i.f{background:var(--acc)}
  .perk{display:flex;align-items:center;gap:14px;padding:15px 18px}
  .perk+.perk{border-top:1px solid var(--line)}
  .perk.lock{opacity:.5}

  /* editor link ref + pagina */
  .minibtn{background:var(--s2);border:1px solid var(--line2);color:var(--tx);border-radius:4px;padding:9px 13px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .minibtn.add{background:transparent;border-color:var(--acc);color:var(--acc)}
  .rl-set{font-size:11.5px;color:var(--acc);font-family:var(--mono);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rl-empty{font-size:12px;color:var(--mut);margin-top:3px}
  .field{background:var(--s1);border:1px solid var(--line2);border-radius:4px;padding:11px 14px;margin-top:8px;cursor:text}
  .field .k{font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
  .field .v{font-size:14.5px;color:var(--tx);margin-top:3px}
  .pvbtn{display:block;text-align:center;background:var(--s1);border:1px solid var(--line2);color:var(--tx);border-radius:4px;padding:13px;font-size:14px;font-weight:700;margin-top:9px;text-decoration:none}
  .toggle{width:40px;height:24px;border-radius:4px;background:var(--acc);position:relative;flex-shrink:0}
  .toggle.off{background:var(--s3)}
  .toggle i{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:#fff}
  .toggle.off i{right:auto;left:3px}

  /* scheda: bottoni vota/salva attivabili */
  .actbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--s1);border:1px solid var(--line2);color:var(--tx);border-radius:4px;height:46px;font-size:14px;font-weight:700;cursor:pointer}
  .actbtn svg{stroke:currentColor}
  .actbtn.on{background:var(--acc);border-color:var(--acc);color:var(--on)}
  .actbtn.on svg{fill:currentColor}
  .statesel{display:flex;gap:8px;padding:14px 16px 0}
  .statesel button{flex:1;height:38px;border-radius:4px;border:1px solid var(--line2);background:var(--s1);color:var(--dim);font-size:12.5px;font-weight:700;cursor:pointer}
  .statesel button.on{background:var(--tx);border-color:var(--tx);color:#0c0d11}

  /* scheda servizio */
  .metarow{display:flex;gap:8px;padding:0 18px}
  .metachip{flex:1;min-width:0;background:var(--s1);border:1px solid var(--line2);border-radius:4px;padding:11px 10px;text-align:center}
  .metachip .mk{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em}
  .metachip .mv{font-size:14px;font-weight:700;margin-top:3px}
  .inforow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0}
  .inforow+.inforow{border-top:1px solid var(--line)}
  .step{display:flex;gap:13px;padding:15px 18px}
  .step+.step{border-top:1px solid var(--line)}
  .stepn{width:27px;height:27px;border-radius:50%;background:var(--s2);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;flex-shrink:0;color:var(--acc)}
  .steplink{display:inline-flex;align-items:center;gap:6px;margin-top:9px;background:var(--s2);border:1px solid var(--line2);color:var(--tx);border-radius:4px;padding:8px 12px;font-size:12.5px;font-weight:600;text-decoration:none}

  /* generic card bits reused in other screens */
  .card{margin:0 18px;background:var(--s0);border:1px solid var(--line);border-radius:5px;padding:17px 18px}
  .act{width:48px;height:48px;border-radius:4px;background:var(--s1);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;margin:0 auto;color:var(--tx)}
  .mv{display:flex;align-items:center;gap:12px;padding:13px 0}
  .mv+.mv{border-top:1px solid var(--line)}
  .mvi{width:38px;height:38px;border-radius:4px;background:var(--s1);display:flex;align-items:center;justify-content:center;flex-shrink:0}

  /* bottom nav */
  .nav{position:sticky;bottom:0;display:flex;align-items:flex-end;justify-content:space-around;
    background:var(--s0);border-top:1px solid var(--line);
    padding:9px 6px calc(9px + env(safe-area-inset-bottom))}
  .navb{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--mut)}
  .navb .lb{font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
  .navb.on{color:var(--acc)}
  .fab{width:46px;height:46px;border-radius:4px;background:var(--acc);color:var(--on);
    display:flex;align-items:center;justify-content:center;margin-bottom:2px}
</style>
</head>
<body>

<div class="app">
  <div class="hdr">
    <div id="homeAvatar" data-goto="profilo" aria-label="Vai al profilo">A</div>
    <div class="salu"><span id="homeGreet">Ciao,</span> <b id="homeName"></b></div>
    <button id="shareBtn" aria-label="Condividi"><svg viewBox="0 0 24 24" style="width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg></button>
  </div>
  <div class="body">





















    <!-- ===================== HUB ===================== -->
    <section class="scr on" data-s="home">
      <div class="cerca">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;flex-shrink:0"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="cerca" type="search" autocomplete="off" placeholder="Cerca un business">
      </div>
      <nav class="macros" id="macroTabs"></nav>
      <div class="macroline"></div>
      <nav class="subs" id="subTabs"></nav>
      <div id="listaReale"></div>
    </section>

    <!-- ===================== AFFILIAZIONE ===================== -->
    <!-- Stessa impaginazione dell'HUB: niente hero, solo il link, i KPI e le card
         della rete (i ref al posto dei servizi). -->
    <section class="scr" data-s="wallet">

      <!-- Link affiliazione: il riquadro col link + Invita (senza la promessa dell'hero) -->
      <div style="padding:16px 16px 0">
        <div class="eyebrow" style="padding:0 2px 8px">Il tuo link</div>
        <div style="display:flex;align-items:center;gap:9px">
          <div style="flex:1;min-width:0;display:flex;align-items:center;height:46px;padding:0 13px;background:var(--s0);border:1px solid var(--line2);border-radius:11px">
            <div id="inviteLinkText" style="font-family:var(--mono);font-size:12px;color:var(--acc);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">t.me/cashlyhub_bot</div>
          </div>
          <button id="inviteBtn" class="aff-cta">Invita<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round"><path d="M5 12h13M13 6l6 6-6 6"/></svg></button>
        </div>
      </div>

      <!-- KPI -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 16px 0">
        <div class="aff-kpi">
          <div class="n" id="kpiDiretti">0</div>
          <div class="l">Iscritti</div>
          <div class="h">invitati da te</div>
        </div>
        <div class="aff-kpi">
          <div class="n" id="reteTotale" style="color:var(--acc)">0</div>
          <div class="l">Rete totale</div>
          <div class="h">tutti i livelli sotto di te</div>
        </div>
      </div>

      <!-- Rete: card come nell'HUB, un ref per card -->
      <div class="grp">I tuoi iscritti</div>
      <div id="reteList"></div>
      <div style="height:16px"></div>
    </section>

    <!-- ===================== PROFILO ===================== -->
    <section class="scr" data-s="profilo">
      <!-- Identita' -->
      <div style="display:flex;align-items:center;gap:14px;padding:18px 18px 0">
        <div id="pfAvatar" style="width:72px;height:72px;border-radius:50%;background:var(--s2);border:1px solid var(--line2);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;color:var(--acc);font-weight:800;font-size:28px;flex-shrink:0">A</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span id="pfNome" style="font-size:20px;font-weight:800;letter-spacing:-.02em">&nbsp;</span>
            <span id="pfBadge" class="cbadge">Membro</span>
          </div>
          <div id="pfUser" style="font-size:13px;color:var(--dim);margin-top:3px">&nbsp;</div>
        </div>
      </div>

      <!-- Numeri -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:18px 18px 0">
        <div class="aff-kpi"><div class="n" id="pfRete" style="color:var(--acc)">0</div><div class="l">Rete</div><div class="h">persone sotto di te</div></div>
        <div class="aff-kpi"><div class="n" id="pfBiz">0</div><div class="l">Business attivi</div><div class="h">che hai avviato</div></div>
      </div>

      <!-- Anagrafica: modificabile dall'utente -->
      <div class="sechd" style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:22px 18px 4px">
        <div class="eyebrow">I tuoi dati</div>
        <button id="pfEdit" style="background:var(--s1);border:1px solid var(--line2);color:var(--tx);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer">Modifica</button>
      </div>
      <div class="list" id="pfDati" style="padding-top:6px;padding-bottom:8px"></div>

      <!-- novalidate: senza, type=email/tel fanno scattare il popup nativo del browser, che
           blocca il submit e rende irraggiungibili i nostri messaggi (e dentro la webview di
           Telegram e' pure incoerente). La validazione la facciamo noi, una sola volta. -->
      <form id="pfForm" novalidate style="display:none;padding:6px 18px 4px">
        <label class="pf-l" for="fNome">Nome</label>
        <input class="pf-i" id="fNome" type="text" autocomplete="given-name" maxlength="80" placeholder="Il tuo nome">
        <label class="pf-l" for="fCognome">Cognome</label>
        <input class="pf-i" id="fCognome" type="text" autocomplete="family-name" maxlength="80" placeholder="Il tuo cognome">
        <label class="pf-l" for="fEmail">Email</label>
        <input class="pf-i" id="fEmail" type="email" inputmode="email" autocomplete="email" maxlength="160" placeholder="nome@esempio.it">
        <label class="pf-l" for="fTelefono">Telefono</label>
        <input class="pf-i" id="fTelefono" type="tel" inputmode="tel" autocomplete="tel" maxlength="40" placeholder="+39 333 1234567">
        <label class="pf-l" for="fCitta">Citta</label>
        <input class="pf-i" id="fCitta" type="text" autocomplete="address-level2" maxlength="80" placeholder="Dove vivi">
        <div id="pfErr" style="display:none;font-size:12.5px;font-weight:600;color:#e2574a;margin-top:10px"></div>
        <div style="display:flex;gap:9px;margin-top:16px">
          <button type="button" id="pfAnnulla" style="flex:1;background:var(--s1);border:1px solid var(--line2);color:var(--tx);border-radius:11px;padding:13px;font-size:14px;font-weight:700;cursor:pointer">Annulla</button>
          <button type="submit" id="pfSalva" class="aff-cta" style="flex:1;height:auto;padding:13px">Salva</button>
        </div>
      </form>

      <!-- Servizi attivi: da qui li puoi disattivare e tornare a riattivarli da capo -->
      <div id="pfBizWrap" style="display:none">

    <button class="navb" data-go="wallet"><svg class="ico" viewBox="0 0 24 24" style="width:23px;height:23px"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.3 2.9-5.5 6.5-5.5s6.5 2.2 6.5 5.5"/><circle cx="18" cy="9" r="2.6"/><path d="M17 14.4c2.8.3 4.9 2.3 4.9 5.1"/></svg><span class="lb">Affiliazione</span></button>

<script>
(function(){
  var app=document.querySelector('.app'), body=app.querySelector('.body');
  app.querySelectorAll('.nav button').forEach(function(b){
    b.addEventListener('click',function(){
      var go=b.getAttribute('data-go');
      app.querySelectorAll('.scr').forEach(function(s){s.classList.toggle('on',s.getAttribute('data-s')===go);});
      app.querySelectorAll('.nav button').forEach(function(x){x.classList.toggle('on',x===b);});
      body.scrollTop=0;
    });
  });
  // category chips (visual)
  app.querySelectorAll('.chips').forEach(function(f){
    f.querySelectorAll('.chip').forEach(function(p){
      p.addEventListener('click',function(){
        f.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on');});
        p.classList.add('on');
      });
    });
  });
  // segmented toggle: switch feed/list within the SAME screen
  app.querySelectorAll('.seg button').forEach(function(b){
    b.addEventListener('click',function(){
      var v=b.getAttribute('data-view'), scope=b.closest('.scr');
      b.parentNode.querySelectorAll('button').forEach(function(x){x.classList.toggle('on',x===b);});
      scope.querySelectorAll('.feed[data-view],.rl-list[data-view]').forEach(function(fd){
        fd.classList.toggle('hide',fd.getAttribute('data-view')!==v);
      });
    });
  });
  // sub-screen navigation (perk rows, back buttons)
  function showScreen(name){
    if(!app.querySelector('.scr[data-s="'+name+'"]')) return;
    app.querySelectorAll('.scr').forEach(function(s){s.classList.toggle('on',s.getAttribute('data-s')===name);});
    app.querySelectorAll('.nav button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-go')===name);});
    body.scrollTop=0;
  }
  app.querySelectorAll('[data-goto]').forEach(function(el){
    el.addEventListener('click',function(){showScreen(el.getAttribute('data-goto'));});
  });
  // toggle switches (pagina)
  app.querySelectorAll('.toggle').forEach(function(t){
    t.addEventListener('click',function(){t.classList.toggle('off');});
  });
  // scheda: voto unico (Vota <-> Votato) + salva (Salva <-> Salvato)
  var vBtn=document.getElementById('schedaVota');
  if(vBtn){vBtn.addEventListener('click',function(){
    var on=vBtn.classList.toggle('on');
    vBtn.querySelector('.vtxt').textContent = on ? 'Votato · 1' : 'Vota · 0';
  });}
  var sBtn=document.getElementById('schedaSalva');
  if(sBtn){sBtn.addEventListener('click',function(){
    var on=sBtn.classList.toggle('on');
    sBtn.querySelector('.stxt').textContent = on ? 'Salvato' : 'Salva';
  });}
  // identikit: calcola -> mostra risultato
  var calcBtn=document.getElementById('calcIdentikit');
  if(calcBtn){calcBtn.addEventListener('click',function(){
    var r=document.getElementById('identikitResult'); if(r){r.classList.remove('hide'); r.scrollIntoView({behavior:'smooth',block:'center'});}
  });}

  // scheda servizio: stati Nuovo / In corso / Attivato
  function setSvc(state){
    var cfg={
      nuovo:   {done:0,cur:0, badge:'Nuovo',bcl:'amber',       count:'0 di 4', cta:'Attiva servizio',       note:'Inizia il tutorial per attivare il servizio.'},
      incorso: {done:2,cur:2, badge:'In corso · 2/4',bcl:'amber',count:'2 di 4 completati', cta:'Riprendi dallo step 3', note:'Riprendi da dove ti sei fermato.'},
      attivato:{done:4,cur:-1,badge:'Attivato · cliente',bcl:'green',count:'4 di 4 · completato', cta:'Servizio attivato ✓', note:'Sei cliente. È nei tuoi Business attivi.'}
    }[state];
    if(!cfg)return;
    var b=document.getElementById('svcBadge'); if(b){b.textContent=cfg.badge;b.className='badge '+cfg.bcl;}
    var tc=document.getElementById('tutCount'); if(tc)tc.textContent=cfg.count;
    for(var i=0;i<4;i++){
      var st=document.getElementById('tstep'+i); if(!st)continue; var n=st.querySelector('.stepn');
      st.style.background=''; st.style.opacity='';
      if(i<cfg.done){ n.textContent='✓'; n.style.background='var(--acc)'; n.style.borderColor='var(--acc)'; n.style.color='var(--on)'; }
      else { n.textContent=(i+1); n.style.background='var(--s2)'; n.style.borderColor='var(--line2)'; n.style.color='var(--acc)';
        if(i===cfg.cur){ st.style.background='rgba(37,195,102,.06)'; } else { st.style.opacity='.55'; } }
    }
    var f=document.getElementById('stepFatto'); if(f)f.style.display=(state==='incorso')?'':'none';
    var cta=document.getElementById('svcCta'); if(cta)cta.textContent=cfg.cta;
    var nt=document.getElementById('svcNote'); if(nt)nt.textContent=cfg.note;
  }
  app.querySelectorAll('.statesel button').forEach(function(b){
    b.addEventListener('click',function(){
      b.parentNode.querySelectorAll('button').forEach(function(x){x.classList.toggle('on',x===b);});
      setSvc(b.getAttribute('data-st'));
    });
  });
  setSvc('incorso');
  var h=location.hash.replace('#','');
  if(h&&/^[a-z]+$/.test(h)&&app.querySelector('.scr[data-s="'+h+'"]')){app.querySelectorAll('.scr').forEach(function(s){s.classList.toggle('on',s.getAttribute('data-s')===h);});}
})();
</script>

<script>
/* ===== Identikit wizard + matching + Per te ===== */
(function(){
  var app=document.querySelector('.app'), bodyEl=app.querySelector('.body');
  function sc0(){ if(bodyEl) bodyEl.scrollTop=0; }
  function scr(name){ app.querySelectorAll('.scr').forEach(function(s){s.classList.toggle('on',s.getAttribute('data-s')===name);}); }

  var QUESTIONS=[
    {id:'settore',kick:'1 di 5',title:'Cosa ti interessa?',help:'Puoi lasciare aperto a tutto e decidere dopo.',
     opts:[['trading','Trading e mercati'],['banking','Banca e conti'],['crypto','Crypto'],['ecom','E-commerce'],['online','Business online / digitale'],['rendite','Rendite automatiche'],['tutto','Va bene tutto']]},
    {id:'capitale',kick:'2 di 5',title:'Quanto puoi investire?',help:'La base con cui il business opera. Non lo spendi: serve ad avere il minimo richiesto.',
     opts:[['a','Meno di 1.000€'],['b','1.000 – 5.000€'],['c','5.000 – 20.000€'],['d','Oltre 20.000€']]},
    {id:'spesa',kick:'3 di 5',title:'Budget per avviarlo?',help:'Soldi che escono davvero: attivazione + eventuali costi fissi mensili.',
     opts:[['g','Solo gratis'],['s50','Fino a 50€'],['s200','Fino a 200€'],['over','Oltre 200€']]},
    {id:'rischio',kick:'4 di 5',title:'Che rischio accetti?',help:'Serve solo a non proporti cose fuori dalla tua soglia.',
     opts:[['sicuro','Basso — capitale al sicuro'],['regole','Medio — con regole chiare'],['alto','Alto — per guadagni alti']]},
    {id:'esperienza',kick:'5 di 5',title:'Quanta esperienza hai?',help:'Se parti da zero, ti mostriamo cose adatte al tuo livello.',
     opts:[['zero','Parto da zero'],['basi','Ho delle basi'],['esperto','Sono esperto']]}
  ];
  var SERVICES=[
    {n:'Broker VS Broker · Swap',ic:'S',col:'var(--acc)',ds:'Hedging per incassare la differenza di swap, ogni notte.',budget:2000,att:50,fissi:15,risk:2,tipo:'esecuzione',sett:'trading',esp:2,split:30},
    {n:'Broker VS Broker · Bonus',ic:'B',col:'var(--amber)',ds:'Hedging tra due broker per sfruttare il bonus tradabile.',budget:500,att:0,fissi:0,risk:2,tipo:'esecuzione',sett:'trading',esp:2,split:40},
    {n:'Edgefunds',ic:'E',col:'var(--blue)',ds:'Servizio conto terzi per gestione hedging.',budget:5000,att:100,fissi:20,risk:2,tipo:'esecuzione',sett:'trading',esp:3,split:50}
  ];
  var CAP={a:800,b:3000,c:12000,d:30000},SPESA={g:0,s50:50,s200:200,over:100000},RISK={sicuro:1,regole:2,alto:3},TIPO={sicuro:'protetto',regole:'esecuzione',alto:'mercato'},ESP={zero:1,basi:2,esperto:3};
  var RECAP={settore:{trading:'Trading',banking:'Banca e conti',crypto:'Crypto',ecom:'E-commerce',online:'Business online',rendite:'Rendite',tutto:'aperto a tutto'},capitale:{a:'capitale piccolo',b:'capitale medio',c:'capitale alto',d:'capitale ampio'},rischio:{sicuro:'rischio basso',regole:'rischio medio',alto:'rischio alto'}};

  function compat(s,a){
    var capU=CAP[a.capitale],spesaU=SPESA[a.spesa],riskU=RISK[a.rischio],tipoU=TIPO[a.rischio],espU=ESP[a.esperienza],settU=a.settore;
    var need=s.att+s.fissi,capHard=false,spesaHard=false,capSoft=false;
    var cCap; if(s.budget>0&&capU<0.8*s.budget){cCap=0;capHard=true;} else if(s.budget>0&&capU<s.budget){cCap=0.5;capSoft=true;} else cCap=1;
    var cSpesa; if(need>0&&spesaU===0){cSpesa=0;spesaHard=true;} else if(need>0&&spesaU>=need)cSpesa=1; else if(need>0&&spesaU>=0.8*need)cSpesa=0.5; else if(need===0)cSpesa=1; else cSpesa=0.2;
    var d=s.risk-riskU,cRisk=d<=0?1:(d===1?0.5:0.1); if(tipoU==='protetto'&&s.tipo==='mercato')cRisk=Math.min(cRisk,0.15);
    var de=s.esp-espU,cEsp=de<=0?1:(de===1?0.5:0.15);
    var cSett=(settU==='tutto'||settU===s.sett)?1:0.25;
    var base=25*cCap+15*cSpesa+25*cRisk+15*cEsp+20*cSett+Math.round(s.split/100*3);
    var raw=Math.max(0,Math.min(100,base));
    if(capHard||spesaHard)raw=Math.min(raw,15);
    if(capSoft)raw=Math.min(raw,50);
    if(riskU===1&&s.risk===3)raw=Math.min(raw,42);
    var val=Math.round(raw),reason='Adatto al tuo profilo';
    if(capHard)reason='Ti serve più capitale'; else if(spesaHard)reason='Costo di avvio troppo alto'; else if(cRisk<=0.15)reason='Più rischioso di quanto vuoi'; else if(cEsp<=0.15)reason='Serve più esperienza'; else if(cSett<1)reason='Fuori dal tuo settore'; else if(capSoft)reason='Sei al limite di capitale';
    return {val:val,reason:reason,locked:(capHard||spesaHard)};
  }
  function band(v){ if(v>=80)return{c:'#f7f9fc',bg:'rgba(247,249,252,.13)'}; if(v>=60)return{c:'#c4cbd6',bg:'rgba(196,203,214,.10)'}; if(v>=40)return{c:'#e6b24c',bg:'rgba(230,178,76,.14)'}; return{c:'#818a9c',bg:'rgba(129,138,156,.12)'}; }

  function rowHtml(s,c){
    var b=c?band(c.val):null;
    var right = c ? '<div class="pt-pill" style="color:'+b.c+';background:'+b.bg+'">'+c.val+'%</div>'
      : '<div class="up"><svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:var(--mut);fill:none;stroke-width:2;stroke-linejoin:round"><path d="M12 5 3 18h18L12 5Z"/></svg><span class="n" style="color:var(--dim)">0</span></div>';
    var barHtml = c ? '<div class="pt-bar"><i style="width:'+c.val+'%;background:'+b.c+'"></i></div>' : '';
    var ds = c ? c.reason : s.ds;
    return '<div class="frow" data-goto="servizio">'
      +'<div class="fbody"><div class="fnm">'+s.n+'</div><div class="fds">'+ds+'</div>'+barHtml+'</div>'+right+'</div>';
  }
  function bindRows(container){ container.querySelectorAll('[data-goto]').forEach(function(el){ el.addEventListener('click',function(){ scr(el.getAttribute('data-goto')); sc0(); }); }); }
  function renderPerte(a){
    var feed=document.getElementById('perteFeed'),sub=document.getElementById('pertesub'); if(!feed)return;
    if(!a){ feed.innerHTML=SERVICES.map(function(s){return rowHtml(s,null);}).join(''); bindRows(feed); return; }
    if(sub) sub.innerHTML='In base al tuo identikit · <b style="color:var(--dim)">'+[RECAP.settore[a.settore],RECAP.capitale[a.capitale],RECAP.rischio[a.rischio]].join(' · ')+'</b>';
    var scored=SERVICES.map(function(s){return {s:s,c:compat(s,a)};}).sort(function(x,y){return y.c.val-x.c.val;});
    feed.innerHTML=scored.map(function(x){return rowHtml(x.s,x.c);}).join('');
    bindRows(feed);
  }

  var ans={},cur=0;
  var Q=document.getElementById('idkQ'),bar=document.getElementById('idkBar'),stepL=document.getElementById('idkStep'),back=document.getElementById('idkBack');
  function render(){
    var q=QUESTIONS[cur];
    if(bar)bar.style.width=((cur+1)/QUESTIONS.length*100)+'%';
    if(stepL)stepL.textContent=(cur+1)+' / '+QUESTIONS.length;
    var h='<div class="idk-kick">'+q.kick+'</div><div class="idk-title">'+q.title+'</div><div class="idk-help">'+q.help+'</div><div class="idk-opts">';
    q.opts.forEach(function(o){ h+='<button class="idk-opt'+(ans[q.id]===o[0]?' on':'')+'" data-v="'+o[0]+'"><span class="rad"></span><span>'+o[1]+'</span></button>'; });
    h+='</div>';
    Q.innerHTML=h;
    Q.querySelectorAll('.idk-opt').forEach(function(b){ b.addEventListener('click',function(){ choose(q,b.getAttribute('data-v')); }); });
  }
  function choose(q,v){
    ans[q.id]=v;
    Q.querySelectorAll('.idk-opt').forEach(function(x){x.classList.toggle('on',x.getAttribute('data-v')===v);});
    setTimeout(function(){ if(cur<QUESTIONS.length-1){cur++;render();} else finish(); },220);
  }
  function finish(){
    void 0;
    scr('home');
    app.querySelectorAll('.nav button').forEach(function(x){x.classList.toggle('on',x.getAttribute('data-go')==='home');});
    var home=app.querySelector('.scr[data-s="home"]');
    if(home){
      home.querySelectorAll('.seg button').forEach(function(x){x.classList.toggle('on',x.getAttribute('data-view')==='perte');});
      home.querySelectorAll('.feed[data-view]').forEach(function(fd){fd.classList.toggle('hide',fd.getAttribute('data-view')!=='perte');});
    }
    sc0();
  }
  if(back) back.onclick=function(){ if(cur>0){cur--;render();} else scr('profile'); };
  app.querySelectorAll('[data-goto="identikit"]').forEach(function(el){ el.addEventListener('click',function(){ ans={};cur=0;render(); }); });
  if(Q){ render(); void 0; }
  if(/demo=perte/.test(location.search)){ ans={settore:'trading',capitale:'b',spesa:'s50',rischio:'regole',esperienza:'basi'}; finish(); }
})();
</script>

<script>
/* ===== Logica Partner: invita 3 -> sblocca Suggerisci + Link ref ===== */
(function(){
  var app=document.querySelector('.app'), bodyEl=app.querySelector('.body');
  var SOGLIA=3, activeDirects=0, everPartner=false, contributed=false, hasRef=false; // demo: 2/3 attivi, non ancora Partner
  // Partner se: 3 diretti ATTIVI, oppure (già stato Partner E ha contribuito o ha ref link attivi) -> retention
  function isPartner(){ return activeDirects>=SOGLIA || (everPartner && (contributed||hasRef)); }

  function progHtml(){
    var pct=Math.min(100, Math.round(activeDirects/SOGLIA*100)), left=Math.max(0,SOGLIA-activeDirects);
    return '<div style="margin-top:14px">'
      +'<div class="row" style="justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--mut)"><span>'+activeDirects+' / '+SOGLIA+' invitati</span><span>'+(left>0?('ancora '+left):'obiettivo raggiunto')+'</span></div>'

  function partnerCardHtml(){

      return '<div class="row" style="justify-content:space-between"><div class="eyebrow">Il tuo stato</div><span class="badge green">Attivo</span></div>'
        +'<div class="row" style="gap:12px;margin-top:10px"><div style="width:40px;height:40px;border-radius:50%;background:rgba(37,195,102,.16);color:var(--acc);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg class="ico" viewBox="0 0 24 24" style="width:22px;height:22px"><path d="M20 6 9 17l-5-5"/></svg></div>'
        +'<div style="flex:1"><div style="font-size:16px;font-weight:700">Sei Partner</div><div style="font-size:12.5px;color:var(--dim);margin-top:1px">Puoi suggerire servizi e inserire i tuoi link ref.</div></div></div>';
    }
    return '<div class="row" style="justify-content:space-between"><div class="eyebrow">Il tuo stato</div><span class="badge amber">In corso</span></div>'
      +'<div style="font-size:16px;font-weight:700;margin-top:10px">Diventa Partner</div>'
      +'<div style="font-size:12.5px;color:var(--dim);margin-top:4px;line-height:1.5">Invita <b style="color:var(--tx)">'+SOGLIA+' persone</b> nella tua rete per sbloccare <b style="color:var(--tx)">Suggerisci</b> e i <b style="color:var(--tx)">tuoi link ref</b>.</div>'
      + progHtml()
      +'<button class="demoInvite" style="width:100%;margin-top:12px;background:var(--acc);color:var(--on);border:none;border-radius:4px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer">Invita &nbsp;·&nbsp; simula un nuovo iscritto (+1)</button>';
  }
  function gateHtml(what){
    return '<div class="card">'
      +'<div class="row" style="gap:11px"><div style="width:38px;height:38px;border-radius:8px;background:var(--s2);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;color:var(--mut);flex-shrink:0"><svg class="ico" viewBox="0 0 24 24" style="width:19px;height:19px"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg></div>'
      +'<div style="flex:1"><div class="eyebrow">Riservato ai Partner</div><div style="font-size:15.5px;font-weight:700;margin-top:3px">Diventa Partner per '+what+'</div></div></div>'
      +'<div style="font-size:12.5px;color:var(--dim);margin-top:11px;line-height:1.5">Invita <b style="color:var(--tx)">'+SOGLIA+' persone</b> nella tua rete e sblocchi: <b style="color:var(--tx)">suggerire</b> servizi/prodotti e <b style="color:var(--tx)">inserire i tuoi link ref</b> su tutta la directory.</div>'
      + progHtml()
      +'<button class="goWallet" style="width:100%;margin-top:14px;background:var(--acc);color:var(--on);border:none;border-radius:4px;padding:13px;font-size:14px;font-weight:700;cursor:pointer">Vai a Affiliazione e invita →</button>'
      +'</div>';
  }
  function goWallet(){
    app.querySelectorAll('.scr').forEach(function(s){s.classList.toggle('on',s.getAttribute('data-s')==='wallet');});
    app.querySelectorAll('.nav button').forEach(function(x){x.classList.toggle('on',x.getAttribute('data-go')==='wallet');});
    if(bodyEl)bodyEl.scrollTop=0;
  }
  function setGate(gateId,bodyId,what){
    var g=document.getElementById(gateId),b=document.getElementById(bodyId); if(!g||!b)return;
    if(isPartner()){ g.style.display='none'; g.innerHTML=''; b.style.display=''; }
    else { g.style.display=''; g.innerHTML=gateHtml(what); b.style.display='none'; }
  }
  function render(){
    var pc=document.getElementById('partnerCard'); if(pc)pc.innerHTML=partnerCardHtml();
    setGate('suggGate','suggBody','suggerire un business');
    setGate('refGate','refBody','inserire i tuoi link ref');

.cta-attiva{width:100%;margin-top:16px;background:linear-gradient(135deg,#2fe37b 0%,#16b25e 100%);color:#fff;border:none;
  border-radius:12px;padding:14px;font-size:15px;font-weight:700;letter-spacing:-.01em;cursor:pointer;
  text-shadow:0 1px 2px rgba(0,0,0,.22);box-shadow:0 8px 20px -8px rgba(37,207,110,.7)}
.cta-attiva:active{transform:scale(.98)}
.cta-attiva[disabled]{opacity:.6;cursor:default}
.ssrc{font-size:11px;color:var(--mut);text-align:center;margin-top:9px;line-height:1.4}
.vuoto{padding:30px 18px;text-align:center;color:var(--mut);font-size:13px;line-height:1.6}


/* Utenti Cashly attivi: blocco a parte, viola. Gli altri dati li dichiara il fornitore,
   questo lo misuriamo noi: non deve sembrare la stessa cosa. */
.hubbox{display:flex;align-items:center;gap:13px;margin-top:18px;padding:14px;
  border:1px solid rgba(155,110,240,.3);background:rgba(155,110,240,.07);border-radius:12px}
.hubi{width:38px;height:38px;border-radius:11px;background:rgba(155,110,240,.16);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hubn{font-size:17px;font-weight:700;letter-spacing:-.02em;line-height:1.15;color:var(--purple)}
.hubt{font-size:12px;color:var(--dim);line-height:1.45;margin-top:4px}

/* Lista d'attesa */
.wl{display:flex;gap:10px;align-items:flex-start;margin-top:18px;padding:13px;border-radius:11px;
  border:1px solid rgba(255,180,61,.3);background:rgba(255,180,61,.07);font-size:12.5px;color:var(--dim);line-height:1.5}
.wl b{color:var(--tx);font-weight:700}
.wl.on{border-color:rgba(37,207,110,.32);background:rgba(37,207,110,.07)}

/* Disclaimer: sopra il bottone, perche' va accettato PRIMA di attivare */
.disc{margin-top:18px;padding:14px;border:1px solid var(--line2);border-radius:12px;background:var(--s0);
  font-size:11.5px;color:var(--mut);line-height:1.6}
.disc b{color:var(--dim);font-weight:700}
.acc{display:flex;align-items:flex-start;gap:11px;margin-top:13px;padding-top:13px;border-top:1px solid var(--line2);cursor:pointer}
.acc .box{width:22px;height:22px;border-radius:7px;border:1.8px solid var(--line2);background:var(--bg);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;margin-top:1px;transition:.15s}
.acc.on .box{background:var(--acc);border-color:var(--acc)}
.acc .box svg{width:13px;height:13px;opacity:0;transition:.15s}
.acc.on .box svg{opacity:1}
.acct{font-size:13px;color:var(--tx);font-weight:600;line-height:1.45}
.cta-attiva[disabled]{background:var(--s2)!important;color:var(--mut)!important;box-shadow:none!important;cursor:not-allowed;text-shadow:none}

/* riga dato: icona colorata + valore grosso */
.sr{display:flex;align-items:center;gap:12px;padding:13px 0;border-top:1px solid var(--line2)}
.si{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sk{flex:1;min-width:0;font-size:13.5px;color:var(--dim);font-weight:500}
.sv{font-size:16px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums;letter-spacing:-.02em;white-space:nowrap}
.sv small{display:block;font-size:11px;font-weight:400;color:var(--mut);letter-spacing:0;margin-top:1px}
.spanor{font-size:15px;line-height:1.55;color:#D7DBE2;letter-spacing:-.005em;padding:2px 0 4px}


/* Rimuovi: toglie dalla lista di Cashly, NON tocca il servizio del fornitore (e' di terzi) — non deve competere con le azioni vere */
.disatt{flex-shrink:0;background:var(--s1);border:1px solid var(--line2);color:var(--dim);border-radius:8px;
  padding:8px 13px;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer}
.disatt:active{transform:scale(.96)}
.disatt[disabled]{opacity:.6;cursor:default}

/* Popup waitlist: i punti numerati spiegano cosa succede davvero */
.wlp{display:flex;gap:11px;align-items:flex-start;padding:9px 0;font-size:12.5px;color:var(--dim);line-height:1.5}
.wlp b{color:var(--tx);font-weight:700}
.wlpi{width:20px;height:20px;border-radius:50%;background:var(--s2);color:var(--dim);font-size:10.5px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
#wlConferma[disabled]{background:var(--s2)!important;color:var(--mut)!important;box-shadow:none!important;cursor:not-allowed;text-shadow:none}

/* ===== PROPONI UN BUSINESS: tasto + ===== */
/* absolute dentro .app (che e' position:relative e non scrolla: scrolla la .body):
   cosi' resta ancorato alla colonna dell'app anche su schermo largo, non al viewport. */
.fab{position:absolute;right:18px;bottom:calc(80px + env(safe-area-inset-bottom));z-index:40;width:54px;height:54px;border-radius:50%;border:none;background:linear-gradient(135deg,#2fe37b 0%,#16b25e 100%);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 10px 26px -6px rgba(37,207,110,.75)}
.fab:active{transform:scale(.94)}
.app:not(.on-home) .fab{display:none}   /* il + propone alla directory: ha senso solo sull'HUB */
.pr-sheet{position:fixed;inset:0;z-index:160;display:none}
.pr-card{position:absolute;left:0;right:0;bottom:0;max-width:460px;margin:0 auto;max-height:88vh;overflow-y:auto;background:var(--s0);border-top:1px solid var(--line);border-radius:16px 16px 0 0;padding:14px 18px calc(18px + env(safe-area-inset-bottom))}
.pr-sel{width:100%;box-sizing:border-box;background:var(--s0);border:1px solid var(--line2);border-radius:11px;padding:13px;color:var(--tx);font-family:var(--sans);font-size:15px;font-weight:600;outline:none;appearance:none;-webkit-appearance:none}
.pr-sel:focus{border-color:var(--acc)}
textarea.pf-i{resize:vertical;min-height:84px;font-weight:500;line-height:1.45}

/* ===== PROFILO: form anagrafica ===== */
.pf-l{display:block;font-size:11.5px;font-weight:700;color:var(--mut);letter-spacing:.02em;margin:14px 0 6px}
.pf-l:first-child{margin-top:2px}
.pf-i{width:100%;box-sizing:border-box;background:var(--s0);border:1px solid var(--line2);border-radius:11px;padding:13px;color:var(--tx);font-family:var(--sans);font-size:15px;font-weight:600;outline:none}
.pf-i::placeholder{color:var(--mut);font-weight:500}
.pf-i:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(37,207,110,.16)}
.pf-i.err{border-color:#e2574a}
#pfSalva[disabled]{opacity:.6;cursor:default}
</style>

<style>.demoInvite{display:none!important}</style>
<script src="identikit.js?v=50"></script>
<script>
/* ===== LIVE: Telegram + dati reali (design del prototipo intatto) ===== */
(function(){
  var API_URL = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { try { tg.ready(); tg.expand(); } catch(e){} }
  var initData = (tg && tg.initData) || "";
  var HDRS = initData ? { "x-telegram-init-data": initData } : {};
  var REF_LINK = "https://t.me/cashlyhub_bot";   // aggiornato col ref reale da /affiliazione
  function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
  function setTxt(id, v){ var el=document.getElementById(id); if(el!=null && v!=null) el.textContent=v; }
  function ini(s){ return String(s||"?").trim().slice(0,1).toUpperCase(); }
  function setAvatar(el, foto){ if(!el || !foto) return; var im=new Image(); im.onload=function(){ el.style.backgroundImage='url("'+foto+'")'; el.style.backgroundSize='cover'; el.style.backgroundPosition='center'; el.style.backgroundRepeat='no-repeat'; el.textContent=''; }; im.src=foto; }
  function setAvatarById(id, foto){ setAvatar(document.getElementById(id), foto); }
  function homeAvatarEl(){ return document.getElementById('homeAvatar'); }
  function firstName(n){ return String(n||'').trim().split(/\s+/)[0] || ''; }
  function saluto(){ var h=new Date().getHours(); return h<5?'Buonanotte':(h<12?'Buongiorno':(h<18?'Buon pomeriggio':'Buonasera')); }
  (function(){ var g=document.getElementById('homeGreet'); if(g) g.textContent=saluto()+','; })();

  // ---- avatar + nome da Telegram ----
  try {
    var u = tg && tg.initDataUnsafe && tg.initDataUnsafe.user;
    if (u && u.first_name) {
      var full = (u.first_name + (u.last_name ? (' ' + u.last_name) : '')).trim();
      var i0 = ini(u.first_name);
      setTxt('homeAvatar', i0);
      setTxt('homeName', firstName(u.first_name));
      setTxt('profAvatar', i0);
      setTxt('profName', full);
      if (u.username) setTxt('profHandle', '@' + u.username + ' · Membro Cashly');
      // foto profilo Telegram dell'utente corrente (se fornita nell'initData)
      if (u.photo_url) {
        setAvatar(homeAvatarEl(), u.photo_url);
        setAvatarById('profAvatar', u.photo_url);
        setAvatarById('hubAvatar', u.photo_url);
        setAvatarById('paginaAvatar', u.photo_url);
      }
    }
  } catch(e){}

  // ---- HOME: directory reale + salva (preferiti) ----
  var ALLBIZ = [], SAVED = {}, CATS = [], VOTED = {}, MACRO = [];
  // Stato dei filtri della directory. PRIMA erano dichiarati nel vecchio blocco
  // renderFeeds, che ho sostituito riscrivendo l'HUB: senza queste, FILTRO_Q era
  // undefined e visibili() lanciava, ingoiato dal .catch -> lista vuota.
  var FILTRO_Q = '', FILTRO_CAT = 0;
  // Salva = segnalibro (icona classica). La stella non c'e' piu' (Antonio).
  function saveSvg(on){
    return on
      ? '<svg viewBox="0 0 24 24" style="width:19px;height:19px;fill:var(--acc);stroke:var(--acc);stroke-width:1.6;stroke-linejoin:round"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4.5L5 21V4a1 1 0 0 1 1-1z"/></svg>'
      : '<svg viewBox="0 0 24 24" style="width:19px;height:19px;fill:none;stroke:var(--mut);stroke-width:1.8;stroke-linejoin:round"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4.5L5 21V4a1 1 0 0 1 1-1z"/></svg>';
  }
  function voteSvg(){
    return '<svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round"><path d="M12 5v14M6 11l6-6 6 6"/></svg>';
  }
  // Fascia temporale di una data: piu' recente in alto. Serve sia ai business (created_at)
  // sia ai ref (iscritto_il). Antonio: dividere per giorni/settimane/mesi/anni.
  function bucketTempo(iso){
    if (!iso) return { ord: 9, label: 'Senza data' };
    var d = new Date(iso.indexOf('Z') < 0 && iso.indexOf('+') < 0 ? iso + 'Z' : iso);
    if (isNaN(d.getTime())) return { ord: 9, label: 'Senza data' };
    var gg = Math.floor((Date.now() - d.getTime()) / 86400000);
    if (gg <= 0) return { ord: 0, label: 'Oggi' };
    if (gg < 7)  return { ord: 1, label: 'Questa settimana' };
    if (gg < 30) return { ord: 2, label: 'Questo mese' };
    if (gg < 365) return { ord: 3, label: "Quest'anno" };
    return { ord: 4, label: 'Oltre un anno' };
  }
  function raggruppaTempo(items, getIso, rowFn){
    var buckets = {};
    items.forEach(function(it){
      var b = bucketTempo(getIso(it));
      if (!buckets[b.ord]) buckets[b.ord] = { label: b.label, items: [] };
      buckets[b.ord].items.push(it);
    });
    return Object.keys(buckets).sort(function(a,b){ return a - b; }).map(function(k){
      return '<div class="grp">' + esc(buckets[k].label) + '</div>' + buckets[k].items.map(rowFn).join('');
    }).join('');
  }
  function rowHtml(s){
    var votato = !!VOTED[s.id];
    var attivo = s.stato === 'attivo';
    return '<div class="fitem" data-item="' + s.id + '">'
      + '<div class="frow" data-open="' + s.id + '">'
      +   '<div class="fbody">'
      +     '<div class="fnm">' + esc(s.nome) + '</div>'
      +     '<div class="fst' + (attivo ? ' live' : '') + '"><span class="pdot"></span>' + (attivo ? 'attivo' : 'in arrivo') + '</div>'
      +   '</div>'
      +   '<button class="votebtn' + (votato ? ' on' : '') + '" data-vote="' + s.id + '" aria-label="Vota">'
      +     voteSvg() + '<span class="vn">' + (s.voti || 0) + '</span></button>'
      +   '<button class="savebtn" data-id="' + s.id + '" aria-label="Salva">' + saveSvg(!!SAVED[s.id]) + '</button>'
      +   '<svg class="fchev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>'
      + '</div>'
      + '<div class="fdrop" data-drop="' + s.id + '"></div>'
      + '</div>';
  }
  function visibili(){
    var q = FILTRO_Q.trim().toLowerCase();
    return ALLBIZ.filter(function(s){
      if (SOLO_SALVATI && !SAVED[s.id]) return false;
      if (FILTRO_MACRO && !CATS.some(function(c){ return c.id === s.categoria_id && c.macro_categoria_id === FILTRO_MACRO; })) return false;
      if (FILTRO_CAT && s.categoria_id !== FILTRO_CAT) return false;
      if (!q) return true;
      // la ricerca guarda anche la descrizione: non e' mostrata, ma serve a trovare
      return ((s.nome || '') + ' ' + (s.descrizione || '')).toLowerCase().indexOf(q) >= 0;
    });
  }
  function renderFeeds(){
    var host = document.getElementById('listaReale');
    if (!host) return;
    var lista = visibili();
    if (!lista.length) {
      host.innerHTML = ALLBIZ.length
        ? '<div class="vuoto">Nessun business con questi filtri.</div>'
        : '<div class="vuoto">Lista svuotata.<br>In attesa del primo prodotto reale.</div>';
      return;
    }
    // Raggruppati per FASCIA TEMPORALE (Antonio): la categoria resta la navigazione (tab).
    host.innerHTML = raggruppaTempo(lista, function(s){ return s.created_at; }, rowHtml);
  }

  // ---- CATEGORIE A DUE LIVELLI ----
  var FILTRO_MACRO = 0, SOLO_SALVATI = false;
  function disegnaTabs(){
    var mt = document.getElementById('macroTabs'), st = document.getElementById('subTabs');
    if (!mt || !st) return;
    // Le macro senza categorie non si mostrano: sono rumore.
    var macroVive = MACRO.filter(function(m){ return CATS.some(function(c){ return c.macro_categoria_id === m.id; }); });
    var h = '<button class="macro' + (!FILTRO_MACRO && !SOLO_SALVATI ? ' on' : '') + '" data-macro="0">Tutti</button>';
    macroVive.forEach(function(m){
      h += '<button class="macro' + (FILTRO_MACRO === m.id && !SOLO_SALVATI ? ' on' : '') + '" data-macro="' + m.id + '">' + esc(m.nome) + '</button>';
    });
    var nSalv = Object.keys(SAVED).filter(function(k){ return SAVED[k]; }).length;
    if (nSalv) h += '<button class="macro' + (SOLO_SALVATI ? ' on' : '') + '" data-macro="salvati">Salvati</button>';
    mt.innerHTML = h;

    // Sotto-categorie: solo quelle della macro scelta.
    var figlie = FILTRO_MACRO ? CATS.filter(function(c){ return c.macro_categoria_id === FILTRO_MACRO; }) : [];
    if (!figlie.length || SOLO_SALVATI) { st.innerHTML = ''; st.style.display = 'none'; return; }
    st.style.display = '';
    var q = '<button class="sub' + (!FILTRO_CAT ? ' on' : '') + '" data-sub="0">Tutte <b>' + conta(0, FILTRO_MACRO) + '</b></button>';
    figlie.forEach(function(c){
      q += '<button class="sub' + (FILTRO_CAT === c.id ? ' on' : '') + '" data-sub="' + c.id + '">' + esc(c.nome) + ' <b>' + conta(c.id, 0) + '</b></button>';
    });
    st.innerHTML = q;
  }
  function conta(catId, macroId){
    return ALLBIZ.filter(function(s){
      if (catId) return s.categoria_id === catId;
      if (macroId) return CATS.some(function(c){ return c.id === s.categoria_id && c.macro_categoria_id === macroId; });
      return true;
    }).length;
  }
  document.addEventListener('click', function(e){
    var m = e.target.closest && e.target.closest('[data-macro]');
    if (m) {
      var v = m.getAttribute('data-macro');
      SOLO_SALVATI = (v === 'salvati');
      FILTRO_MACRO = SOLO_SALVATI ? 0 : (parseInt(v) || 0);
      FILTRO_CAT = 0;                       // cambiando macro, la sotto scelta non ha piu' senso
      disegnaTabs(); renderFeeds();
      if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.selectionChanged(); } catch(x){} }
      return;
    }
    var sb = e.target.closest && e.target.closest('[data-sub]');
    if (sb) {
      FILTRO_CAT = parseInt(sb.getAttribute('data-sub')) || 0;
      disegnaTabs(); renderFeeds();
      if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.selectionChanged(); } catch(x){} }
    }
  });

  // ---- SCHEDA A TENDINA ----
  // Panoramica, costi e step NON arrivano da /business-list: li chiediamo a /servizio
  // solo quando la scheda si apre davvero, e li teniamo in cache.
  var SCHEDE = {};
  function riga(k, v){
    if (v === null || v === undefined || v === '') return '';
    return '<div class="sr"><div class="sk">' + esc(k) + '</div><div class="sv">' + esc(String(v)) + '</div></div>';
  }
  function euro(v){
    if (v === null || v === undefined || v === '') return '';
    var n = Number(v);
    return isNaN(n) ? String(v) : (n % 1 === 0 ? n.toFixed(0) : n.toFixed(2)) + ' EUR';
  }
  var RISCHIO = { 1:'Molto basso', 2:'Basso', 3:'Medio', 4:'Alto', 5:'Molto alto' };

  var ICO = {
    budget:  ['255,180,61',  'var(--amber)',  '<path d="M16 8a5 5 0 1 0 0 8M4 10h8M4 14h8"/>'],
    ciclo:   ['90,169,240',  'var(--blue)',   '<path d="M20 11a8 8 0 0 0-13.7-5.7L3 8.5M4 13a8 8 0 0 0 13.7 5.7L21 15.5"/><path d="M3 4v4.5h4.5M21 20v-4.5h-4.5"/>'],
    calend:  ['90,169,240',  'var(--blue)',   '<rect x="3.5" y="5" width="17" height="16" rx="2.5"/><path d="M3.5 10h17M8 3v4M16 3v4"/>'],
    scudo:   ['37,207,110',  'var(--acc)',    '<path d="M12 3l8 3v6c0 4.5-3.2 8.3-8 9.5-4.8-1.2-8-5-8-9.5V6z"/>']
  };
  function srow(icona, label, valore, sotto, colore){
    var i = ICO[icona];
    return '<div class="sr">'
      + '<div class="si" style="background:rgba(' + i[0] + ',.14)">'
      +   '<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:none;stroke:' + i[1] + ';stroke-width:2;stroke-linecap:round;stroke-linejoin:round">' + i[2] + '</svg>'
      + '</div>'
      + '<div class="sk">' + esc(label) + '</div>'
      + '<div class="sv"' + (colore ? ' style="color:' + colore + '"' : '') + '>' + esc(valore)
      +   (sotto ? '<small>' + esc(sotto) + '</small>' : '') + '</div>'
      + '</div>';
  }
  // Il colore e' un giudizio, non decorazione: verde ok, ambra attenzione, rosso no.
  var RISCHIO = { 1:['Molto basso','var(--acc)'], 2:['Basso','var(--acc)'], 3:['Medio','var(--amber)'], 4:['Alto','#E2574A'], 5:['Molto alto','#E2574A'] };

  // Lo share va SOTTO ogni scheda, qualunque sia il ramo (tutorial / waitlist / attiva):
  // il corpo ha return anticipati, quindi lo aggiungo con un wrapper invece che dentro ogni ramo.
  function schedaHtml(d){
    return _schedaBody(d)
      + '<button class="sc-share" data-share="1"><svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>Condividi</button>';
  }
  function _schedaBody(d){
    var s = d.servizio || {};
    var out = '';

    var panor = s.panoramica || s.descrizione || '';
    if (panor) out += '<div class="spanor">' + esc(panor) + '</div>';

    // I 4 dati decisi con Antonio. Le righe senza valore non si disegnano.
    var righe = '';
    var budget = s.budget_minimo ? ('da ' + s.budget_minimo + ' EUR') : (s.costo_attivazione ? ('da ' + s.costo_attivazione + ' EUR') : '');
    if (budget) righe += srow('budget', 'Budget', budget, '', '');
    if (s.longevita) righe += srow('ciclo', 'Longevita', s.longevita, s.longevita.toLowerCase() === 'ciclica' ? 'si ripete a ogni ciclo' : '', '');
    var r = RISCHIO[s.rischio_livello];
    if (r) righe += srow('scudo', 'Rischio', r[0], '', r[1]);
    out += righe;

    if (!panor && !righe) out += '<div class="vuoto" style="padding:20px 0">Scheda ancora da compilare.</div>';

    // Utenti attivi: blocco a parte. Gli altri dati li dichiara il fornitore, questo lo contiamo noi.
    // A zero resta nascosto: "0 utenti attivi" e' peggio del silenzio.
    if (d.utenti_attivi) {
      out += '<div class="hubbox">'
        + '<div class="hubi"><svg viewBox="0 0 24 24" style="width:19px;height:19px;fill:none;stroke:var(--purple);stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><circle cx="9" cy="8" r="3.2"/><path d="M2.5 20c0-3.3 2.9-5.5 6.5-5.5s6.5 2.2 6.5 5.5"/><circle cx="18" cy="9" r="2.6"/><path d="M17 14.4c2.8.3 4.9 2.3 4.9 5.1"/></svg></div>'
        + '<div style="flex:1;min-width:0">'
        +   '<div class="hubn">' + d.utenti_attivi + (d.utenti_attivi === 1 ? ' utente Cashly attivo' : ' utenti Cashly attivi') + '</div>'
        +   '<div class="hubt">Non ce lo dice il fornitore: lo contiamo noi.</div>'
        + '</div></div>';
    }

    var steps = Array.isArray(s.tutorial_steps) ? s.tutorial_steps : [];
    var attivo = !!d.gia_interessato;
    var fatto = (d.step_progress && d.step_progress.ultimo_step) || 0;

    // 1) gia' attivato -> il tutorial
    if (attivo) {
      if (steps.length) {
        out += '<div class="seyeb">Come si attiva &mdash; ' + steps.length + (steps.length === 1 ? ' passo' : ' passi') + '</div>';
        out += steps.map(function(st, i){
          var done = i < fatto;
          return '<div class="sstep' + (done ? ' done' : '') + '">'
            + '<div class="sn">' + (done ? '&#10003;' : (i + 1)) + '</div>'
            + '<div style="flex:1;min-width:0">'
            +   '<div class="st">' + esc(st.titolo || ('Passo ' + (i + 1))) + '</div>'
            +   (st.testo ? '<div class="sd">' + esc(st.testo) + '</div>' : '')
            +   (st.link_url ? '<a class="slink" href="' + esc(st.link_url) + '" target="_blank" rel="noopener" data-ext="1">' + esc(st.link_label || 'Apri') + '<svg viewBox="0 0 24 24" style="width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round"><path d="M7 17 17 7M9 7h8v8"/></svg></a>' : '')
            + '</div></div>';
        }).join('');
      } else {
        out += '<div class="vuoto" style="padding:18px 0">Attivato. Il tutorial non e ancora stato scritto.</div>';
      }
      return out;
    }

    // 2) servizio non ancora attivo -> lista d'attesa, non attivazione
    if (!d.attivo) {
      if (d.in_waitlist) {
        out += '<div class="wl on">'
          + '<svg viewBox="0 0 24 24" style="width:17px;height:17px;fill:none;stroke:var(--acc);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0"><path d="M20 6 9 17l-5-5"/></svg>'
          + '<div><b>Sei in lista.</b> Quando parte te lo scrive il bot.</div></div>';
      } else {
        out += '<div class="wl">'
          + '<svg viewBox="0 0 24 24" style="width:17px;height:17px;fill:none;stroke:var(--amber);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>'
          + '<div><b>Non e ancora attivo.</b> Lascia che ti avvisi: quando parte ti arriva un messaggio dal bot.</div></div>';
        out += '<button class="cta-attiva" data-wait="' + s.id + '">Avvisami quando parte</button>';
        if (d.waitlist_count) out += '<div class="ssrc">' + d.waitlist_count + (d.waitlist_count === 1 ? ' persona lo aspetta.' : ' persone lo aspettano.') + '</div>';
      }
      return out;
    }

    // 3) attivo -> disclaimer da accettare, POI il bottone
    out += '<div class="disc">'
      + '<b>Servizio di terzi.</b> Non e gestito, controllato ne garantito da Cashly: Cashly lo segnala e basta. Attivandolo entri in rapporto diretto con il fornitore e ne accetti termini e condizioni.<br><br>'
      + '<b>Link di affiliazione.</b> Se attivi da qui, Cashly riceve una commissione dal fornitore. Per te non cambia nulla: non paghi di piu.<br><br>'
      + '<b>Rischio.</b> Operare sui mercati puo farti perdere il capitale, anche tutto. Nessun rendimento e promesso ne garantito. I risultati passati non dicono niente su quelli futuri. Non e consulenza finanziaria: valuta tu, e se non sei sicuro chiedi a un consulente abilitato.'
      + '<div class="acc" data-acc="' + s.id + '">'
      +   '<div class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#04210F" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>'
      +   '<div class="acct">Ho letto e accetto: e un servizio di terzi, Cashly prende una commissione e posso perdere il capitale.</div>'
      + '</div></div>';
    out += '<button class="cta-attiva" data-attiva="' + s.id + '" disabled>Attiva servizio</button>';
    if (steps.length) out += '<div class="ssrc">Poi ti guido passo passo: ' + steps.length + (steps.length === 1 ? ' passo.' : ' passi.') + '</div>';
    if (d.ref_link && d.ref_fonte === 'sponsor') out += '<div class="ssrc">Il link e di chi ti ha invitato.</div>';
    return out;
  }


  // ---- POPUP WAITLIST ----
  // Non e' una formalita': prima di prenotarsi l'utente deve sapere COSA succede
  // (avviso dal bot, priorita') e accettarlo. Senza spunta il bottone resta spento.

    var e = document.getElementById('wlSheet');
    if (e) e.style.display = 'none';
  }
  function apriPopupWaitlist(id){

    var sh = document.getElementById('wlSheet');

      +   '<div class="acc" id="wlAcc" style="border-top:1px solid var(--line2);margin-top:14px;padding-top:14px">'
      +     '<div class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#04210F" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>'
      +     '<div class="acct">Ho capito: mi prenoto, mi avvisate quando parte, e non sto comprando nulla.</div>'
      +   '</div>'
      +   '<div style="display:flex;gap:9px;margin-top:14px">'
      +     '<button type="button" data-wlclose="1" style="flex:1;background:var(--s1);border:1px solid var(--line2);color:var(--tx);border-radius:11px;padding:13px;font-size:14px;font-weight:700;cursor:pointer">Annulla</button>'
      +     '<button type="button" id="wlConferma" data-wait="' + id + '" class="aff-cta" style="flex:1.4;height:auto;padding:13px" disabled>Confermo, mettimi in lista</button>'
      +   '</div>'
      + '</div>';

    if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(x){} }

  function apriScheda(id){
    var drop = document.querySelector('[data-drop="' + id + '"]');
    var item = document.querySelector('[data-item="' + id + '"]');
    if (!drop || !item) return;
    var aperta = item.classList.toggle('open');
    if (!aperta) return;
    if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(x){} }
    if (SCHEDE[id]) { drop.innerHTML = schedaHtml(SCHEDE[id]); return; }
    drop.innerHTML = '<div class="vuoto" style="padding:18px 0">Carico...</div>';
    fetch(API_URL + '/servizio?id=' + id, { headers: HDRS, cache: 'no-store' })
      .then(function(r){ return r.json(); })
      .then(function(d){
        if (!d || d.error) throw new Error('ko');
        SCHEDE[id] = d;
        drop.innerHTML = schedaHtml(d);
      })
      .catch(function(){ drop.innerHTML = '<div class="vuoto" style="padding:18px 0">Non sono riuscito a caricare la scheda.</div>'; });
  }

  document.addEventListener('click', function(e){
    var t = e.target;
    if (!t || !t.closest) return;

    var b = t.closest('.savebtn');
    if (b) {
      e.stopPropagation();
      var id = parseInt(b.getAttribute('data-id'));
      if (!id) return;
      SAVED[id] = !SAVED[id];
      b.innerHTML = saveSvg(!!SAVED[id]);
      if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(x){} }
      disegnaTabs();
      if (SOLO_SALVATI) renderFeeds();
      fetch(API_URL + '/preferito', { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, HDRS), body: JSON.stringify({ servizio_id: id }) }).catch(function(){});
      return;
    }

    var v = t.closest('.votebtn');
    if (v) {
      e.stopPropagation();
      var vid = parseInt(v.getAttribute('data-vote'));
      if (!vid) return;
      var num = v.querySelector('.vn');
      var era = !!VOTED[vid];
      VOTED[vid] = !era;                       // ottimistico: il tocco deve rispondere subito
      v.classList.toggle('on', !era);
      num.textContent = Math.max(0, (parseInt(num.textContent) || 0) + (era ? -1 : 1));
      if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(x){} }
      fetch(API_URL + '/vota', { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, HDRS), body: JSON.stringify({ servizio_id: vid }) })
        .then(function(r){ return r.json(); })
        .then(function(d){ if (d && typeof d.voti === 'number') num.textContent = d.voti; })   // il vero conteggio e del server
        .catch(function(){ VOTED[vid] = era; v.classList.toggle('on', era); num.textContent = Math.max(0, (parseInt(num.textContent) || 0) + (era ? 1 : -1)); });
      return;
    }

    // Toglie il business dalla lista in Cashly. Il servizio del fornitore non lo tocca nessuno:
    // e' di terzi, fuori da Cashly. Per questo il tasto dice "Rimuovi" e non "Disattiva".
    var off = t.closest('.disatt');
    if (off) {
      e.stopPropagation();
      var oid = parseInt(off.getAttribute('data-off'));
      if (!oid || off.disabled) return;
      off.disabled = true; off.textContent = 'Rimuovo...';
      fetch(API_URL + '/disattiva', { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, HDRS), body: JSON.stringify({ servizio_id: oid }) })
        .then(function(r){ return r.json(); })
        .then(function(d){
          if (!d || d.error) throw new Error('ko');
          var riga = off.closest('.dir');
          if (riga) riga.remove();
          var rimasti = document.querySelectorAll('#pfBizList .dir').length;
          if (!rimasti) { var w = document.getElementById('pfBizWrap'); if (w) w.style.display = 'none'; }
          setTxt('pfBiz', rimasti);
          // la scheda nell'HUB deve tornare a mostrare la CTA, non il tutorial
          if (SCHEDE[oid]) {
            SCHEDE[oid].gia_interessato = false;
            var drop = document.querySelector('[data-drop="' + oid + '"]');
            if (drop) drop.innerHTML = schedaHtml(SCHEDE[oid]);
          }
          if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.notificationOccurred('success'); } catch(x){} }
        })
        .catch(function(){ off.disabled = false; off.textContent = 'Rimuovi'; });
      return;
    }

    // Spunta: vale sia per il disclaimer nella scheda sia per il popup della waitlist.
    // Il bottone da accendere si cerca nel contenitore di QUELLA spunta (.fdrop o .pr-card):
    // con un solo contenitore fisso, la spunta del popup si accendeva ma il bottone no.
    var ac = t.closest('.acc');
    if (ac) {
      e.stopPropagation();
      var on = ac.classList.toggle('on');
      var cont = ac.closest('.fdrop') || ac.closest('.pr-card');
      var btnA = cont && (cont.querySelector('.cta-attiva[data-attiva]') || cont.querySelector('#wlConferma'));
      if (btnA) btnA.disabled = !on;
      if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(x){} }
      return;
    }

    // lista d'attesa per i servizi non ancora attivi
    var w = t.closest('.cta-attiva[data-wait]');
    if (w) {
      e.stopPropagation();
      apriPopupWaitlist(parseInt(w.getAttribute('data-wait')));
      return;
    }

    var wc = t.closest('#wlConferma');
    if (wc) {
      e.stopPropagation();
      if (wc.disabled) return;
      var wid = parseInt(wc.getAttribute('data-wait'));
      if (!wid) return;
      wc.disabled = true; wc.textContent = 'Un attimo...';
      fetch(API_URL + '/waitlist', { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, HDRS), body: JSON.stringify({ servizio_id: wid }) })
        .then(function(r){ return r.json(); })
        .then(function(d){
          if (!d || d.error) throw new Error('ko');
          if (SCHEDE[wid]) { SCHEDE[wid].in_waitlist = true; SCHEDE[wid].waitlist_count = d.waitlist_count; }
          var drop = document.querySelector('[data-drop="' + wid + '"]');
          if (drop && SCHEDE[wid]) drop.innerHTML = schedaHtml(SCHEDE[wid]);
          chiudiPopupWaitlist();
          if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.notificationOccurred('success'); } catch(x){} }
        })
        .catch(function(){ wc.disabled = false; wc.textContent = 'Confermo, mettimi in lista'; });
      return;
    }

    var wx = t.closest('[data-wlclose]');
    if (wx) { e.stopPropagation(); chiudiPopupWaitlist(); return; }


    var a = t.closest('.cta-attiva[data-attiva]');
    if (a) {
      e.stopPropagation();
      if (a.disabled) return;
      var aid = parseInt(a.getAttribute('data-attiva'));
      if (!aid) return;
      a.disabled = true; a.textContent = 'Attivo...';
      fetch(API_URL + '/attiva', { method: 'POST', headers: Object.assign({ 'Content-Type': 'application/json' }, HDRS), body: JSON.stringify({ servizio_id: aid, disclaimer_accettato: true }) })
        .then(function(r){ return r.json(); })
        .then(function(d){
          if (!d || d.error) throw new Error('ko');
          if (SCHEDE[aid]) SCHEDE[aid].gia_interessato = true;
          var drop = document.querySelector('[data-drop="' + aid + '"]');
          if (drop && SCHEDE[aid]) drop.innerHTML = schedaHtml(SCHEDE[aid]);   // ora appaiono gli step
          if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.notificationOccurred('success'); } catch(x){} }
        })
        .catch(function(){ a.disabled = false; a.textContent = 'Attiva servizio'; });
      return;
    }

    // link di uno step: aprilo FUORI, non dentro la webview di Telegram
    var ext = t.closest('a[data-ext]');
    if (ext) {
      e.preventDefault();
      var u = ext.getAttribute('href');
      try { if (tg && tg.openLink) tg.openLink(u); else window.open(u, '_blank'); } catch(x){ window.open(u, '_blank'); }
      return;
    }

    // Condividi dalla scheda: apre lo stesso menu dell'header.
    var shb = t.closest('[data-share]');
    if (shb) { e.stopPropagation(); if (window.__openShare) window.__openShare(); return; }

    var r = t.closest('.frow');
    if (r) apriScheda(parseInt(r.getAttribute('data-open')));
  });

  fetch(API_URL + "/business-list", { headers: HDRS, cache: "no-store" })
    .then(function(r){ return r.json(); })
    .then(function(d){
      ALLBIZ = [];
      // Le categorie arrivano tutte, anche quelle ancora senza business: servono al form "+".
      CATS = (d.categorie || []).map(function(c){ return { id: c.id, nome: c.nome, macro_categoria_id: c.macro_categoria_id }; });
      MACRO = (d.macro_categorie || []).map(function(m){ return { id: m.id, nome: m.nome }; });
      (d.categorie || []).forEach(function(c){ (c.servizi || []).forEach(function(s){ ALLBIZ.push(s); }); });
      ALLBIZ.sort(function(a,b){ return (b.voti||0)-(a.voti||0); });
      (d.miei_preferiti || []).forEach(function(id){ SAVED[id] = true; });
      (d.miei_voti || []).forEach(function(id){ VOTED[id] = true; });
      disegnaTabs();
      renderFeeds();
    })
    .catch(function(){});

  // ---- ME: profilo (business attivi) ----
  // ---- PROFILO ----
  function dataIt(iso){
    if (!iso) return '';
    var d = new Date(iso.indexOf('Z') < 0 && iso.indexOf('+') < 0 ? iso + 'Z' : iso);
    if (isNaN(d.getTime())) return '';
    var M = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
    return d.getDate() + ' ' + M[d.getMonth()] + ' ' + d.getFullYear();
  }
  function rigaDato(label, valore, vuoto){
    return '<div class="dir" style="align-items:center">'
      + '<div style="flex:1;min-width:0"><div class="dds" style="margin:0">' + esc(label) + '</div>'
      + '<div class="dnm" style="font-size:14px;margin-top:2px;word-break:break-all'
      + (vuoto ? ';color:var(--mut);font-weight:500' : '') + '">' + esc(valore) + '</div></div></div>';
  }

  // Anagrafica dell'utente (modificabile) tenuta separata dai dati Telegram (sola lettura).
  var ANAG = { nome:'', cognome:'', email:'', telefono:'', citta:'' };
  var TG_RO = null;   // ultimi dati Telegram visti, per ridisegnare dopo un salvataggio

  function renderDati(L, u, uname){
    TG_RO = { L: L, u: u, uname: uname };
    var dd = document.getElementById('pfDati');
    if (!dd) return;
    var righe = '';
    var nomeCompleto = (ANAG.nome + (ANAG.cognome ? (' ' + ANAG.cognome) : '')).trim();
    righe += rigaDato('Nome', nomeCompleto || 'da completare', !nomeCompleto);
    righe += rigaDato('Email', ANAG.email || 'da completare', !ANAG.email);
    righe += rigaDato('Telefono', ANAG.telefono || 'da completare', !ANAG.telefono);
    righe += rigaDato('Citta', ANAG.citta || 'da completare', !ANAG.citta);
    // Da qui in giu' e' Telegram: non lo puo' cambiare l'utente, e non lo fingiamo.
    righe += rigaDato('Username', uname ? ('@' + uname) : 'non impostato su Telegram', !uname);
    if (u.id || L.telegram_id) righe += rigaDato('ID Telegram', String(u.id || L.telegram_id));
    if (u.is_premium || L.is_premium) righe += rigaDato('Telegram Premium', 'attivo');
    var lng = u.language_code || L.lingua;
    if (lng) righe += rigaDato('Lingua', String(lng).toUpperCase());
    if (L.tg_bio) righe += rigaDato('Bio Telegram', L.tg_bio);
    var dal = dataIt(L.created_at);
    if (dal) righe += rigaDato('Su Cashly dal', dal);
    dd.innerHTML = righe;
  }

  // ---- ANAGRAFICA MODIFICABILE ----
  (function(){
    var form = document.getElementById('pfForm'), lista = document.getElementById('pfDati'),
        btnEdit = document.getElementById('pfEdit'), btnAnnulla = document.getElementById('pfAnnulla'),
        btnSalva = document.getElementById('pfSalva'), err = document.getElementById('pfErr');
    if (!form || !btnEdit) return;
    var F = { nome:'fNome', cognome:'fCognome', email:'fEmail', telefono:'fTelefono', citta:'fCitta' };
    function campo(k){ return document.getElementById(F[k]); }
    function mostraErrore(msg, k){
      err.textContent = msg; err.style.display = 'block';
      Object.keys(F).forEach(function(x){ campo(x).classList.toggle('err', x === k); });
      if (k) campo(k).focus();
    }
    function apri(){
      Object.keys(F).forEach(function(k){ campo(k).value = ANAG[k] || ''; campo(k).classList.remove('err'); });
      err.style.display = 'none';
      lista.style.display = 'none'; form.style.display = 'block'; btnEdit.style.display = 'none';
      if (tg && tg.HapticFeedback) { try { tg.HapticFeedback.impactOccurred('light'); } catch(x){} }
    }
    function chiudi(){
      form.style.display = 'none'; lista.style.display = ''; btnEdit.style.display = '';
    }
    btnEdit.addEventListener('click', apri);
    btnAnnulla.addEventListener('click', chiudi);

    form.addEventListener('submit', function(e){
      e.preventDefault();
      var v = {};
      Object.keys(F).forEach(function(k){ v[k] = campo(k).value.trim(); });
      if (!v.nome) return mostraErrore('Il nome serve: lo vede chi ti ha invitato.', 'nome');
      if (v.email && !/^[^@\s]+@[^@\s]+\.[^@\s]{2,}$/.test(v.email)) return mostraErrore('Questa email non sembra giusta.', 'email');
      if (v.telefono && !/^[0-9+()\s.\-]{6,}$/.test(v.telefono)) return mostraErrore('Questo numero non sembra giusto.', 'telefono');

      err.style.display = 'none';
      btnSalva.disabled = true; btnSalva.textContent = 'Salvo...';
      fetch(API_URL + '/anagrafica', {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, HDRS),
        body: JSON.stringify(v)
      })
      .then(function(r){ return r.json().then(function(j){ return { ok: r.ok, j: j }; }); })
      .then(function(res){
        if (!res.ok || !res.j || res.j.error) throw new Error((res.j && res.j.error) || 'errore');
        ANAG = v;
        // ridisegna subito con i dati nuovi: niente reload, niente attese
        if (TG_RO) {
          var nm = (v.nome + (v.cognome ? (' ' + v.cognome) : '')).trim();

  function daQuando(iso){
    if (!iso) return '';
    var d = new Date(iso.indexOf('Z') < 0 && iso.indexOf('+') < 0 ? iso + 'Z' : iso);
    if (isNaN(d.getTime())) return '';
    var gg = Math.floor((Date.now() - d.getTime()) / 86400000);
    if (gg <= 0) return 'entrato oggi';
    if (gg === 1) return 'entrato ieri';
    if (gg < 30) return 'da ' + gg + ' giorni';
    var mm = Math.floor(gg / 30);
    return 'da ' + mm + (mm === 1 ? ' mese' : ' mesi');
  }

  (function(){

      var on = app.querySelector('.scr.on');
