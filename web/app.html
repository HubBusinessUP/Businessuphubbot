    function tile(id,label,bg,svg){ return '<button data-sh="'+id+'" style="background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--dim);font-size:11px;font-weight:600"><span style="width:54px;height:54px;border-radius:16px;background:'+bg+';display:flex;align-items:center;justify-content:center">'+svg+'</span>'+label+'</button>'; }
    var iWa='<svg viewBox="0 0 32 32" style="width:30px;height:30px;fill:#fff"><path d="M16 3C9 3 3.5 8.5 3.5 15.5c0 2.4.7 4.7 1.9 6.7L3.2 29l7-1.8c1.9 1 4 1.6 6.1 1.6 7 0 12.5-5.5 12.5-12.5S23 3 16 3Zm7.3 17.6c-.3.9-1.8 1.7-2.5 1.8-.6.1-1.5.1-2.4-.2-.6-.2-1.3-.4-2.2-.8-3.9-1.7-6.4-5.6-6.6-5.9-.2-.3-1.6-2.1-1.6-4s1-2.8 1.3-3.2c.3-.4.7-.4.9-.4h.7c.2 0 .5-.1.8.6l1 2.5c.1.2.1.4 0 .6-.1.2-.2.4-.4.6l-.5.6c-.2.2-.3.4-.1.7.2.4 1 1.6 2.1 2.6 1.4 1.2 2.5 1.6 2.9 1.8.3.1.5.1.7-.1l.9-1.1c.2-.3.5-.2.8-.1l2.4 1.1c.3.1.5.2.6.4.1.1.1.7-.2 1.6Z"/></svg>';
    var iTg='<svg viewBox="0 0 32 32" style="width:30px;height:30px;fill:#fff"><path d="M28.7 5.4 4.2 14.9c-1.2.5-1.2 2 0 2.4l6.2 1.9 2.4 7.5c.3.9 1 1 1.6.4l3.4-3.2 6.4 4.7c.8.6 1.9.1 2.1-.9l4-19c.3-1.2-.7-2-1.6-1.3ZM12.2 18.8l11.7-7.4c.4-.2.8.3.5.6l-9.5 8.9-.4 4.2-.9-6.3Z"/></svg>';
    var iX='<svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:#fff"><path d="M17.5 3h3l-6.6 7.6L21.7 21h-6l-4.7-6.1L5.6 21h-3l7-8L2 3h6.1l4.3 5.6L17.5 3Zm-1 16.1h1.7L7.6 4.8H5.8l10.7 14.3Z"/></svg>';
    var iCp='<svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:none;stroke:#052210;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>';
    var iFb='<svg viewBox="0 0 32 32" style="width:30px;height:30px;fill:#fff"><path d="M29 16c0-7.2-5.8-13-13-13S3 8.8 3 16c0 6.5 4.8 11.9 11 12.9v-9.1h-3.3V16H14v-2.9c0-3.3 1.9-5.1 4.9-5.1 1.4 0 2.9.3 2.9.3v3.2h-1.6c-1.6 0-2.1 1-2.1 2v2.5h3.6l-.6 3.8h-3v9.1c6.2-1 11-6.4 11-12.9Z"/></svg>';
    var iMl='<svg viewBox="0 0 24 24" style="width:26px;height:26px;fill:none;stroke:#fff;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round"><rect x="2.5" y="5" width="19" height="14" rx="2.5"/><path d="m3 7 9 6 9-6"/></svg>';
    var iSm='<svg viewBox="0 0 24 24" style="width:26px;height:26px;fill:none;stroke:#fff;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round"><path d="M21 12a8 8 0 0 1-8 8H7l-4 3 1.2-4.3A8 8 0 0 1 13 4a8 8 0 0 1 8 8Z"/></svg>';
    var iMr='<svg viewBox="0 0 24 24" style="width:26px;height:26px;fill:none;stroke:var(--tx);stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>';
    var sheet=document.createElement('div');
    sheet.id='cashlyShare'; sheet.style.cssText='position:fixed;inset:0;z-index:150;display:none';
    sheet.innerHTML='<div data-sh="close" style="position:absolute;inset:0;background:rgba(0,0,0,.55)"></div>'
      +'<div style="position:absolute;left:0;right:0;bottom:0;max-width:460px;margin:0 auto;background:var(--s0);border-top:1px solid var(--line);border-radius:16px 16px 0 0;padding:14px 18px calc(18px + env(safe-area-inset-bottom))">'
      +'<div style="width:38px;height:4px;border-radius:2px;background:var(--line2);margin:2px auto 14px"></div>'
      +'<div style="font-weight:800;font-size:16px">Invita su Cashly</div>'
      +'<div style="font-size:12.5px;color:var(--dim);margin:3px 0 16px">Chi entra dal tuo link resta nella tua rete.</div>'
      +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px 6px">'
      + tile('wa','WhatsApp','#25D366',iWa) + tile('tg','Telegram','#29A9EB',iTg) + tile('x','X','#000',iX) + tile('fb','Facebook','#1877F2',iFb)
      + tile('ml','Email','#6E7A8A',iMl) + tile('sm','SMS','#3FB950',iSm) + tile('native','Altre app','var(--s2)',iMr) + tile('cp','Copia link','var(--acc)',iCp)
      +'</div>'
      +'</div>';
    document.body.appendChild(sheet);
    sheet.addEventListener('click', function(e){
      var b=e.target.closest && e.target.closest('[data-sh]'); if(!b) return;
      var k=b.getAttribute('data-sh'), link=REF_LINK;
      if(k==='close'){ sheet.style.display='none'; return; }
      if(k==='wa'){ extOpen('https://wa.me/?text='+encodeURIComponent(TXT+' '+link)); }
      else if(k==='tg'){ tgOpen('https://t.me/share/url?url='+encodeURIComponent(link)+'&text='+encodeURIComponent(TXT)); }
      else if(k==='x'){ extOpen('https://twitter.com/intent/tweet?text='+encodeURIComponent(TXT)+'&url='+encodeURIComponent(link)); }
      else if(k==='fb'){ extOpen('https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(link)); }
      else if(k==='ml'){ extOpen('mailto:?subject='+encodeURIComponent('Entra in Cashly')+'&body='+encodeURIComponent(TXT+' '+link)); }
      else if(k==='sm'){ extOpen('sms:?&body='+encodeURIComponent(TXT+' '+link)); }
      else if(k==='cp'){ try{ navigator.clipboard.writeText(link); }catch(e){} toast('Link copiato'); }
      else if(k==='native'){ if(navigator.share){ navigator.share({title:'Cashly', text:TXT, url:link}).catch(function(){}); } else { try{ navigator.clipboard.writeText(link); }catch(e){} toast('Link copiato'); } }
      sheet.style.display='none';
    });
    function openSheet(){ if(tg&&tg.HapticFeedback){ try{ tg.HapticFeedback.impactOccurred('light'); }catch(x){} } sheet.style.display='block'; }
    window.__openShare = openSheet;   // riusato dal bottone Condividi dentro ogni scheda
    var sb=document.getElementById('shareBtn');
    if(sb) sb.addEventListener('click', openSheet);
    // Il tasto "Invita" dell'Affiliazione apre lo STESSO menu: dentro Telegram navigator.share
    // proporrebbe solo Telegram, quindi servono i link diretti per ogni app.
    var ivb=document.getElementById('inviteBtn');
    if(ivb) ivb.addEventListener('click', openSheet);
    // Anche il riquadro col link copia al tocco.
    var ilt=document.getElementById('inviteLinkText');
    if(ilt) ilt.addEventListener('click', function(){ try{ navigator.clipboard.writeText(REF_LINK); }catch(e){} toast('Link copiato'); });
  })();

  // ===== ONBOARDING a slide (solo alla prima apertura) =====
  (function(){
    if (localStorage.getItem('cashly_onb') === '1') return;
    var SLIDES = [
      { splash:true, slogan:'la directory del business online' },
      { statement:'Il tuo <b>hub</b> sempre a portata di mano.' },
      { statement:'Cerca nella directory il business che ti farà <b>cambiare vita</b>.' },
      { statement:'Invita e guadagna costruendo la tua <b>community definitiva</b>.', final:true }
    ];
    var i=0;
    var ov=document.createElement('div');
    ov.id='cashlyOnb'; ov.style.cssText='position:fixed;inset:0;z-index:250;background:var(--bg);color:var(--tx);max-width:460px;margin:0 auto;display:flex;flex-direction:column';
    document.body.appendChild(ov);
    function done(){ localStorage.setItem('cashly_onb','1'); try{ fetch(API_URL+'/onboarding',{method:'POST',headers:Object.assign({'Content-Type':'application/json'},HDRS),body:JSON.stringify({choice:'esplora'})}).catch(function(){}); }catch(e){} ov.remove(); }
    function hap(){ if(tg&&tg.HapticFeedback){ try{ tg.HapticFeedback.impactOccurred('light'); }catch(x){} } }
    function render(){
      var s=SLIDES[i], last=!!s.final, dots='';
      for(var k=0;k<SLIDES.length;k++) dots+='<span style="height:7px;border-radius:99px;transition:width .25s;width:'+(k===i?'24px':'7px')+';background:'+(k===i?'var(--acc)':'var(--line2)')+'"></span>';
      var brandTop = s.splash ? '<div></div>'
        : '<div class="onb-brand brandmark" style="font-family:var(--display);font-size:19px;font-weight:800;letter-spacing:-.03em;color:var(--tx)">Cash<span style="color:var(--acc)">ly</span></div>';
      var center = s.splash
        ? '<div class="onb-stmt" style="display:flex;flex-direction:column;align-items:center"><div class="brandmark" style="font-family:var(--display);font-size:56px;font-weight:800;letter-spacing:-.045em;line-height:1;color:var(--tx)">Cash<span style="color:var(--acc)">ly</span></div><div style="font-size:14px;color:var(--dim);letter-spacing:.01em;margin-top:14px">'+s.slogan+'</div></div>'
        : '<div class="onb-stmt" style="font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1.26;color:var(--tx);max-width:330px">'+s.statement.replace(/<b>/g,'<b style="color:var(--acc)">')+'</div>';
      ov.innerHTML =
        '<div class="onb-glow"></div>'
        + '<div style="position:relative;z-index:1;flex:1;display:flex;flex-direction:column">'
        +   '<div style="display:flex;align-items:center;justify-content:space-between;padding:16px 18px 0">' + brandTop
        +     '<button id="onbSkip" style="background:none;border:none;color:var(--mut);font-size:13px;font-weight:600;cursor:pointer;padding:6px 8px">Salta</button>'
        +   '</div>'
        +   '<div style="flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 30px">' + center + '</div>'
        +   '<div class="onb-dots" style="display:flex;gap:6px;justify-content:center;padding:6px 0 22px">'+dots+'</div>'
        +   '<div style="padding:0 20px calc(26px + env(safe-area-inset-bottom))"><button id="onbGo" class="onb-cta" style="width:100%;background:linear-gradient(135deg,#2fe37b 0%,#16b25e 100%);color:#fff;border:none;border-radius:13px;padding:17px;font-size:16px;font-weight:800;letter-spacing:-.01em;cursor:pointer;text-shadow:0 1px 2px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;gap:8px">'+(last?'Apri il tuo HUB':'Avanti')+'<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round"><path d="M5 12h13M13 6l6 6-6 6"/></svg></button></div>'
        + '</div>';
      document.getElementById('onbGo').onclick=function(){ hap(); if(last){ done(); } else { i++; render(); } };
      document.getElementById('onbSkip').onclick=function(){ done(); };
    }
    render();
  })();

})();
</script>
</body>
</html>
