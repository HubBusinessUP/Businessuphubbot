<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Business UP</title>
<style>
  :root {
    --ink: #0b0d13;
    --panel: #171b26;
    --blue: #4c6ef5;
    --blue-dim: rgba(76, 110, 245, 0.16);
    --flame: #ff5c48;
    --grape: #9d5cf0;
    --lime: #34d399;
    --lime-dim: rgba(52, 211, 153, 0.16);
    --amber: #fbbf24;
    --coral: #f2554d;
    --text: #f4f6fb;
    --text-dim: #8890a6;
    --border: rgba(244, 246, 251, 0.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-variant-numeric: tabular-nums; }
  body {
    min-height: 100vh;
    background: var(--ink);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", ui-sans-serif, sans-serif;
    padding-bottom: 90px;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 18px 16px; }

  .profile-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .avatar-wrap { width: 52px; height: 52px; border-radius: 14px; flex-shrink: 0; position: relative; }
  .avatar-img { width: 100%; height: 100%; border-radius: 14px; object-fit: cover; display: none; border: 2px solid var(--border); }
  .avatar-fallback {
    width: 100%; height: 100%; border-radius: 14px;
    background: var(--grape);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 800; color: #fff;
  }
  .profile-info { flex: 1; min-width: 0; }
  .greet-name { font-size: 20px; font-weight: 800; letter-spacing: -0.01em; }
  .greet-name span { color: var(--blue); }

  .topbar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .badge {
    display: flex; align-items: center; gap: 7px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 7px 12px 7px 7px; font-size: 14px; font-weight: 700;
  }
  .badge .dot { width: 23px; height: 23px; border-radius: 7px; background: var(--amber); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .badge .dot svg { width: 12px; height: 12px; }
  .badge.stat { flex: 1; justify-content: center; }

  /* Hero */
  .hero {
    position: relative;
    background: var(--flame);
    border-radius: 12px; padding: 20px; overflow: hidden; margin-bottom: 14px;
  }
  .hero::after {
    content: ""; position: absolute; right: -20px; top: -20px;
    width: 110px; height: 110px; border-radius: 24px; background: rgba(255,255,255,0.1);
  }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; position: relative; }
  .hero-ico { width: 42px; height: 42px; border-radius: 10px; background: rgba(255,255,255,0.22); display: flex; align-items: center; justify-content: center; }
  .hero-count { font-size: 13px; font-weight: 800; background: rgba(0,0,0,0.22); color: #fff; padding: 5px 12px; border-radius: 8px; }
  .hero h2 { font-size: 23px; font-weight: 800; color: #fff; margin-top: 14px; letter-spacing: -0.01em; }
  .hero p { font-size: 14.5px; color: rgba(255,255,255,0.85); margin-top: 4px; }
  .hero-progress { display: flex; gap: 5px; margin-top: 14px; }
  .hero-progress span { flex: 1; height: 5px; border-radius: 3px; background: rgba(0,0,0,0.22); }
  .hero-progress span.on { background: #fff; }

  /* Tabs */
  .tabs { display: flex; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 16px; }
  .tab { flex: 1; text-align: center; padding: 11px 0; border-radius: 7px; font-size: 13.5px; font-weight: 700; color: var(--text-dim); cursor: pointer; border: none; background: none; font-family: inherit; }
  .tab.active { background: var(--blue); color: #fff; }
  .panel { display: none; }
  .panel.active { display: block; animation: fade 0.2s ease; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  /* Tiles */
  .tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .tile {
    border-radius: 10px; padding: 16px; display: flex; flex-direction: column; gap: 22px; color: #fff;
    border: none; text-align: left; font-family: inherit; cursor: pointer; position: relative;
    transition: transform 0.15s ease;
  }
  .tile:active { transform: scale(0.97); }
  .tile.grape { background: var(--grape); }
  .tile.dark { background: var(--panel); border: 1px solid var(--border); color: var(--text); }
  .t-top { display: flex; align-items: center; justify-content: space-between; }
  .t-ico { width: 34px; height: 34px; border-radius: 8px; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; }
  .tile.dark .t-ico { background: var(--lime-dim); color: var(--lime); }
  .t-arrow { width: 24px; height: 24px; border-radius: 7px; background: rgba(255,255,255,0.16); display: flex; align-items: center; justify-content: center; }
  .tile.dark .t-arrow { background: rgba(244,246,251,0.06); color: var(--text-dim); }
  .t-label { font-size: 14.5px; font-weight: 700; }
  .t-value { font-size: 13px; font-weight: 600; opacity: 0.85; margin-top: 2px; }
  .tile.dark .t-value { color: var(--text-dim); opacity: 1; }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
  h2.section-title { font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-weight: 700; margin-bottom: 14px; }

  .section-head { display: flex; justify-content: space-between; align-items: baseline; padding: 2px 2px 10px; }
  .section-head h3 { font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-weight: 700; }

  .rows { display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; }
  .r-avatar { width: 38px; height: 38px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; }
  .r-body { flex: 1; min-width: 0; }
  .r-name { font-size: 14.5px; font-weight: 700; }
  .r-meta { font-size: 12.5px; color: var(--text-dim); margin-top: 1px; }
  .r-value { font-size: 15px; font-weight: 800; flex-shrink: 0; }

  .link-box { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  .link-input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; font-family: monospace; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 9px; font-weight: 700; font-size: 14.5px; cursor: pointer; font-family: inherit; }
  .btn-primary { background: var(--blue); color: #fff; }

  .service-row {
    display: flex; align-items: center; gap: 13px; padding: 13px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 9px; cursor: pointer; border: none; width: 100%; text-align: left; font-family: inherit;
    transition: transform 0.12s ease;
  }
  .service-row:active { transform: scale(0.98); }
  .service-ico { width: 42px; height: 42px; border-radius: 9px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; }
  .service-body { flex: 1; min-width: 0; }
  .service-title { font-size: 14.5px; font-weight: 700; }
  .service-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .stato-badge { font-size: 10px; font-weight: 700; padding: 4px 9px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.03em; flex-shrink: 0; }
  .stato-badge.attivo { background: var(--lime-dim); color: var(--lime); }
  .stato-badge.pausa { background: rgba(251,191,36,0.14); color: var(--amber); }
  .stato-badge.fermo { background: rgba(242,85,77,0.12); color: var(--coral); }
  .cat-title { font-size: 12.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; margin: 16px 0 10px; }
  .empty { text-align: center; color: var(--text-dim); font-size: 13.5px; padding: 24px 0; grid-column: 1 / -1; }

  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; }
  .cat-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 8px; display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; text-align: center; font-family: inherit; transition: transform 0.12s ease;
  }
  .cat-card:active { transform: scale(0.96); }
  .cat-ico { width: 38px; height: 38px; border-radius: 9px; display: flex; align-items: center; justify-content: center; color: #fff; }
  .cat-name { font-size: 12px; font-weight: 700; line-height: 1.25; }
  .cat-count { font-size: 10.5px; color: var(--text-dim); }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(4, 1fr);
    background: rgba(11,13,19,0.92); backdrop-filter: blur(14px);
    border-top: 1px solid var(--border); padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
    z-index: 50;
  }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; background: none; border: none; font-family: inherit; }
  .nav-ico { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); }
  .nav-item.on .nav-ico { background: var(--blue-dim); color: var(--blue); }
  .nav-item span { font-size: 10.5px; font-weight: 700; color: var(--text-dim); }
  .nav-item.on span { color: var(--blue); }
</style>
</head>
<body>
  <div class="container">
    <div class="profile-row">
      <div class="avatar-wrap">
        <img class="avatar-img" id="avatarImg" alt="" />
        <div class="avatar-fallback" id="avatarFallback">--</div>
      </div>
      <div class="profile-info">
        <div class="greet-name">Ciao <span id="userName">Utente</span></div>
      </div>
    </div>

    <div class="topbar">
      <div class="badge">
        <div class="dot"><svg viewBox="0 0 24 24" fill="none" stroke="#0b0d13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/></svg></div>
        <span id="stageLabel">-</span>
      </div>
      <div class="badge stat" id="guadagniBadge">
        <div class="dot"><svg viewBox="0 0 24 24" fill="none" stroke="#0b0d13" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
        <span id="guadagniText">€0 stimati</span>
      </div>
    </div>

    <div class="hero" id="heroCard">
      <div class="hero-top">
        <div class="hero-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v9H4v-9M2 7h20v5H2zM12 22V7M12 7C10 4 6 3 5 5s1 2 3 2h4ZM12 7c2-3 6-4 7-2s-1 2-3 2h-4Z"/></svg></div>
        <div class="hero-count" id="heroCount">0 / 3</div>
      </div>
      <h2 id="heroTitle">Sblocca il tuo link</h2>
      <p id="heroDesc">Invita 3 persone per iniziare a guadagnare</p>
      <div class="hero-progress" id="heroProgress"><span></span><span></span><span></span></div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="profilo">Profilo</button>
      <button class="tab" data-tab="business">Servizi</button>
      <button class="tab" data-tab="rete">Rete</button>
    </div>

    <!-- PROFILO -->
    <div class="panel active" id="panel-profilo">
      <div class="tiles">
        <button class="tile dark" onclick="switchTab('business')">
          <div class="t-top">
            <div class="t-ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>
            <div class="t-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></div>
          </div>
          <div>
            <div class="t-label">Business List</div>
            <div class="t-value" id="tileServizi">Scopri i servizi</div>
          </div>
        </button>
        <button class="tile grape" onclick="switchTab('rete')">
          <div class="t-top">
            <div class="t-ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="7" r="2.6"/><circle cx="18" cy="7" r="2.6"/><circle cx="12" cy="17" r="2.6"/><path d="M7.6 8.8 10.6 15M16.4 8.8 13.4 15"/></svg></div>
            <div class="t-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></div>
          </div>
          <div>
            <div class="t-label">La tua rete</div>
            <div class="t-value" id="tileInvitati">0 invitati</div>
          </div>
        </button>
      </div>
      <div class="card">
        <h2 class="section-title">Il tuo profilo</h2>
        <div id="profiloDettagli" class="rows"></div>
      </div>
    </div>

    <!-- BUSINESS LIST -->
    <div class="panel" id="panel-business">
      <div class="card" id="businessBanner">
        <h2 class="section-title">Business List</h2>
        <p style="font-size:13.5px;color:var(--text-dim);line-height:1.5">Scegli una categoria per vedere i servizi disponibili e i tutorial per attivarli.</p>
      </div>
      <div class="cat-grid" id="businessList"><p class="empty">Caricamento...</p></div>
    </div>

    <!-- AFFILIAZIONE -->
    <div class="panel" id="panel-rete">
      <div class="link-box">
        <input type="text" class="link-input" id="refLink" readonly>
        <button class="btn btn-primary" onclick="copyLink()">Copia link</button>
      </div>
      <div class="section-head"><h3>Membri della rete</h3></div>
      <div class="rows" id="reteRows"><p class="empty">Nessun invito ancora.</p></div>
    </div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item on" onclick="switchTab('profilo')">
      <div class="nav-ico"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></div>
      <span>Profilo</span>
    </button>
    <button class="nav-item" onclick="switchTab('business')">
      <div class="nav-ico"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M8 8V6a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>
      <span>Servizi</span>
    </button>
    <button class="nav-item" onclick="switchTab('rete')">
      <div class="nav-ico"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="7" r="2.4"/><circle cx="18" cy="7" r="2.4"/><circle cx="12" cy="17" r="2.4"/><path d="M7.6 8.6 10.6 15.2M16.4 8.6 13.4 15.2"/></svg></div>
      <span>Rete</span>
    </button>
    <button class="nav-item" onclick="window.location.href='sondaggio.html?_=' + Date.now()">
      <div class="nav-ico"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 11h6M9 15h4"/></svg></div>
      <span>Sondaggio</span>
    </button>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const API_URL = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const initData = tg?.initData || "";

    const STAGE_LABEL = { nuovo: "Nuovo", qualificato: "Qualificato", squalificato: "Non idoneo ora", contattato: "In contatto", cliente: "Cliente" };

    function switchTab(name) {
      document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t.dataset.tab === name));
      document.querySelectorAll(".panel").forEach((p) => p.classList.toggle("active", p.id === `panel-${name}`));
      document.querySelectorAll(".bottom-nav .nav-item").forEach((n, i) => {
        const map = ["profilo", "business", "rete"];
        n.classList.toggle("on", map[i] === name);
      });
    }
    document.querySelectorAll(".tab").forEach((tab) => tab.onclick = () => switchTab(tab.dataset.tab));

    function initials(name) {
      if (!name) return "--";
      return name.trim().slice(0, 2).toUpperCase();
    }

    function renderTelegramProfile() {
      const user = tg?.initDataUnsafe?.user;
      const firstName = user?.first_name || "";
      document.getElementById("userName").textContent = firstName || "Utente";

      const img = document.getElementById("avatarImg");
      const fallback = document.getElementById("avatarFallback");
      if (user?.photo_url) {
        img.src = user.photo_url;
        img.onload = () => { img.style.display = "block"; fallback.style.display = "none"; };
        img.onerror = () => { img.style.display = "none"; fallback.style.display = "flex"; };
      } else {
        fallback.textContent = initials(firstName);
      }
    }
    renderTelegramProfile();

    async function loadMe() {
      const res = await fetch(`${API_URL}/me`, { headers: { "x-telegram-init-data": initData }, cache: "no-store" });
      const data = await res.json();
      const lead = data.lead || {};
      const sond = data.sondaggio || {};

      const stage = lead.pipeline_stage || "nuovo";
      document.getElementById("stageLabel").textContent = STAGE_LABEL[stage] || stage;

      const dettagli = document.getElementById("profiloDettagli");
      if (sond.livello_trading) {
        dettagli.innerHTML = `
          <div class="row"><div class="r-body"><div class="r-name">Livello</div></div><div class="r-value">${sond.livello_trading}</div></div>
          <div class="row"><div class="r-body"><div class="r-name">Capitale</div></div><div class="r-value">${sond.capitale || "-"}</div></div>
          <div class="row"><div class="r-body"><div class="r-name">Interesse</div></div><div class="r-value">${sond.prodotto_preferito || "-"}</div></div>`;
      } else {
        dettagli.innerHTML = `<p class="empty">Sondaggio non ancora completato.</p>`;
      }
    }

    const SERVICE_ICON_BG = [
      "var(--blue)",
      "var(--flame)",
      "var(--grape)",
      "var(--lime)",
    ];
    const SERVICE_ICON_SVG = '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v9H4v-9M2 7h20v5H2zM12 22V7M12 7C10 4 6 3 5 5s1 2 3 2h4ZM12 7c2-3 6-4 7-2s-1 2-3 2h-4Z"/></svg>';

    const CAT_ICON_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>';

    async function loadBusinessList() {
      const res = await fetch(`${API_URL}/business-list`, { cache: "no-store" });
      const data = await res.json();
      const el = document.getElementById("businessList");
      el.innerHTML = "";
      const cats = data.categorie || [];
      if (!cats.length) { el.innerHTML = '<p class="empty">Nessun servizio disponibile al momento.</p>'; return; }

      let totale = 0, attivi = 0;
      cats.forEach((cat, idx) => {
        const servizi = cat.servizi || [];
        totale += servizi.length;
        attivi += servizi.filter((s) => s.stato === "attivo").length;

        const card = document.createElement("button");
        card.className = "cat-card";
        card.innerHTML = `
          <div class="cat-ico" style="background:${SERVICE_ICON_BG[idx % SERVICE_ICON_BG.length]}">${CAT_ICON_SVG}</div>
          <div class="cat-name">${cat.nome}</div>
          <div class="cat-count">${servizi.length} serviz${servizi.length === 1 ? "io" : "i"}</div>
        `;
        card.onclick = () => window.location.href = `categoria.html?id=${cat.id}&_=${Date.now()}`;
        el.appendChild(card);
      });
      document.getElementById("tileServizi").textContent = `${totale} servizi · ${attivi} attivi`;
    }

    async function loadAffiliazione() {
      const res = await fetch(`${API_URL}/affiliazione`, { headers: { "x-telegram-init-data": initData }, cache: "no-store" });
      const data = await res.json();
      document.getElementById("refLink").value = data.ref_link || "";
      const invitati = data.rete?.invitati_count || 0;
      const attivati = data.rete?.attivati_count || 0;
      document.getElementById("tileInvitati").textContent = `${invitati} invitat${invitati === 1 ? "o" : "i"} · ${attivati} attiv${attivati === 1 ? "o" : "i"}`;
      document.getElementById("guadagniText").textContent = `€${data.guadagni_totali || 0} stimati`;

      const need = Math.min(invitati, 3);
      document.getElementById("heroCount").textContent = `${need} / 3`;
      const bar = document.getElementById("heroProgress");
      bar.innerHTML = "";
      for (let i = 0; i < 3; i++) {
        const s = document.createElement("span");
        if (i < need) s.className = "on";
        bar.appendChild(s);
      }
      if (invitati >= 3) {
        document.getElementById("heroTitle").textContent = "Link sbloccato";
        document.getElementById("heroDesc").textContent = "Ora puoi guadagnare da chi inviti";
      } else {
        document.getElementById("heroDesc").textContent = `Invita ancora ${3 - invitati} person${3 - invitati === 1 ? "a" : "e"} per iniziare a guadagnare`;
      }

      const rows = document.getElementById("reteRows");
      const members = data.rete?.membri || [];
      if (!members.length) {
        rows.innerHTML = '<p class="empty">Nessun invito ancora. Condividi il tuo link!</p>';
        return;
      }
      const palette = ["var(--lime)", "var(--amber)", "var(--coral)", "var(--blue)"];
      rows.innerHTML = members.map((m, i) => {
        const color = palette[i % palette.length];
        const positive = m.stato === "qualificato" || m.stato === "cliente";
        return `
          <div class="row">
            <div class="r-avatar" style="background:${color}">${m.nome_mascherato.replace(/\./g, "")}</div>
            <div class="r-body"><div class="r-name">${m.nome_mascherato}</div><div class="r-meta">${m.sondaggio_completato ? m.stato_label : "Sondaggio in corso"}</div></div>
            <div class="r-value" style="color:${positive ? "var(--lime)" : "var(--text-dim)"}">${positive ? "Attiva" : "—"}</div>
          </div>`;
      }).join("");
    }

    function copyLink() {
      const el = document.getElementById("refLink");
      el.select();
      document.execCommand("copy");
      if (tg?.showAlert) tg.showAlert("Link copiato!");
      else alert("Link copiato!");
    }

    if (!initData) {
      document.getElementById("userName").textContent = "!!";
    } else {
      loadMe();
      loadBusinessList();
      loadAffiliazione();
    }
  </script>
</body>
</html>
