<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Business UP</title>
<style>
  :root {
    --ink: #0d0e15;
    --panel: #171a28;
    --blue: #4a90e2;
    --blue-dim: rgba(74, 144, 226, 0.16);
    --slate: #3a4358;
    --lime: #2ecc71;
    --lime-dim: rgba(46, 204, 113, 0.16);
    --amber: #e8b34c;
    --amber-dim: rgba(232, 179, 76, 0.14);
    --coral: #e2574a;
    --text: #f2f3f7;
    --text-dim: #8b90a0;
    --border: #1e2130;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; font-variant-numeric: tabular-nums; }
  body {
    min-height: 100vh;
    background: var(--ink);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", ui-sans-serif, sans-serif;
  }
  .container { max-width: 480px; margin: 0 auto; padding: 18px 16px 30px; }

  .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .logo { font-size: 17px; font-weight: 800; }
  .top-actions { display: flex; gap: 10px; }
  .icon-circle {
    width: 36px; height: 36px; border-radius: 4px; flex-shrink: 0;
    background: var(--panel); color: var(--text);
    display: flex; align-items: center; justify-content: center; cursor: pointer; border: none;
  }

  .greet-card { background: var(--panel); border-radius: 4px; padding: 16px; margin-bottom: 14px; }
  .greet-top { display: flex; align-items: center; gap: 13px; }
  .avatar-wrap {
    width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0; position: relative;
    border: none; padding: 0; cursor: pointer;
  }
  .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none; }
  .avatar-fallback {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--slate);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 800; color: #fff;
  }
  .greet { font-size: 16px; font-weight: 700; }
  .greet-sub { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }

  .stats-bar { display: flex; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .stat-item { flex: 1; }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; }
  .stat-value { font-size: 15px; font-weight: 700; }
  .stat-value.lime { color: var(--lime); }

  .hero-strip {
    display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; border: none; font-family: inherit; cursor: pointer;
    background: var(--panel); border-radius: 4px; padding: 13px 14px; margin-bottom: 14px;
  }
  .hero-strip .ico { width: 30px; height: 30px; border-radius: 4px; background: var(--lime); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .hero-strip .txt { flex: 1; min-width: 0; }
  .hero-strip .t1 { font-size: 13px; font-weight: 700; color: var(--text); }
  .hero-strip .t2 { font-size: 11.5px; color: var(--text-dim); margin-top: 1px; }
  .hero-strip .arrow { color: var(--text-dim); flex-shrink: 0; }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 18px; margin-bottom: 14px; }
  h2.section-title { font-size: 12.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-weight: 700; margin-bottom: 14px; }

  .btn { width: 100%; padding: 14px; border: none; border-radius: 4px; font-weight: 700; font-size: 14.5px; cursor: pointer; font-family: inherit; }
  .btn-primary { background: var(--lime); color: #06110b; }

  .stato-badge { font-size: 10px; font-weight: 700; padding: 4px 9px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.03em; flex-shrink: 0; }
  .stato-badge.attivo { background: var(--lime-dim); color: var(--lime); }
  .stato-badge.pausa { background: var(--amber-dim); color: var(--amber); }
  .stato-badge.fermo { background: rgba(226,87,74,0.12); color: var(--coral); }
  .empty { text-align: center; color: var(--text-dim); font-size: 13.5px; padding: 24px 0; }

  .cat-card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
    padding: 13px; display: flex; align-items: center; gap: 13px;
    cursor: pointer; text-align: left; font-family: inherit; width: 100%;
    transition: transform 0.12s ease;
  }
  .cat-card:active { transform: scale(0.98); }
  .cat-ico { width: 42px; height: 42px; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; }
  .cat-body { flex: 1; min-width: 0; }
  .cat-name { font-size: 14.5px; font-weight: 700; }
  .cat-count { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .cat-arrow { color: var(--text-dim); flex-shrink: 0; }

  .list-card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 4px 16px; }
  .list-item {
    display: flex; align-items: center; gap: 13px; padding: 13px 0; border-bottom: 1px solid var(--border);
    cursor: pointer; background: none; border-left: none; border-right: none; border-top: none; width: 100%; text-align: left; font-family: inherit; color: inherit;
  }
  .list-item:last-child { border-bottom: none; }
  .list-item:active { opacity: 0.8; }

  .lock-card { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 24px 20px; text-align: center; margin-bottom: 14px; }
  .lock-ico { width: 48px; height: 48px; border-radius: 4px; background: var(--amber-dim); color: var(--amber); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
  .lock-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .lock-card p { font-size: 13px; color: var(--text-dim); line-height: 1.5; margin-bottom: 16px; }

  /* Share sheet */
  .share-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
    display: none; align-items: flex-end; justify-content: center;
  }
  .share-overlay.open { display: flex; }
  .share-sheet {
    background: var(--ink); border: 1px solid var(--border); border-radius: 4px 4px 0 0;
    width: 100%; max-width: 480px; padding: 20px 18px calc(20px + env(safe-area-inset-bottom));
  }
  .share-handle { width: 36px; height: 4px; border-radius: 3px; background: var(--border); margin: 0 auto 16px; }
  .share-sheet h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; text-align: center; }
  .share-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .share-opt {
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    background: none; border: none; color: var(--text); font-family: inherit;
    text-decoration: none; cursor: pointer;
  }
  .share-ico { width: 46px; height: 46px; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
  .share-opt span { font-size: 11px; font-weight: 600; }
  .btn-secondary { background: var(--panel); border: 1px solid var(--border); color: var(--text); }
</style>
</head>
<body>
  <div class="container">
    <div class="top-row">
      <div class="logo">Business UP</div>
      <div class="top-actions">
        <button class="icon-circle" onclick="openShareSheet()" aria-label="Condividi il tuo link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><path d="m8.1 10.6 7.8-4.3M8.1 13.4l7.8 4.3"/></svg>
        </button>
        <button class="icon-circle" onclick="window.location.href='dashboard.html?_=' + Date.now()" aria-label="Aggiorna la pagina">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
        </button>
      </div>
    </div>

    <div class="greet-card">
      <button class="greet-top" onclick="goProfilo()" aria-label="Il tuo profilo" style="background:none;border:none;padding:0;cursor:pointer;width:100%;display:flex;align-items:center;gap:13px;text-align:left;font-family:inherit;color:inherit">
        <div class="avatar-wrap">
          <img class="avatar-img" id="avatarImg" alt="" />
          <div class="avatar-fallback" id="avatarFallback">--</div>
        </div>
        <div>
          <div class="greet">Ciao, <span id="userName">Utente</span> 👋</div>
          <div class="greet-sub">Tocca per vedere il tuo profilo</div>
        </div>
      </button>
      <div class="stats-bar" id="statsBar" style="display:none">
        <div class="stat-item">
          <div class="stat-label">Invitati</div>
          <div class="stat-value" id="statInvitati">0</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Stato</div>
          <div class="stat-value lime" id="statStato">Iscritto</div>
        </div>
      </div>
    </div>

    <button class="hero-strip" id="heroCard" onclick="goRete()" style="display:none">
      <div class="ico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#06110b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v9H4v-9M2 7h20v5H2zM12 22V7"/></svg></div>
      <div class="txt"><div class="t1" id="heroTitle">Il tuo link è pronto</div><div class="t2" id="heroDesc">Condividilo per far crescere la tua rete</div></div>
      <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>
    </button>

    <div class="lock-card" id="anagraficaPrompt" style="display:none">
      <div class="lock-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
      <h3>Completa la tua anagrafica</h3>
      <p>Per sbloccare il tuo link personale e la rete, compila nome, contatti e qualche domanda veloce.</p>
      <button class="btn btn-primary" onclick="window.location.href='sondaggio.html?_=' + Date.now()">Completa ora</button>
    </div>

    <button class="cat-card" id="paginaLink" style="display:none;margin-bottom:14px" onclick="window.location.href='mia-pagina.html?_=' + Date.now()">
      <div class="cat-ico" style="background:var(--blue)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg></div>
      <div class="cat-body">
        <div class="cat-name">La tua pagina personale</div>
        <div class="cat-count">Bio, foto e i tuoi link in un'unica pagina pubblica</div>
      </div>
      <svg class="cat-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>
    </button>

    <h2 class="section-title">Business List</h2>
    <div class="list-card" id="businessList"><p class="empty">Caricamento...</p></div>
  </div>

  <div class="share-overlay" id="shareOverlay" onclick="if(event.target===this) closeShareSheet()">
    <div class="share-sheet">
      <div class="share-handle"></div>
      <h3>Condividi il tuo link</h3>
      <div class="share-grid">
        <a class="share-opt" id="shareWhatsapp" target="_blank" rel="noopener" onclick="setTimeout(closeShareSheet, 200)">
          <div class="share-ico" style="background:#25D366"><svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.6 1.4 5.1L2 22l5.1-1.3C8.5 21.5 10.2 22 12 22c5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18.1c-1.6 0-3.1-.4-4.5-1.2l-.3-.2-3.3.9.9-3.2-.2-.3C3.7 14 3.3 12.5 3.3 12c0-4.8 3.9-8.7 8.7-8.7s8.7 3.9 8.7 8.7-3.9 8.7-8.7 8.7z"/></svg></div>
          <span>WhatsApp</span>
        </a>
        <a class="share-opt" id="shareTelegram" target="_blank" rel="noopener" onclick="return openTelegramShare(event)">
          <div class="share-ico" style="background:#29a9eb"><svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="m22 2-7 20-4-9-9-4Z"/></svg></div>
          <span>Telegram</span>
        </a>
        <button class="share-opt" onclick="shareViaEmail()">
          <div class="share-ico" style="background:var(--blue)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 6 10 7 10-7"/></svg></div>
          <span>Email</span>
        </button>
        <button class="share-opt" onclick="copyRefLinkFromSheet()">
          <div class="share-ico" style="background:#1f2433"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div>
          <span>Copia link</span>
        </button>
      </div>
      <button class="btn btn-secondary" onclick="closeShareSheet()" style="margin-top:6px">Chiudi</button>
    </div>
  </div>

  <script>
    window.addEventListener("pageshow", (e) => { if (e.persisted) window.location.reload(); });
    (function () {
      const loadedAt = Date.now();
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible" && Date.now() - loadedAt > 4000) window.location.reload();
      });
    })();
  </script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const API_URL = "https://jwpbopkoscqooovfvwqn.supabase.co/functions/v1/businessup-bot";
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const initData = tg?.initData || "";

    window.sondaggioCompletato = false;

    function goProfilo() {
      const target = window.sondaggioCompletato ? "account.html" : "sondaggio.html";
      window.location.href = `${target}?_=${Date.now()}`;
    }
    function goRete() {
      const target = window.sondaggioCompletato ? "rete.html" : "sondaggio.html";
      window.location.href = `${target}?_=${Date.now()}`;
    }

    function initials(name) {
      if (!name) return "--";
      return name.trim().slice(0, 2).toUpperCase();
    }

    function renderTelegramProfile() {
      const user = tg?.initDataUnsafe?.user;
      const firstName = user?.first_name || "";
      document.getElementById("userName").textContent = firstName || "Utente";

      const img = document.getElementById("avatarImg");
      const fallback = document.getElementById("avatarFallback");
      if (user?.photo_url) {
        img.src = user.photo_url;
        img.onload = () => { img.style.display = "block"; fallback.style.display = "none"; };
        img.onerror = () => { img.style.display = "none"; fallback.style.display = "flex"; };
      } else {
        fallback.textContent = initials(firstName);
      }
    }
    renderTelegramProfile();

    async function loadMe() {
      const res = await fetch(`${API_URL}/me`, { headers: { "x-telegram-init-data": initData }, cache: "no-store" });
      const data = await res.json();
      const lead = data.lead || {};
      const completato = !!lead.sondaggio_completato;
      window.sondaggioCompletato = completato;
      window.isCliente = !!lead.is_cliente;
      document.getElementById("anagraficaPrompt").style.display = completato ? "none" : "block";
      document.getElementById("paginaLink").style.display = completato ? "flex" : "none";
      return completato;
    }

    const SERVICE_ICON_BG = ["var(--blue)", "var(--lime)", "var(--amber)", "var(--slate)"];
    const CAT_ICON_SVG = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>';

    async function loadBusinessList() {
      const res = await fetch(`${API_URL}/business-list`, { cache: "no-store" });
      const data = await res.json();
      const el = document.getElementById("businessList");
      el.innerHTML = "";
      const cats = data.categorie || [];
      if (!cats.length) { el.innerHTML = '<p class="empty">Nessun servizio disponibile al momento.</p>'; return; }

      cats.forEach((cat, idx) => {
        const servizi = cat.servizi || [];
        const row = document.createElement("button");
        row.className = "list-item";
        row.innerHTML = `
          <div class="cat-ico" style="background:${SERVICE_ICON_BG[idx % SERVICE_ICON_BG.length]}">${CAT_ICON_SVG}</div>
          <div class="cat-body">
            <div class="cat-name">${cat.nome}</div>
            <div class="cat-count">${servizi.length} serviz${servizi.length === 1 ? "io" : "i"}</div>
          </div>
          <svg class="cat-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg>
        `;
        row.onclick = () => window.location.href = `categoria.html?id=${cat.id}&_=${Date.now()}`;
        el.appendChild(row);
      });
    }

    window.currentRefLink = "";

    async function loadAffiliazione() {
      const res = await fetch(`${API_URL}/affiliazione`, { headers: { "x-telegram-init-data": initData }, cache: "no-store" });
      const data = await res.json();
      window.currentRefLink = data.ref_link || "";
      document.getElementById("heroCard").style.display = "flex";

      document.getElementById("statInvitati").textContent = data.rete?.invitati_count || 0;
      document.getElementById("statStato").textContent = window.isCliente ? "Cliente attivo" : "Iscritto";
      document.getElementById("statsBar").style.display = "flex";
    }

    const SHARE_TEXT = "Entra in Business UP con il mio link:";

    function openTelegramShare(e) {
      if (tg?.openTelegramLink) {
        e.preventDefault();
        tg.openTelegramLink(e.currentTarget.href);
        closeShareSheet();
        return false;
      }
      return true;
    }

    function openShareSheet() {
      if (!window.currentRefLink) {
        if (tg?.showAlert) tg.showAlert("Completa l'anagrafica per generare il tuo link.");
        return;
      }
      const link = window.currentRefLink;
      document.getElementById("shareWhatsapp").href = `https://wa.me/?text=${encodeURIComponent(SHARE_TEXT + " " + link)}`;
      document.getElementById("shareTelegram").href = `https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(SHARE_TEXT)}`;
      document.getElementById("shareOverlay").classList.add("open");
    }

    function closeShareSheet() {
      document.getElementById("shareOverlay").classList.remove("open");
    }

    function shareViaEmail() {
      const link = window.currentRefLink;
      window.location.href = `mailto:?subject=${encodeURIComponent("Business UP")}&body=${encodeURIComponent(SHARE_TEXT + " " + link)}`;
    }

    function copyRefLinkFromSheet() {
      const link = window.currentRefLink;
      if (navigator.clipboard) navigator.clipboard.writeText(link).catch(() => {});
      closeShareSheet();
      if (tg?.showAlert) tg.showAlert("Link copiato!");
      else alert("Link copiato!");
    }

    async function init() {
      const completato = await loadMe();
      loadBusinessList();
      if (completato) loadAffiliazione();
    }

    if (!initData) {
      document.getElementById("userName").textContent = "!!";
    } else {
      init();
    }
  </script>
</body>
</html>
